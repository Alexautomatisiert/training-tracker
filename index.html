<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D14">
<title>Training Tracker</title>
<style>
/* =============================================
   CSS CUSTOM PROPERTIES
   ============================================= */
:root {
  --bg: #0D0D14;
  --card: #1A1A25;
  --border: #2A2A35;
  --orange: #E8720C;
  --green: #28B463;
  --red: #E24B4A;
  --blue: #3498DB;
  --purple: #9B59B6;
  --text: #fff;
  --text-sec: #888;
  --text-ter: #555;
  --radius: 12px;
  --nav-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
  overflow: hidden;
  height: 100%;
}

body {
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

input, button, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  border: none;
  outline: none;
  background: none;
}

button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; }

/* =============================================
   APP SHELL
   ============================================= */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* =============================================
   PAGES
   ============================================= */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--nav-height) + var(--safe-bottom) + 16px) 16px;
  padding-top: calc(var(--safe-top) + 16px);
}

.page.active {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* =============================================
   BOTTOM NAVIGATION
   ============================================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  display: flex;
  background: #111118;
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0;
  gap: 4px;
  color: var(--text-ter);
  transition: color 0.2s;
  min-height: var(--nav-height);
}

.nav-item.active { color: var(--orange); }
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; font-weight: 500; }

/* =============================================
   CARDS & COMMON ELEMENTS
   ============================================= */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 14px;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  margin-top: 20px;
}

.section-title:first-child { margin-top: 0; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
h3 { font-size: 15px; font-weight: 600; }

/* =============================================
   WORKOUT ROW
   ============================================= */
.workout-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  min-height: 56px;
}

.workout-row:last-child { border-bottom: none; }

.workout-status {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.workout-status.done { background: var(--green); }
.workout-status.pending { border: 2px solid var(--border); }
.workout-status.current { border: 2px solid var(--orange); }

.workout-info { flex: 1; }
.workout-name { font-size: 15px; font-weight: 600; }
.workout-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.workout-day { font-size: 12px; color: var(--text-ter); flex-shrink: 0; }

/* =============================================
   WEEK PILLS
   ============================================= */
.week-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.week-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  border: 1px solid var(--border);
  color: var(--text-sec);
  background: transparent;
  flex-shrink: 0;
}

.week-pill.current { background: var(--orange); color: #fff; border-color: var(--orange); }
.week-pill.done { background: var(--green); color: #fff; border-color: var(--green); opacity: 0.7; }
.week-pill.future { opacity: 0.5; }

/* =============================================
   SUB TABS
   ============================================= */
.sub-tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 0;
  z-index: 10;
}

.sub-tab {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sec);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}

.sub-tab.active {
  background: var(--orange);
  color: #fff;
}

/* =============================================
   BUTTONS
   ============================================= */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 24px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  min-height: 48px;
  transition: opacity 0.2s;
}

.btn:active { opacity: 0.8; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-outline { border: 1px solid var(--border); color: var(--text-sec); }

.btn-sm {
  padding: 8px 16px;
  font-size: 14px;
  min-height: 36px;
  width: auto;
}

/* =============================================
   INPUT FIELDS
   ============================================= */
.input-field {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 16px;
  color: var(--text);
  text-align: center;
  width: 100%;
  transition: border-color 0.2s;
}

.input-field:focus { border-color: var(--orange); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.input-label {
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
}

/* =============================================
   TIMER
   ============================================= */
.timer-display {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 48px;
  font-weight: 700;
  color: var(--orange);
  text-align: center;
  padding: 16px 0;
}

.timer-presets {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.timer-preset {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-preset.active { border-color: var(--orange); color: var(--orange); }

.timer-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.timer-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-btn.active { border-color: var(--orange); color: var(--orange); }

/* =============================================
   SET CARD
   ============================================= */
.set-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.set-card.done {
  border-color: var(--green);
  opacity: 0.6;
}

.set-card.current { border-color: var(--orange); }
.set-card.upcoming { opacity: 0.4; }

.set-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.set-number { font-size: 14px; font-weight: 600; }
.set-type { font-size: 11px; color: var(--text-sec); }

/* =============================================
   EXERCISE CARD
   ============================================= */
.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.exercise-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.exercise-last { font-size: 12px; color: var(--text-sec); margin-bottom: 12px; }

/* =============================================
   VOLUME BAR
   ============================================= */
.volume-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.volume-label { font-size: 13px; width: 70px; flex-shrink: 0; }
.volume-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.volume-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.volume-change {
  font-size: 12px;
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

.volume-change.up { color: var(--green); }
.volume-change.down { color: var(--red); }

/* =============================================
   ROUND PILLS
   ============================================= */
.round-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  justify-content: center;
}

.round-pill {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid var(--border);
  color: var(--text-sec);
}

.round-pill.done { background: var(--green); border-color: var(--green); color: #fff; }
.round-pill.current { border-color: var(--orange); color: var(--orange); }

/* =============================================
   PROGRESS BAR
   ============================================= */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  width: 100%;
}

.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* =============================================
   PR BADGE
   ============================================= */
.pr-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(232, 114, 12, 0.15);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  margin: 2px 4px 2px 0;
}

/* =============================================
   FEELING SELECTOR
   ============================================= */
.feeling-selector {
  display: flex;
  gap: 8px;
}

.feeling-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.feeling-btn.selected { border-color: var(--orange); background: rgba(232, 114, 12, 0.1); }

/* =============================================
   CHART
   ============================================= */
.chart-container {
  width: 100%;
  height: 180px;
  position: relative;
  margin-bottom: 8px;
}

.chart-bar-group {
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  height: 140px;
  padding: 0 8px;
  position: relative;
}

.chart-bar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
}

.chart-bar {
  width: 32px;
  background: var(--orange);
  border-radius: 4px 4px 0 0;
  transition: height 0.5s ease;
  min-height: 2px;
}

.chart-label { font-size: 11px; color: var(--text-sec); }
.chart-value { font-size: 10px; color: var(--text-ter); }

.chart-goal-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 2px dashed var(--text-ter);
  z-index: 1;
}

/* =============================================
   WARMUP ITEM
   ============================================= */
.warmup-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.warmup-item:last-child { border-bottom: none; }

.warmup-check {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s;
}

.warmup-check.checked { background: var(--green); border-color: var(--green); }
.warmup-text { font-size: 14px; flex: 1; }
.warmup-duration { font-size: 12px; color: var(--text-sec); }

/* =============================================
   SETTINGS ROWS
   ============================================= */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}

.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 15px; }
.settings-value { font-size: 15px; color: var(--text-sec); }

/* =============================================
   DONE PAGE STATS
   ============================================= */
.done-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.done-stat-box {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
}

.done-stat-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
.done-stat-value { font-size: 18px; font-weight: 700; }
.done-stat-sub { font-size: 11px; color: var(--text-ter); margin-top: 2px; }

/* =============================================
   SUPERSET GROUP
   ============================================= */
.superset-group {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}

.superset-header {
  background: rgba(155, 89, 182, 0.1);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
}

.superset-group .exercise-card {
  border: none;
  border-radius: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.superset-group .exercise-card:last-child { border-bottom: none; }

/* =============================================
   BACK BUTTON
   ============================================= */
.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--orange);
  padding: 8px 0;
  margin-bottom: 8px;
}

/* =============================================
   CELEBRATION
   ============================================= */
.celebration {
  text-align: center;
  padding: 32px 0 24px;
}

.celebration-icon {
  width: 64px;
  height: 64px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}

/* =============================================
   SCROLLBAR STYLE
   ============================================= */
.page::-webkit-scrollbar { width: 0; }

/* =============================================
   EXPANDABLE
   ============================================= */
.expandable-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.expandable-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.expandable-content.open { max-height: 500px; }

.chevron {
  transition: transform 0.3s;
  color: var(--text-sec);
}

.chevron.open { transform: rotate(180deg); }

/* =============================================
   MOTIVATION CARD
   ============================================= */
.motivation-card {
  background: linear-gradient(135deg, rgba(232,114,12,0.15), rgba(155,89,182,0.1));
  border: 1px solid rgba(232,114,12,0.3);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.motivation-text {
  font-size: 15px;
  font-style: italic;
  line-height: 1.4;
}
</style>
</head>
<body>

<div id="app">
  <!-- =============================================
       HOME PAGE
       ============================================= -->
  <div id="page-home" class="page active">
    <div id="home-content"></div>
  </div>

  <!-- =============================================
       TRAINING PAGE
       ============================================= -->
  <div id="page-training" class="page">
    <div id="training-content"></div>
  </div>

  <!-- =============================================
       STATS PAGE
       ============================================= -->
  <div id="page-stats" class="page">
    <div id="stats-content"></div>
  </div>

  <!-- =============================================
       SETTINGS PAGE
       ============================================= -->
  <div id="page-settings" class="page">
    <div id="settings-content"></div>
  </div>

  <!-- =============================================
       BOTTOM NAVIGATION
       ============================================= -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <span>Home</span>
    </button>
    <button class="nav-item" data-page="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4M6 12h12"/>
      </svg>
      <span>Training</span>
    </button>
    <button class="nav-item" data-page="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="6" width="4" height="15" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Stats</span>
    </button>
    <button class="nav-item" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span>Settings</span>
    </button>
  </nav>
</div>

const STORAGE_KEY = 'training-app';

function getDefaultState() {
  return {
    settings: {
      bodyWeight: 82.5,
      weightHistory: [],
      mesocycle: { number: 1, currentWeek: 1, weeksHard: 5, weeksDeload: 1 },
      goals: { weeklyVolume: 0, ruecken: 0, brust: 0, quads: 0, hams: 0 },
      goalsAutoSet: false
    },
    sessions: [],
    activeWorkout: null,
    prs: [],
    customWeights: {} // user overrides for default exercise weights
  };
}

let APP_STATE = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return Object.assign(getDefaultState(), parsed);
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
  return getDefaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_STATE));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

// =============================================
// SAMPLE DATA GENERATION
// =============================================

function generateSampleData() {
  const state = getDefaultState();
  const baseDate = new Date('2026-05-11'); // Week 1 start (Monday)
  const bw = state.settings.bodyWeight;

  // Generate 3 complete weeks + partial week 4
  for (let week = 1; week <= 4; week++) {
    const weekStart = new Date(baseDate);
    weekStart.setDate(weekStart.getDate() + (week - 1) * 7);

    WEEK_SCHEDULE.forEach((wid, idx) => {
      // Week 4: only first 2 workouts done
      if (week === 4 && idx >= 2) return;

      const plan = WORKOUT_PLANS[wid];
      const dayOffsets = { va: 0, ra: 2, vb: 4, rb: 6 };
      const sessionDate = new Date(weekStart);
      sessionDate.setDate(sessionDate.getDate() + dayOffsets[wid]);

      const session = {
        id: `s-w${week}-${wid}`,
        workoutId: wid,
        date: sessionDate.toISOString().split('T')[0],
        week: week,
        mesocycle: 2,
        duration: 2700 + Math.floor(Math.random() * 900),
        feeling: ['hard', 'good', 'easy'][Math.floor(Math.random() * 3)],
        sets: {},
        warmupDone: true,
        circuitRounds: {},
        notes: ''
      };

      // Progressive overload: slightly increase weights/reps each week
      const progression = 1 + (week - 1) * 0.03;

      // Strength sets
      plan.strength.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          const r = Math.max(maxRep - s, parseInt(ex.reps.split('-')[0] || '6'));
          sets.push({ weight: w, reps: r, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      // Circuit exercises
      plan.circuits.forEach(circuit => {
        const rounds = circuit.rounds - (Math.random() > 0.7 ? 1 : 0);
        session.circuitRounds[circuit.id] = rounds;
        circuit.exercises.forEach(ex => {
          const sets = [];
          for (let r = 0; r < rounds; r++) {
            const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
            const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps);
            sets.push({ weight: w, reps: maxRep, type: 'working' });
          }
          session.sets[ex.id] = sets;
        });
      });

      // Accessories
      plan.accessories.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round((ex.weight || 10) * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          sets.push({ weight: w, reps: maxRep, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      state.sessions.push(session);
    });
  }

  // Detect PRs from sample data
  state.prs = detectAllPRs(state.sessions);

  return state;
}

// =============================================
// PR DETECTION
// =============================================

function detectAllPRs(sessions) {
  const prs = [];
  const bestByExercise = {};

  // Sort sessions by date
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));

  sorted.forEach(session => {
    Object.entries(session.sets || {}).forEach(([exId, sets]) => {
      sets.forEach(set => {
        const volume = set.weight * set.reps;
        if (!bestByExercise[exId] || volume > bestByExercise[exId]) {
          if (bestByExercise[exId]) {
            prs.push({
              exerciseId: exId,
              date: session.date,
              weight: set.weight,
              reps: set.reps,
              volume: volume,
              week: session.week,
              mesocycle: session.mesocycle
            });
          }
          bestByExercise[exId] = volume;
        }
      });
    });
  });

  return prs;
}

function checkPR(exerciseId, weight, reps) {
  const volume = weight * reps;
  let best = 0;
  APP_STATE.sessions.forEach(s => {
    (s.sets[exerciseId] || []).forEach(set => {
      const v = set.weight * set.reps;
      if (v > best) best = v;
    });
  });
  return volume > best && best > 0;
}

function getExerciseName(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex.name;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex.name;
    for (const ex of plan.accessories) if (ex.id === exId) return ex.name;
  }
  return exId;
}

function getExerciseInfo(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex;
    for (const ex of plan.accessories) if (ex.id === exId) return ex;
  }
  return null;
}

function isDumbbellExercise(exId) {
  const ex = getExerciseInfo(exId);
  return ex ? !!ex.dumbbell : false;
}

// Get effective weight for volume calculation (doubles for DB exercises)
function getVolumeWeight(exId, trackedWeight) {
  return isDumbbellExercise(exId) ? trackedWeight * 2 : trackedWeight;
}

// =============================================
// TIMER
// =============================================

let timerInterval = null;
let timerSeconds = 0;
let timerMode = 'stopped'; // 'stopped' | 'running' | 'countdown'
let timerTarget = 0;
let timerCallback = null;

function startTimer(mode, seconds, cb) {
  stopTimer();
  timerMode = mode;
  timerCallback = cb;
  if (mode === 'countdown') {
    timerSeconds = seconds;
    timerTarget = 0;
  } else {
    timerSeconds = 0;
    timerTarget = Infinity;
  }
  timerInterval = setInterval(() => {
    if (timerMode === 'countdown') {
      timerSeconds--;
      if (timerSeconds <= 0) {
        timerSeconds = 0;
        stopTimer();
        if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      }
    } else {
      timerSeconds++;
    }
    updateTimerDisplay();
  }, 1000);
  updateTimerDisplay();
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  timerMode = 'stopped';
}

function pauseTimer() {
  if (timerInterval) {
    clearInterval(timerInterval);
    timerInterval = null;
  }
}

function resumeTimer() {
  if (timerMode !== 'stopped' && !timerInterval) {
    const mode = timerMode;
    timerInterval = setInterval(() => {
      if (mode === 'countdown') {
        timerSeconds--;
        if (timerSeconds <= 0) {
          timerSeconds = 0;
          stopTimer();
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
      } else {
        timerSeconds++;
      }
      updateTimerDisplay();
    }, 1000);
  }
}

function formatTime(seconds) {
  const m = Math.floor(Math.abs(seconds) / 60);
  const s = Math.abs(seconds) % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-display');
  if (el) el.textContent = formatTime(timerSeconds);
}

// =============================================
// VOLUME CALCULATIONS
// =============================================

function calcSessionVolume(session) {
  let total = 0;
  Object.entries(session.sets || {}).forEach(([exId, sets]) => {
    const multiplier = isDumbbellExercise(exId) ? 2 : 1;
    sets.forEach(set => { total += set.weight * multiplier * set.reps; });
  });
  return total;
}

function calcMuscleVolume(session, muscle) {
  const plan = WORKOUT_PLANS[session.workoutId];
  if (!plan) return 0;
  const totalVolume = calcSessionVolume(session);
  const pct = plan.muscleSplit[muscle] || 0;
  return Math.round(totalVolume * pct / 100);
}

function calcWeekVolume(week, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcSessionVolume(s), 0);
}

function calcWeekMuscleVolume(week, muscle, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcMuscleVolume(s, muscle), 0);
}

function getLastSession(workoutId) {
  const sessions = APP_STATE.sessions
    .filter(s => s.workoutId === workoutId)
    .sort((a, b) => b.date.localeCompare(a.date));
  return sessions[0] || null;
}

function getLastSessionSets(exerciseId) {
  const sorted = [...APP_STATE.sessions].sort((a, b) => b.date.localeCompare(a.date));
  for (const s of sorted) {
    if (s.sets[exerciseId]) return s.sets[exerciseId];
  }
  return null;
}

function formatLastSession(exerciseId) {
  const sets = getLastSessionSets(exerciseId);
  if (!sets || sets.length === 0) return null;
  const reps = sets.map(s => s.reps).join('/');
  const w = sets[0].weight;
  return `${reps} @ ${w}kg`;
}

function calcTotalReps(sets) {
  return (sets || []).reduce((sum, s) => sum + s.reps, 0);
}

function calcTotalVolume(sets) {
  return (sets || []).reduce((sum, s) => sum + s.weight * s.reps, 0);
}

function getWeekDateRange(week) {
  const baseDate = new Date('2026-05-11'); // Meso 2, Week 1 start
  const start = new Date(baseDate);
  start.setDate(start.getDate() + (week - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => `${d.getDate()}.${d.getMonth() + 1}`;
  return `${fmt(start)} - ${fmt(end)}`;
}

function getCurrentWeekWorkoutStatus(workoutId) {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const session = APP_STATE.sessions.find(
    s => s.workoutId === workoutId && s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  );
  if (session) return 'done';
  // Check if this is the next workout
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  if (WEEK_SCHEDULE.indexOf(workoutId) === doneCount) return 'current';
  if (WEEK_SCHEDULE.indexOf(workoutId) < doneCount) return 'done';
  return 'pending';
}

function getNextWorkoutId() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  return WEEK_SCHEDULE[Math.min(doneCount, WEEK_SCHEDULE.length - 1)];
}

function renderPage(page) {
  switch (page) {
    case 'home': renderHomePage(); break;
    case 'training': renderTrainingPage(); break;
    case 'stats': renderStatsPage(); break;
    case 'settings': renderSettingsPage(); break;
  }
}

// =============================================
// HOME PAGE RENDER
// =============================================

function renderHomePage() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;
  const progressPct = (cw / totalWeeks) * 100;

  // This week's workouts
  let workoutRows = '';
  WEEK_SCHEDULE.forEach(wid => {
    const plan = WORKOUT_PLANS[wid];
    const status = getCurrentWeekWorkoutStatus(wid);
    const statusClass = status;
    const checkHtml = status === 'done' ? ICONS.check : '';
    workoutRows += `
      <div class="workout-row" onclick="openWorkout('${wid}')">
        <div class="workout-status ${statusClass}">${checkHtml}</div>
        <div class="workout-info">
          <div class="workout-name">${plan.name}</div>
          <div class="workout-sub">${plan.subtitle}</div>
        </div>
        <div class="workout-day">${plan.day}</div>
      </div>`;
  });

  // Volume last week
  const lastWeek = Math.max(1, cw - 1);
  const muscles = ['ruecken', 'brust', 'quads', 'hams'];
  const muscleLabels = { ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hams' };
  const muscleColors = { ruecken: 'var(--blue)', brust: 'var(--orange)', quads: 'var(--green)', hams: 'var(--purple)' };

  let volumeBars = '';
  const maxMuscleVol = Math.max(...muscles.map(m => calcWeekMuscleVolume(lastWeek, m)));
  muscles.forEach(m => {
    const vol = calcWeekMuscleVolume(lastWeek, m);
    const prevVol = lastWeek > 1 ? calcWeekMuscleVolume(lastWeek - 1, m) : vol;
    const change = prevVol > 0 ? Math.round((vol - prevVol) / prevVol * 100) : 0;
    const pct = maxMuscleVol > 0 ? (vol / maxMuscleVol * 100) : 0;
    const changeClass = change >= 0 ? 'up' : 'down';
    const changeStr = change >= 0 ? `+${change}%` : `${change}%`;
    volumeBars += `
      <div class="volume-bar-row">
        <div class="volume-label">${muscleLabels[m]}</div>
        <div class="volume-bar-bg"><div class="volume-bar-fill" style="width:${pct}%;background:${muscleColors[m]}"></div></div>
        <div class="volume-change ${changeClass}">${changeStr}</div>
      </div>`;
  });

  // Recent PRs
  const recentPRs = APP_STATE.prs.slice(-5).reverse();
  let prHtml = '';
  if (recentPRs.length > 0) {
    prHtml = '<div class="card"><h3>Aktuelle PRs</h3><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
    recentPRs.forEach(pr => {
      prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
    });
    prHtml += '</div></div>';
  }

  document.getElementById('home-content').innerHTML = `
    <h1>Training</h1>
    <p style="color:var(--text-sec);margin-bottom:20px">Dein Fortschritt</p>

    <!-- Mesocycle Card -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>Mesozyklus ${meso.number}</h3>
        <span style="color:var(--orange);font-size:14px;font-weight:600">Woche ${cw}</span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:8px">
        ${Array.from({length: meso.weeksHard}, (_, i) => {
          const w = i + 1;
          const cls = w < cw ? 'done' : w === cw ? 'current' : 'future';
          return `<div class="week-pill" style="padding:4px 8px;font-size:11px;flex:1;text-align:center;${cls === 'done' ? 'background:var(--green);border-color:var(--green);color:#fff;opacity:0.7' : cls === 'current' ? 'background:var(--orange);border-color:var(--orange);color:#fff' : 'opacity:0.5'}">W${w}</div>`;
        }).join('')}
        <div class="week-pill" style="padding:4px 8px;font-size:11px;flex:1;text-align:center;opacity:0.5">DL</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <!-- This Week -->
    <div class="section-title">Diese Woche</div>
    <div class="card">${workoutRows}</div>

    <!-- Volume Section -->
    ${APP_STATE.sessions.length > 0 ? `
    <div class="section-title">Volumen W${lastWeek}</div>
    <div class="card">
      <div class="expandable-header" onclick="toggleExpand(this)">
        <span style="font-size:14px;font-weight:600">Muskelgruppen</span>
        <span class="chevron">${ICONS.chevDown}</span>
      </div>
      <div class="expandable-content open" style="margin-top:12px">
        ${volumeBars}
      </div>
    </div>
    ` : `
    <div class="card" style="text-align:center;padding:24px 16px">
      <div style="font-size:32px;margin-bottom:8px">${ICONS.flame || '🔥'}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">Bereit fuer Mesozyklus ${meso.number}!</div>
      <div style="font-size:13px;color:var(--text-sec)">Starte dein erstes Training. Nach W1 werden automatisch progressive Ziele berechnet (+15% ueber 5 Wochen).</div>
    </div>
    `}

    ${prHtml}
  `;
}

function toggleExpand(el) {
  const content = el.nextElementSibling;
  const chevron = el.querySelector('.chevron');
  content.classList.toggle('open');
  chevron.classList.toggle('open');
}

// =============================================
// TRAINING PAGE RENDER
// =============================================

function renderTrainingPage() {
  if (trainingView === 'workout-detail') {
    renderWorkoutDetail();
  } else {
    renderWeekOverview();
  }
}

function renderWeekOverview() {
  selectedWeek = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;

  // Week pills
  let weekPills = '';
  for (let w = 1; w <= meso.weeksHard; w++) {
    const cls = w < cw ? 'done' : w === cw ? 'current' : 'future';
    const selected = w === selectedWeek ? 'border:2px solid #fff;' : '';
    weekPills += `<button class="week-pill ${cls}" style="${selected}" onclick="selectWeek(${w})">W${w}</button>`;
  }
  weekPills += `<button class="week-pill future" onclick="selectWeek(${totalWeeks})">DL</button>`;

  // Workout rows for selected week
  let workoutRows = '';
  WEEK_SCHEDULE.forEach(wid => {
    const plan = WORKOUT_PLANS[wid];
    const session = APP_STATE.sessions.find(
      s => s.workoutId === wid && s.week === selectedWeek && s.mesocycle === meso.number
    );
    const isDone = !!session;
    const status = isDone ? 'done' : (selectedWeek === cw ? getCurrentWeekWorkoutStatus(wid) : 'pending');
    const checkHtml = isDone ? ICONS.check : '';
    const volStr = session ? `${Math.round(calcSessionVolume(session) / 1000)}t` : '-';

    workoutRows += `
      <div class="workout-row" onclick="openWorkout('${wid}')">
        <div class="workout-status ${status}">${checkHtml}</div>
        <div class="workout-info">
          <div class="workout-name">${plan.name}</div>
          <div class="workout-sub">${plan.subtitle} ${isDone ? '- ' + volStr : ''}</div>
        </div>
        <div class="workout-day">${plan.day}</div>
      </div>`;
  });

  // Weekly summary
  const weekSessions = APP_STATE.sessions.filter(s => s.week === selectedWeek && s.mesocycle === meso.number);
  const weekVol = weekSessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);

  // Next workout button (only show for current week)
  const nextBtn = selectedWeek === cw
    ? `<button class="btn btn-orange" style="margin:16px 0" onclick="startNextWorkout()">Naechstes Training starten</button>`
    : '';

  document.getElementById('training-content').innerHTML = `
    <h1>Training</h1>
    <p style="color:var(--text-sec);margin-bottom:16px">Wochenplan</p>

    <div class="week-pills">${weekPills}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600">Woche ${selectedWeek}</span>
      <span style="font-size:12px;color:var(--text-sec)">${getWeekDateRange(selectedWeek)}</span>
    </div>

    ${nextBtn}

    <div class="card">${workoutRows}</div>

    <div class="card">
      <div style="display:flex;justify-content:space-between">
        <div>
          <div style="font-size:12px;color:var(--text-sec)">Sessions</div>
          <div style="font-size:20px;font-weight:700">${weekSessions.length}/4</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--text-sec)">Volumen</div>
          <div style="font-size:20px;font-weight:700">${(weekVol / 1000).toFixed(1)}t</div>
        </div>
      </div>
    </div>
  `;
}

function selectWeek(w) {
  selectedWeek = w;
  renderWeekOverview();
}

function openWorkout(workoutId) {
  activeWorkoutId = workoutId;
  trainingView = 'workout-detail';
  activeSubTab = 'warmup';
  warmupChecked = {};

  // Check if there's an existing session for this workout in current week
  const existing = APP_STATE.sessions.find(
    s => s.workoutId === workoutId &&
         s.week === (selectedWeek || APP_STATE.settings.mesocycle.currentWeek) &&
         s.mesocycle === APP_STATE.settings.mesocycle.number
  );

  if (existing) {
    activeSession = JSON.parse(JSON.stringify(existing));
    activeSubTab = 'done';
  } else {
    activeSession = {
      id: uuid(),
      workoutId: workoutId,
      date: new Date().toISOString().split('T')[0],
      week: selectedWeek || APP_STATE.settings.mesocycle.currentWeek,
      mesocycle: APP_STATE.settings.mesocycle.number,
      duration: 0,
      feeling: null,
      sets: {},
      warmupDone: false,
      circuitRounds: {},
      notes: '',
      _startTime: Date.now(),
      _currentStrengthSet: {},
      _currentCircuitRound: {},
      _completed: false
    };
  }

  navigateTo('training');
}

function startNextWorkout() {
  const nextId = getNextWorkoutId();
  selectedWeek = APP_STATE.settings.mesocycle.currentWeek;
  openWorkout(nextId);
}

function backToWeekOverview() {
  trainingView = 'week-overview';
  stopTimer();
  renderTrainingPage();
}

// =============================================
// WORKOUT DETAIL RENDER
// =============================================

function renderWorkoutDetail() {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  if (!plan) return;

  const week = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const isCompleted = activeSession && activeSession._completed;

  // Sub tabs
  const tabs = ['warmup', 'strength', 'zirkel', 'acc'];
  if (isCompleted) tabs.push('done');

  let tabsHtml = tabs.map(t => {
    const labels = { warmup: 'Warmup', strength: 'Strength', zirkel: 'Zirkel', acc: 'Acc', done: 'Done' };
    return `<button class="sub-tab ${activeSubTab === t ? 'active' : ''}" onclick="switchSubTab('${t}')">${labels[t]}</button>`;
  }).join('');

  let content = '';
  switch (activeSubTab) {
    case 'warmup': content = renderWarmupTab(plan); break;
    case 'strength': content = renderStrengthTab(plan); break;
    case 'zirkel': content = renderZirkelTab(plan); break;
    case 'acc': content = renderAccTab(plan); break;
    case 'done': content = renderDoneTab(plan); break;
  }

  document.getElementById('training-content').innerHTML = `
    <button class="back-btn" onclick="backToWeekOverview()">${ICONS.back} Woche ${week}</button>
    <h2>${plan.name}</h2>
    <p style="color:var(--text-sec);margin-bottom:16px">${plan.subtitle}</p>
    <div class="sub-tabs">${tabsHtml}</div>
    ${content}
  `;
}

function switchSubTab(tab) {
  activeSubTab = tab;
  renderWorkoutDetail();
}

// =============================================
// WARMUP TAB
// =============================================

function renderWarmupTab(plan) {
  let items = '';
  plan.warmup.forEach((ex, i) => {
    const checked = warmupChecked[ex.id] ? 'checked' : '';
    items += `
      <div class="warmup-item">
        <div class="warmup-check ${checked}" onclick="toggleWarmup('${ex.id}')">
          ${warmupChecked[ex.id] ? ICONS.check : ''}
        </div>
        <div class="warmup-text">${ex.name}</div>
        <div class="warmup-duration">${ex.duration}</div>
      </div>`;
  });

  const allDone = plan.warmup.every(ex => warmupChecked[ex.id]);

  return `
    <div class="card" style="text-align:center;padding:24px">
      <div id="timer-display" class="timer-display">${formatTime(timerSeconds)}</div>
      <div class="timer-controls">
        <button class="timer-btn" onclick="toggleWarmupTimer()">
          ${timerInterval ? ICONS.pause : ICONS.play}
        </button>
        <button class="timer-btn" onclick="resetWarmupTimer()">${ICONS.reset}</button>
      </div>
    </div>
    <div class="card">${items}</div>
    ${allDone ? '<button class="btn btn-orange" onclick="switchSubTab(\'strength\')">Weiter: Strength</button>' : ''}
  `;
}

function toggleWarmup(id) {
  warmupChecked[id] = !warmupChecked[id];
  if (activeSession) activeSession.warmupDone = Object.values(warmupChecked).every(v => v);
  renderWorkoutDetail();
}

function toggleWarmupTimer() {
  if (timerInterval) {
    pauseTimer();
  } else if (timerMode === 'stopped') {
    startTimer('running', 0);
  } else {
    resumeTimer();
  }
  renderWorkoutDetail();
}

function resetWarmupTimer() {
  stopTimer();
  timerSeconds = 0;
  renderWorkoutDetail();
}

// =============================================
// STRENGTH TAB
// =============================================

function renderStrengthTab(plan) {
  let html = '';

  plan.strength.forEach(ex => {
    const lastStr = formatLastSession(ex.id);
    const sessionSets = activeSession.sets[ex.id] || [];
    const currentSetIndex = activeSession._currentStrengthSet
      ? (activeSession._currentStrengthSet[ex.id] || sessionSets.length)
      : sessionSets.length;
    const hasPyramid = ex.pyramidWeights && ex.pyramidWeights.length > 0;
    const isEMOM = !!ex.emom;
    const dbLabel = ex.dumbbell ? ' (pro DB)' : '';

    // Build subtitle line
    let subtitleText = '';
    if (isEMOM) {
      subtitleText = `EMOM ${ex.emomMinutes}min @ ${ex.weight}kg${dbLabel}`;
    } else if (hasPyramid) {
      subtitleText = `Pyramid ${ex.sets}x${ex.reps} | ${ex.pyramidWeights.join('-')}kg${dbLabel}`;
    } else if (ex.pyramidWeights && ex.pyramidWeights.length === ex.sets) {
      subtitleText = `${ex.sets}x${ex.reps} | ${ex.pyramidWeights.join('-')}kg${dbLabel}`;
    } else {
      subtitleText = `${ex.sets}x${ex.reps} @ ${ex.weight}kg${dbLabel}`;
    }
    if (ex.note) subtitleText += ` (${ex.note})`;

    html += `<div class="exercise-card">
      <div class="exercise-name">${ex.name}</div>
      <div class="exercise-last">${subtitleText}${lastStr ? ' | Letztes Mal: ' + lastStr : ''}</div>`;

    // Timer section — different for EMOM vs regular
    if (isEMOM) {
      // EMOM: show a big 1-minute countdown that auto-restarts
      const emomRound = sessionSets.length + 1;
      const emomDone = sessionSets.length >= ex.sets;
      html += `
        <div style="text-align:center;margin:12px 0;padding:12px;border-radius:12px;background:rgba(232,114,12,0.1)">
          <div style="font-size:12px;color:var(--orange);font-weight:600;margin-bottom:4px">EMOM ${ex.emomMinutes} MIN</div>
          <div style="font-size:11px;color:var(--text-sec);margin-bottom:8px">Minute ${Math.min(emomRound, ex.sets)} / ${ex.sets}</div>
          <div id="timer-display" class="timer-display" style="font-size:48px;padding:4px 0;color:var(--orange)">${formatTime(timerSeconds)}</div>
          <div class="timer-controls" style="margin-top:8px">
            <button class="timer-preset" onclick="startCountdown(60)" style="font-size:14px;padding:8px 16px">60s Start</button>
            <button class="timer-btn" onclick="toggleCountdownTimer()">${timerInterval ? ICONS.pause : ICONS.play}</button>
            <button class="timer-btn" onclick="resetCountdownTimer()">${ICONS.reset}</button>
          </div>
        </div>`;
    } else {
      // Regular rest timer
      const restDefault = ex.restSeconds || 120;
      const restPresets = ex.restSeconds === 75 ? [60, 75, 90] : [120, 150, 180];
      html += `
        <div style="text-align:center;margin:12px 0">
          <div id="timer-display" class="timer-display" style="font-size:36px;padding:8px 0">${formatTime(timerSeconds)}</div>
          <div class="timer-presets">
            ${restPresets.map(s => `<button class="timer-preset ${timerSeconds === s ? 'active' : ''}" onclick="startCountdown(${s})">${formatTime(s)}</button>`).join('')}
          </div>
          <div class="timer-controls">
            <button class="timer-btn" onclick="toggleCountdownTimer()">${timerInterval ? ICONS.pause : ICONS.play}</button>
            <button class="timer-btn" onclick="resetCountdownTimer()">${ICONS.reset}</button>
          </div>
        </div>`;
    }

    // Completed sets
    sessionSets.forEach((set, i) => {
      const isPR = checkPR(ex.id, set.weight, set.reps);
      html += `
        <div class="set-card done">
          <div class="set-header">
            <span class="set-number">${isEMOM ? 'Min ' + (i + 1) : 'Satz ' + (i + 1)} ${ICONS.check}</span>
            <span class="set-type">${set.type === 'drop' ? 'Drop' : isEMOM ? 'EMOM' : 'Working'} ${isPR ? ICONS.trophy : ''}</span>
          </div>
          <div style="display:flex;gap:12px;font-size:14px;color:var(--text-sec)">
            <span>${set.weight}kg${dbLabel}</span>
            <span>${set.reps} Reps</span>
          </div>
        </div>`;
    });

    // Current set input
    const totalSets = ex.sets;
    if (currentSetIndex < totalSets || !activeSession._completed) {
      const setNum = sessionSets.length + 1;
      const bw = ex.bodyweight;
      // For pyramid: use the weight for this specific set
      const defaultWeight = hasPyramid && ex.pyramidWeights[sessionSets.length] !== undefined
        ? ex.pyramidWeights[sessionSets.length]
        : (ex.pyramidWeights && ex.pyramidWeights[sessionSets.length] !== undefined ? ex.pyramidWeights[sessionSets.length] : ex.weight);
      const setLabel = isEMOM ? 'EMOM'
        : hasPyramid ? (sessionSets.length < Math.ceil(ex.sets / 2) ? 'Aufsteigend' : 'Absteigend')
        : 'Working';
      html += `
        <div class="set-card current">
          <div class="set-header">
            <span class="set-number">${isEMOM ? 'Min ' + setNum : 'Satz ' + setNum}</span>
            <span class="set-type">${setLabel}</span>
          </div>
          <div class="input-row">
            ${bw ? '<div class="input-group"><div class="input-label">Gewicht</div><div style="text-align:center;padding:10px;font-size:16px">BW</div></div>' :
            `<div class="input-group">
              <div class="input-label">Gewicht (kg)${dbLabel}</div>
              <input type="number" inputmode="decimal" class="input-field" id="weight-${ex.id}" value="${defaultWeight}" step="0.5">
            </div>`}
            <div class="input-group">
              <div class="input-label">Reps</div>
              <input type="number" inputmode="decimal" class="input-field" id="reps-${ex.id}" value="${parseInt(ex.reps.split('-')[1] || ex.reps)}">
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-orange" style="flex:2" onclick="finishStrengthSet('${ex.id}', ${bw})">${isEMOM ? 'Minute done' : 'Satz fertig'}</button>
          ${isEMOM ? '' : '<button class="btn btn-outline btn-sm" onclick="addDropSet(\'' + ex.id + '\', ' + bw + ')">+ Drop</button>'}
        </div>`;
    }

    // Upcoming sets (dimmed) — show planned pyramid weight or EMOM minutes
    for (let i = sessionSets.length + 1; i < totalSets; i++) {
      const upcomingWeight = hasPyramid && ex.pyramidWeights[i] !== undefined
        ? ` @ ${ex.pyramidWeights[i]}kg`
        : (ex.pyramidWeights && ex.pyramidWeights[i] !== undefined ? ` @ ${ex.pyramidWeights[i]}kg` : '');
      const upcomingLabel = isEMOM ? `Min ${i + 1}`
        : `Satz ${i + 1}${upcomingWeight}`;
      const upcomingType = isEMOM ? 'EMOM'
        : hasPyramid ? (i < Math.ceil(ex.sets / 2) ? 'Aufsteigend' : 'Absteigend') : 'Working';
      html += `
        <div class="set-card upcoming" style="margin-top:8px">
          <div class="set-header">
            <span class="set-number">${upcomingLabel}</span>
            <span class="set-type">${upcomingType}</span>
          </div>
        </div>`;
    }

    html += '</div>';
  });

  // Check if all strength sets are done
  const allDone = plan.strength.every(ex => {
    const sets = activeSession.sets[ex.id] || [];
    return sets.length >= ex.sets;
  });

  if (allDone) {
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'zirkel\')">Weiter: Zirkel</button>';
  }

  return html;
}

function finishStrengthSet(exId, isBW) {
  const weight = isBW ? APP_STATE.settings.bodyWeight : parseFloat(document.getElementById(`weight-${exId}`).value) || 0;
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });

  // Start rest timer — use exercise-specific rest time
  const exInfo = getExerciseInfo(exId);
  const restTime = (exInfo && exInfo.restSeconds) ? exInfo.restSeconds : 120;
  startCountdown(restTime);

  // Check for PR
  if (checkPR(exId, weight, reps)) {
    APP_STATE.prs.push({
      exerciseId: exId,
      date: activeSession.date,
      weight, reps,
      volume: weight * reps,
      week: activeSession.week,
      mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

function addDropSet(exId, isBW) {
  const weight = isBW ? APP_STATE.settings.bodyWeight : parseFloat(document.getElementById(`weight-${exId}`).value) || 0;
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight: Math.round(weight * 0.7), reps, type: 'drop' });

  startCountdown(90);
  saveState();
  renderWorkoutDetail();
}

function startCountdown(seconds) {
  startTimer('countdown', seconds);
}

function toggleCountdownTimer() {
  if (timerInterval) {
    pauseTimer();
  } else if (timerMode === 'stopped') {
    startTimer('countdown', 150);
  } else {
    resumeTimer();
  }
  renderWorkoutDetail();
}

function resetCountdownTimer() {
  stopTimer();
  timerSeconds = 0;
  renderWorkoutDetail();
}

// =============================================
// ZIRKEL TAB
// =============================================

function renderZirkelTab(plan) {
  let html = '';

  plan.circuits.forEach((circuit, ci) => {
    const rounds = circuit.doubleRounds ? circuit.rounds * 2 : circuit.rounds;
    const completedRounds = activeSession.circuitRounds[circuit.id] || 0;
    const currentRound = completedRounds + 1;
    const displayRounds = circuit.rounds;
    const isDouble = circuit.doubleRounds;

    // For double rounds: show main round number + sub-round
    const getDoubleRoundLabel = (r) => {
      if (!isDouble) return `${r}`;
      const mainRound = Math.ceil(r / 2);
      const subRound = (r % 2 === 1) ? 'a' : 'b';
      return `${mainRound}${subRound}`;
    };

    html += `
      <div style="margin-bottom:24px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <h3>${circuit.name}</h3>
          <span style="font-size:12px;color:var(--text-sec)">${circuit.type} | ${displayRounds} Runden${isDouble ? ' (2x)' : ''}</span>
        </div>
        ${circuit.note ? `<div style="font-size:11px;color:var(--orange);margin-bottom:8px">${circuit.note}</div>` : ''}

        <div class="round-pills">
          ${Array.from({length: rounds}, (_, r) => {
            const rn = r + 1;
            const cls = rn <= completedRounds ? 'done' : rn === currentRound ? 'current' : '';
            return `<div class="round-pill ${cls}">${getDoubleRoundLabel(rn)}</div>`;
          }).join('')}
        </div>`;

    // Timer — use circuit-specific rest time
    const circuitRest = circuit.restSeconds || 90;
    const timerPresets = circuitRest >= 150 ? [120, 150, 180] : circuitRest >= 90 ? [60, 90, 120] : [45, 60, 90];
    html += `
      <div style="text-align:center;margin:8px 0">
        <div id="timer-display" class="timer-display" style="font-size:32px;padding:4px 0">${formatTime(timerSeconds)}</div>
        <div class="timer-presets">
          ${timerPresets.map(s => `<button class="timer-preset" onclick="startCountdown(${s})">${formatTime(s)}</button>`).join('')}
        </div>
      </div>`;

    // Current round exercises
    if (currentRound <= rounds) {
      circuit.exercises.forEach(ex => {
        const bw = ex.bodyweight;
        const dbLabel = ex.dumbbell ? ' (pro DB)' : '';
        const weightLabel = bw ? '@ BW' : '@ ' + ex.weight + 'kg' + dbLabel;
        html += `
          <div class="exercise-card">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-last">${ex.reps} ${weightLabel}${ex.note ? ' (' + ex.note + ')' : ''}</div>
            <div class="input-row" style="margin-top:8px">
              ${bw ? '<div class="input-group"><div class="input-label">Gewicht</div><div style="text-align:center;padding:8px;font-size:14px">BW</div></div>' :
              `<div class="input-group">
                <div class="input-label">Gewicht (kg)${dbLabel}</div>
                <input type="number" inputmode="decimal" class="input-field" id="cw-${ex.id}" value="${ex.weight}" step="0.5">
              </div>`}
              <div class="input-group">
                <div class="input-label">Reps</div>
                <input type="number" inputmode="decimal" class="input-field" id="cr-${ex.id}" value="${parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps)}">
              </div>
            </div>
          </div>`;
      });

      const roundLabel = isDouble ? getDoubleRoundLabel(currentRound) : currentRound;
      html += `<button class="btn btn-orange" onclick="finishCircuitRound('${circuit.id}', ${ci})">Runde ${roundLabel} done</button>`;
    }

    html += '</div>';
  });

  // Check all circuits done (double rounds count 2x)
  const allDone = plan.circuits.every(c => {
    const totalRounds = c.doubleRounds ? c.rounds * 2 : c.rounds;
    return (activeSession.circuitRounds[c.id] || 0) >= totalRounds;
  });
  if (allDone) {
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'acc\')">Weiter: Accessories</button>';
  }

  return html;
}

function finishCircuitRound(circuitId, circuitIndex) {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  const circuit = plan.circuits[circuitIndex];

  // Save exercise data for this round
  circuit.exercises.forEach(ex => {
    const bw = ex.bodyweight;
    const weightEl = document.getElementById(`cw-${ex.id}`);
    const repsEl = document.getElementById(`cr-${ex.id}`);
    const weight = bw ? APP_STATE.settings.bodyWeight : (weightEl ? parseFloat(weightEl.value) : ex.weight);
    const reps = repsEl ? parseInt(repsEl.value) : parseInt(ex.reps.split('-')[1] || ex.reps);

    if (!activeSession.sets[ex.id]) activeSession.sets[ex.id] = [];
    activeSession.sets[ex.id].push({ weight, reps, type: 'working' });
  });

  activeSession.circuitRounds[circuitId] = (activeSession.circuitRounds[circuitId] || 0) + 1;

  // Use circuit-specific rest time (0 = no auto timer, e.g. for double rounds)
  const restTime = circuit.restSeconds || 90;
  if (restTime > 0) startCountdown(restTime);
  saveState();
  renderWorkoutDetail();
}

function renderAccTab(plan) {
  let html = '';

  let groupHtml = '';

  plan.accessories.forEach((ex, i) => {
    // Handle grouped exercises
    if (ex.group && ex.groupName) {
      if (currentGroup !== ex.groupName) {
        if (currentGroup) html += groupHtml + '</div>';
        currentGroup = ex.groupName;
        const typeLabel = ex.group === 'triple' ? 'Triple Set' : 'Superset';
        groupHtml = `<div class="superset-group"><div class="superset-header">${typeLabel}: ${ex.groupName}</div>`;
      }
      groupHtml += renderAccExercise(ex);

      // Check if next is same group
      const next = plan.accessories[i + 1];
      if (!next || next.groupName !== ex.groupName) {
        html += groupHtml + '</div>';

        groupHtml = '';

    } else {
      if (currentGroup) {
        html += groupHtml + '</div>';

  if (currentGroup) html += groupHtml + '</div>';

  html += '<button class="btn btn-green" style="margin-top:20px" onclick="finishWorkout()">Training abschliessen</button>';

function finishAccSet(exId, isBW) {
  const weight = isBW ? APP_STATE.settings.bodyWeight : parseFloat(document.getElementById(`aw-${exId}`).value) || 0;
  const reps = parseInt(document.getElementById(`ar-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });

  if (checkPR(exId, weight, reps)) {
    APP_STATE.prs.push({
      exerciseId: exId, date: activeSession.date,
      weight, reps, volume: weight * reps,
      week: activeSession.week, mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

// =============================================
// FINISH WORKOUT
// =============================================

function finishWorkout() {
  if (!activeSession) return;

  activeSession._completed = true;
  activeSession.duration = activeSession._startTime
    ? Math.round((Date.now() - activeSession._startTime) / 1000)
    : 3600;

  // Remove internal props before saving
  const toSave = { ...activeSession };
  delete toSave._startTime;
  delete toSave._currentStrengthSet;
  delete toSave._currentCircuitRound;
  delete toSave._completed;

  // Replace or add session
  const idx = APP_STATE.sessions.findIndex(s => s.id === toSave.id);
  if (idx >= 0) {
    APP_STATE.sessions[idx] = toSave;
  } else {
    APP_STATE.sessions.push(toSave);
  }

  stopTimer();

  // Check if auto-goals should be set after W1 completion
  checkAutoGoals();

  saveState();

  activeSubTab = 'done';
  renderWorkoutDetail();
}

// =============================================
// AUTO-GOAL ENGINE
// Progressive Overload: +15% over 5 weeks (~3% per week)
// Based on Renaissance Periodization / Eric Helms research
// =============================================

function checkAutoGoals() {
  const meso = APP_STATE.settings.mesocycle;

  // Only auto-set goals once, after W1 is complete
  if (APP_STATE.settings.goalsAutoSet) return;

  // Check if all 4 W1 workouts exist
  const w1Sessions = APP_STATE.sessions.filter(
    s => s.week === 1 && s.mesocycle === meso.number
  );
  const w1WorkoutIds = new Set(w1Sessions.map(s => s.workoutId));
  const allW1Done = WEEK_SCHEDULE.every(wid => w1WorkoutIds.has(wid));

  if (!allW1Done) return;

  // Calculate W1 baseline volumes
  const baseTotal = w1Sessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);
  const muscles = ['ruecken', 'brust', 'quads', 'hams'];
  const baseMuscle = {};
  muscles.forEach(m => {
    baseMuscle[m] = w1Sessions.reduce((sum, s) => sum + calcMuscleVolume(s, m), 0);
  });

  // Set W5 targets: baseline + 15% (challenging but sustainable)
  // Weekly progression: ~3% per week linear ramp
  const TARGET_INCREASE = 0.15; // 15% over 5 weeks
  APP_STATE.settings.goals.weeklyVolume = Math.round(baseTotal * (1 + TARGET_INCREASE));
  muscles.forEach(m => {
    APP_STATE.settings.goals[m] = Math.round(baseMuscle[m] * (1 + TARGET_INCREASE));
  });

  APP_STATE.settings.goalsAutoSet = true;
  APP_STATE.settings.goalsBaseline = {
    weeklyVolume: baseTotal,
    ruecken: baseMuscle.ruecken,
    brust: baseMuscle.brust,
    quads: baseMuscle.quads,
    hams: baseMuscle.hams
  };

  console.log('Auto-Goals gesetzt! Baseline:', baseTotal, '→ Ziel W5:', APP_STATE.settings.goals.weeklyVolume);
}

// Get the progressive target for a specific week (linear ramp from baseline to W5 goal)
function getWeekTarget(week, muscle) {
  const baseline = APP_STATE.settings.goalsBaseline;
  const goals = APP_STATE.settings.goals;
  if (!baseline || !goals) return 0;

  const key = muscle || 'weeklyVolume';
  const base = baseline[key] || 0;
  const target = goals[key] || 0;

  if (base === 0 || target === 0) return 0;

  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard;

  if (week >= totalWeeks + 1) {
    // Deload week: -40% from peak
    return Math.round(target * 0.6);
  }

  // Linear interpolation: W1 = base, W5 = target
  const progress = (week - 1) / (totalWeeks - 1);
  return Math.round(base + (target - base) * progress);
}

// DONE TAB
// =============================================

function renderDoneTab(plan) {
  const session = activeSession || APP_STATE.sessions.find(
    s => s.workoutId === activeWorkoutId &&
         s.week === (selectedWeek || APP_STATE.settings.mesocycle.currentWeek) &&
         s.mesocycle === APP_STATE.settings.mesocycle.number
  );

  if (!session) return '<p style="text-align:center;color:var(--text-sec);padding:40px 0">Kein abgeschlossenes Training</p>';

  const totalVol = calcSessionVolume(session);
  const duration = session.duration || 0;
  const durationMin = Math.round(duration / 60);

  // Muscle volume boxes
  const split = plan.muscleSplit;
  const muscleLabels = { ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hams', bizeps: 'Bizeps', core: 'Core', trizeps: 'Trizeps', schultern: 'Schultern' };

  let statsBoxes = '';
  Object.entries(split).forEach(([muscle, pct]) => {
    const vol = Math.round(totalVol * pct / 100);
    const totalReps = Object.entries(session.sets || {}).reduce((sum, [_, sets]) => sum + calcTotalReps(sets), 0);
    const muscleReps = Math.round(totalReps * pct / 100);
    statsBoxes += `
      <div class="done-stat-box">
        <div class="done-stat-label">${muscleLabels[muscle] || muscle}</div>
        <div class="done-stat-value">${(vol / 1000).toFixed(1)}t</div>
        <div class="done-stat-sub">${muscleReps} Reps</div>
      </div>`;
  });

  // PRs from this session
  const sessionPRs = APP_STATE.prs.filter(pr => pr.date === session.date);
  let prHtml = '';
  if (sessionPRs.length > 0) {
    prHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin:12px 0">';
    sessionPRs.forEach(pr => {
      prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
    });
    prHtml += '</div>';
  }

  // Compare with last session
  const lastSession = APP_STATE.sessions.find(
    s => s.workoutId === session.workoutId && s.id !== session.id && s.date < session.date
  );
  let improvHtml = '';
  if (lastSession) {
    const lastVol = calcSessionVolume(lastSession);
    const volChange = totalVol - lastVol;
    const volPct = lastVol > 0 ? Math.round(volChange / lastVol * 100) : 0;
    const changeClass = volChange >= 0 ? 'up' : 'down';
    const sign = volChange >= 0 ? '+' : '';
    improvHtml = `
      <div class="card">
        <h3>Steigerungen</h3>
        <div style="margin-top:8px;display:flex;justify-content:space-between">
          <span>Volumen vs. letztes Mal</span>
          <span class="volume-change ${changeClass}">${sign}${volPct}% (${sign}${(volChange/1000).toFixed(1)}t)</span>
        </div>
      </div>`;
  }

  // Motivation messages
  const motivations = [
    'Jede Wiederholung zaehlt. Du wirst staerker!',
    'Konsistenz schlaegt Intensitaet. Weiter so!',
    'Der Koerper erreicht, was der Geist glaubt.',
    'Fortschritt ist Fortschritt, egal wie klein.',
    'Heute hast du dein zukuenftiges Ich staerker gemacht.'
  ];
  const motivText = motivations[Math.floor(Math.random() * motivations.length)];

  // Feeling selector
  const feeling = session.feeling || (activeSession && activeSession.feeling);
  const feelings = [
    { id: 'hard', label: 'Hart' },
    { id: 'good', label: 'Gut' },
    { id: 'easy', label: 'Easy' }
  ];

  return `
    <div class="celebration">
      <div class="celebration-icon">${ICONS.check}</div>
      <h2>Stark trainiert!</h2>
      <p style="color:var(--text-sec);margin-top:4px">${plan.name} | ${durationMin} Min.</p>
    </div>

    <div class="done-stats">${statsBoxes}</div>

    ${prHtml}

    ${improvHtml}

    <div class="motivation-card">
      <div class="motivation-text">${motivText}</div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">Wie hat es sich angefuehlt?</h3>
      <div class="feeling-selector">
        ${feelings.map(f => `
          <button class="feeling-btn ${feeling === f.id ? 'selected' : ''}" onclick="setFeeling('${f.id}')">
            ${f.label}
          </button>
        `).join('')}
      </div>
    </div>

    <button class="btn btn-outline" style="margin-top:12px" onclick="backToWeekOverview()">Zurueck zur Uebersicht</button>
  `;
}

function setFeeling(feeling) {
  if (activeSession) {
    activeSession.feeling = feeling;
    // Update saved session too
    const idx = APP_STATE.sessions.findIndex(s => s.id === activeSession.id);
    if (idx >= 0) APP_STATE.sessions[idx].feeling = feeling;
    saveState();
    renderWorkoutDetail();
  }
}

function renderStatsAll() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;

  // Weekly volume chart
  let bars = '';
  let maxVol = goal;
  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekVolume(w);
    if (vol > maxVol) maxVol = vol;
  }

  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekVolume(w);
    const pct = maxVol > 0 ? (vol / maxVol * 100) : 0;
    bars += `
      <div class="chart-bar-wrapper">
        <div class="chart-value">${(vol/1000).toFixed(1)}t</div>
        <div class="chart-bar" style="height:${pct}%"></div>
        <div class="chart-label">W${w}</div>
      </div>`;
  }

  const goalPct = maxVol > 0 ? (goal / maxVol * 100) : 50;
  const goalBottom = goalPct;

  // Mesocycle progress
  const startVol = calcWeekVolume(1);
  const currentVol = calcWeekVolume(cw);
  const progressPct = goal > 0 ? Math.min(100, (currentVol / goal * 100)) : 0;

  // 1RM estimates (simplified: max weight * (1 + reps/30))
  const strengthExercises = [];
  Object.values(WORKOUT_PLANS).forEach(plan => {
    plan.strength.forEach(ex => {
      let best1RM = 0;
      let first1RM = 0;
      APP_STATE.sessions.forEach((s, si) => {
        (s.sets[ex.id] || []).forEach(set => {
          const est = set.weight * (1 + set.reps / 30);
          if (si < 4 && !first1RM) first1RM = est;
          if (est > best1RM) best1RM = est;
        });
      });
      if (best1RM > 0) {
        const change = first1RM > 0 ? Math.round((best1RM - first1RM) / first1RM * 100) : 0;
        strengthExercises.push({ name: ex.name, rm: Math.round(best1RM * 10) / 10, change });
      }
    });
  });

  let rmHtml = '';
  strengthExercises.forEach(ex => {
    const cls = ex.change >= 0 ? 'up' : 'down';
    const sign = ex.change >= 0 ? '+' : '';
    rmHtml += `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${ex.name}</span>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:14px;font-weight:600">${ex.rm}kg</span>
          <span class="volume-change ${cls}" style="font-size:12px">${sign}${ex.change}%</span>
        </div>
      </div>`;
  });

  // Recent PRs
  const recentPRs = APP_STATE.prs.filter(pr => pr.mesocycle === APP_STATE.settings.mesocycle.number).slice(-8).reverse();
  let prHtml = '';
  recentPRs.forEach(pr => {
    prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
  });

  return `
    <div class="card">
      <h3 style="margin-bottom:12px">Wochen-Volumen</h3>
      <div class="chart-container">
        <div class="chart-bar-group" style="position:relative">
          <div class="chart-goal-line" style="bottom:${goalBottom}%;position:absolute;left:0;right:0"></div>
          ${bars}
        </div>
        <div style="text-align:right;font-size:10px;color:var(--text-ter);margin-top:4px">Ziel: ${(goal/1000).toFixed(1)}t ---</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">Mesozyklus Fortschritt</h3>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-sec);margin-bottom:8px">
        <span>Start: ${(startVol/1000).toFixed(1)}t</span>
        <span>Aktuell: ${(currentVol/1000).toFixed(1)}t</span>
        <span>Ziel: ${(goal/1000).toFixed(1)}t</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">1RM Entwicklung</h3>
      ${rmHtml}
    </div>

    ${prHtml ? '<div class="card"><h3 style="margin-bottom:8px">PRs Mesozyklus</h3><div style="display:flex;flex-wrap:wrap;gap:4px">' + prHtml + '</div></div>' : ''}
  `;
}

    bars += `
      <div class="chart-bar-wrapper">
        <div class="chart-value">${(vol/1000).toFixed(1)}t</div>
        <div class="chart-bar" style="height:${pct}%;background:${barColor}"></div>
        <div class="chart-label">W${w}</div>
      </div>`;
  }

  // Progression
  const startVol = calcWeekMuscleVolume(1, muscle);
  const currentVol = calcWeekMuscleVolume(cw, muscle);
  const progressPct = goal > 0 ? Math.min(100, (currentVol / goal * 100)) : 0;

  // Exercises for this muscle
  const exercises = [];
  Object.values(WORKOUT_PLANS).forEach(plan => {
    if (!plan.muscleSplit[muscle]) return;
    const allExercises = [...plan.strength, ...plan.circuits.flatMap(c => c.exercises), ...plan.accessories];
    allExercises.forEach(ex => {
      if (exercises.find(e => e.id === ex.id)) return;
      let best1RM = 0, first1RM = 0;
      APP_STATE.sessions.forEach((s, si) => {
        (s.sets[ex.id] || []).forEach(set => {
          const est = set.weight * (1 + set.reps / 30);
          if (si < 4 && !first1RM) first1RM = est;
          if (est > best1RM) best1RM = est;
        });
      });
      if (best1RM > 0) {
        const change = first1RM > 0 ? Math.round((best1RM - first1RM) / first1RM * 100) : 0;
        exercises.push({ id: ex.id, name: ex.name, rm: Math.round(best1RM * 10) / 10, change });
      }
    });
  });

  let exHtml = '';
  exercises.forEach(ex => {
    const cls = ex.change >= 0 ? 'up' : 'down';
    const sign = ex.change >= 0 ? '+' : '';
    exHtml += `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${ex.name}</span>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:14px;font-weight:600">${ex.rm}kg</span>
          <span class="volume-change ${cls}">${sign}${ex.change}%</span>
        </div>
      </div>`;
  });

  // PRs for this muscle
  const musclePRs = APP_STATE.prs.filter(pr => {
    const exName = getExerciseName(pr.exerciseId);
    return exercises.some(e => e.id === pr.exerciseId) && pr.mesocycle === APP_STATE.settings.mesocycle.number;
  }).slice(-6).reverse();

  let prHtml = '';
  musclePRs.forEach(pr => {
    prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
  });

  const goalPct = maxVol > 0 ? (goal / maxVol * 100) : 50;

  return `
    <div class="card">
      <h3 style="margin-bottom:12px">${muscleLabels[muscle]} Wochen-Volumen</h3>
      <div class="chart-container">
        <div class="chart-bar-group" style="position:relative">
          <div class="chart-goal-line" style="bottom:${goalPct}%"></div>
          ${bars}
        </div>
        <div style="text-align:right;font-size:10px;color:var(--text-ter);margin-top:4px">Ziel: ${(goal/1000).toFixed(1)}t ---</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">Progression</h3>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-sec);margin-bottom:8px">
        <span>Start: ${(startVol/1000).toFixed(1)}t</span>
        <span>Aktuell: ${(currentVol/1000).toFixed(1)}t</span>
        <span>Ziel: ${(goal/1000).toFixed(1)}t</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%;background:${barColor}"></div></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">Uebungen</h3>
      ${exHtml || '<p style="color:var(--text-sec);font-size:14px">Keine Daten</p>'}
    </div>

    ${prHtml ? '<div class="card"><h3 style="margin-bottom:8px">PRs</h3><div style="display:flex;flex-wrap:wrap;gap:4px">' + prHtml + '</div></div>' : ''}
  `;
}

          <div style="display:flex;align-items:center;gap:4px">
            <input type="number" inputmode="decimal" class="input-field" style="width:60px;text-align:right;font-size:12px;padding:4px 6px" value="${w}" onchange="updateExWeight('${ex.id}',this.value)">
            <span style="color:var(--text-sec);font-size:11px">kg</span>
          </div>

    // Circuit exercises

      circuit.exercises.forEach(ex => {
        if (ex.bodyweight) return;
        const cw = (APP_STATE.customWeights || {})[ex.id];
        const w = cw !== undefined ? cw : ex.weight;
        exerciseList += `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">

            <div style="display:flex;align-items:center;gap:4px">
              <input type="number" inputmode="decimal" class="input-field" style="width:60px;text-align:right;font-size:12px;padding:4px 6px" value="${w}" onchange="updateExWeight('${ex.id}',this.value)">
              <span style="color:var(--text-sec);font-size:11px">kg</span>
            </div>
          </div>`;
      });
    });

    // Accessories
    plan.accessories.forEach(ex => {
      if (ex.bodyweight) return;
      const cw = (APP_STATE.customWeights || {})[ex.id];
      const w = cw !== undefined ? cw : ex.weight;
      exerciseList += `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:13px;flex:1">${ex.name} <span style="color:var(--text-ter);font-size:11px">${ex.sets}x${ex.reps}</span></div>
          <div style="display:flex;align-items:center;gap:4px">
            <input type="number" inputmode="decimal" class="input-field" style="width:60px;text-align:right;font-size:12px;padding:4px 6px" value="${w}" onchange="updateExWeight('${ex.id}',this.value)">
            <span style="color:var(--text-sec);font-size:11px">kg</span>
          </div>
        </div>`;
    });

    planRows += `
      <div class="settings-row" style="flex-direction:column;align-items:stretch">
        <div class="expandable-header" onclick="toggleExpand(this)" style="width:100%">
          <div>
            <div class="settings-label">${plan.name}</div>
            <div style="font-size:12px;color:var(--text-sec)">${plan.subtitle} - ${plan.day}</div>
          </div>
          <span class="chevron">${ICONS.chevDown}</span>
        </div>
        <div class="expandable-content">
          <div style="margin-top:8px">${exerciseList}</div>
        </div>
      </div>`;
  });

  document.getElementById('settings-content').innerHTML = `
    <h1>Einstellungen</h1>
    <p style="color:var(--text-sec);margin-bottom:20px">App-Konfiguration</p>

    <!-- Body Section -->
    <div class="section-title">Koerper</div>
    <div class="card">
      <div class="settings-row">
        <div class="settings-label">Koerpergewicht</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" inputmode="decimal" class="input-field" style="width:80px;text-align:right" value="${s.bodyWeight}" id="body-weight-input" step="0.1">
          <span style="color:var(--text-sec)">kg</span>
          <button class="btn btn-sm btn-orange" style="padding:6px 10px;min-height:28px;font-size:12px" onclick="updateBodyWeight()">OK</button>
        </div>
      </div>
      <div class="settings-row" style="flex-direction:column;align-items:stretch">
        <div class="expandable-header" onclick="toggleExpand(this)" style="width:100%">
          <span class="settings-label">Gewichtsverlauf</span>

        <div class="expandable-content">
          <div style="margin-top:8px">${weightHistory}</div>

    </div>

    <!-- Training Plans -->
    <div class="section-title">Trainingsplaene</div>
