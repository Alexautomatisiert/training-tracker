      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">' + tiles + '</div>';
  }

  // D) Widget 2: Top Performer - exercises with biggest top-set volume improvement
  var topPerformerHtml = '';
  if (APP_STATE.sessions.length > 0) {
    var performers = [];
    var prevWeek = Math.max(1, cw - 1);

    Object.values(WORKOUT_PLANS).forEach(function(plan) {
      var allEx = plan.strength.slice();
      plan.circuits.forEach(function(c) { allEx = allEx.concat(c.exercises); });

      allEx.forEach(function(ex) {
        var exDef = ex;
        // Current week best set volume
        var curBest = 0;
        var curWeight = 0; var curReps = 0;
        APP_STATE.sessions
          .filter(function(s) { return s.week === cw && s.mesocycle === meso.number; })
          .forEach(function(s) {
            var sets = getSessionSetsForEx(s, ex.id) || [];
            sets.forEach(function(set) {
              var w = Number(set.weight) || 0;
              var r = Number(set.reps) || 0;
              var vw = getVolumeWeight(ex.id, w);
              var vol = vw * r * getRepMultiplier(ex.id);
              if (vol > curBest) { curBest = vol; curWeight = w; curReps = r; }
            });
          });

        if (curBest <= 0) return;

        // Previous week (or previous meso equivalent week) best set volume
        var prevBest = 0;
        var prevWeight = 0; var prevReps = 0;
        // Try previous week in current meso first
        APP_STATE.sessions
          .filter(function(s) { return s.week === prevWeek && s.mesocycle === meso.number && prevWeek !== cw; })
          .forEach(function(s) {
            var sets = getSessionSetsForEx(s, ex.id) || [];
            sets.forEach(function(set) {
              var w = Number(set.weight) || 0;
              var r = Number(set.reps) || 0;
              var vw = getVolumeWeight(ex.id, w);
              var vol = vw * r * getRepMultiplier(ex.id);
              if (vol > prevBest) { prevBest = vol; prevWeight = w; prevReps = r; }
            });
          });
        // Fallback: previous meso same week
        if (prevBest <= 0 && meso.number > 1) {
          APP_STATE.sessions
            .filter(function(s) { return s.week === cw && s.mesocycle === meso.number - 1; })
            .forEach(function(s) {
              var sets = getSessionSetsForEx(s, ex.id) || [];
              sets.forEach(function(set) {
                var w = Number(set.weight) || 0;
                var r = Number(set.reps) || 0;
                var vw = getVolumeWeight(ex.id, w);
                var vol = vw * r * getRepMultiplier(ex.id);
                if (vol > prevBest) { prevBest = vol; prevWeight = w; prevReps = r; }
              });
            });
        }

        if (prevBest <= 0) return;
        var changePct = Math.round((curBest - prevBest) / prevBest * 100);
        var repDiff = curReps - prevReps;
        // Check if this is a PR
        var isPR = APP_STATE.prs.some(function(pr) { return pr.exerciseId === ex.id && pr.weight === curWeight && pr.reps === curReps; });

        performers.push({
          name: ex.name,
          weight: curWeight,
          reps: curReps,
          changePct: changePct,
          repDiff: repDiff,
          isPR: isPR,
          exDef: exDef
        });
      });
    });

    // Sort by changePct descending, take top 3
    performers.sort(function(a, b) { return b.changePct - a.changePct; });
    var top3 = performers.slice(0, 3);

    if (top3.length > 0) {
      var perfRows = '';
      top3.forEach(function(p) {
        var isDbl = p.exDef && p.exDef.dumbbell;
        var isWBW = p.exDef && p.exDef.weightedBW;
        var wLabel = isDbl ? p.weight + 'kg/DB' : (isWBW ? '+' + p.weight + 'kg' : p.weight + 'kg');
        var changeColor = p.changePct >= 0 ? 'var(--green)' : 'var(--red)';
        var repStr = p.repDiff !== 0 ? ' <span style="color:var(--green);font-size:11px">(+' + p.repDiff + ')</span>' : '';
        perfRows += '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">' +
          '<div style="display:flex;align-items:center;gap:6px">' +
            (p.isPR ? '<span>' + ICONS.trophy + '</span>' : '') +
            '<div><div style="font-size:13px;font-weight:600">' + p.name + '</div>' +
            '<div style="font-size:12px;color:var(--text-sec)">' + wLabel + ' x' + p.reps + '</div></div>' +
          '</div>' +
          '<div style="text-align:right"><span style="font-size:13px;font-weight:700;color:' + changeColor + '">' + (p.changePct >= 0 ? '+' : '') + p.changePct + '%</span>' + repStr + '</div>' +
        '</div>';
      });

      topPerformerHtml = '<div class="section-title" style="display:flex;justify-content:space-between;align-items:center">' +
        '<span>Top Performer</span>' +
        '<button style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:600;cursor:pointer" onclick="goToStatsAll()">Alle Stats →</button>' +
      '</div>' +
      '<div class="card">' + perfRows + '</div>';
    }
  }

  // E) Recent PRs with rep improvement
  const recentPRs = APP_STATE.prs.slice(-5).reverse();
  let prHtml = '';
  if (recentPRs.length > 0) {
    prHtml = '<div class="card"><h3>Aktuelle PRs</h3><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px">';
    recentPRs.forEach(function(pr) {
      // Find previous best volume for this exercise (older sessions)
      var prevBestVol = 0;
      var prevBestReps = 0;
      var prDate = pr.date || '';
      APP_STATE.sessions.forEach(function(s) {
        if (s.date >= prDate && prDate) return;
        var sets = getSessionSetsForEx(s, pr.exerciseId) || [];
        sets.forEach(function(set) {
          var w = Number(set.weight) || 0;
          var r = Number(set.reps) || 0;
          var vol = w * r;
          if (vol > prevBestVol) { prevBestVol = vol; prevBestReps = r; }
        });
      });
      var repDiffStr = '';
      if (prevBestVol > 0 && pr.reps > prevBestReps) {
        repDiffStr = ' <span style="color:var(--green);font-size:10px">(+' + (pr.reps - prevBestReps) + ')</span>';
      }
      prHtml += '<div class="pr-badge">' + ICONS.trophy + ' ' + getExerciseName(pr.exerciseId) + ' ' + pr.weight + 'kg x' + pr.reps + repDiffStr + '</div>';
    });
    prHtml += '</div></div>';
  }

  // G) Learnings widget (kept as-is)
  const recentLearnings = (APP_STATE.learnings || []).slice(-3).reverse();
  let learningsHtml = '';
  if (recentLearnings.length > 0) {
    recentLearnings.forEach(function(l) {
      const workoutName = l.workoutId && WORKOUT_PLANS[l.workoutId] ? WORKOUT_PLANS[l.workoutId].name : '';
      learningsHtml += '<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;line-height:1.4">' +
        '<div>' + l.text + '</div>' +
        '<div style="font-size:11px;color:var(--text-ter);margin-top:2px">' + l.date + (workoutName ? ' · ' + workoutName : '') + '</div>' +
      '</div>';
    });
  } else {
    learningsHtml = '<div style="text-align:center;padding:12px;color:var(--text-ter);font-size:13px">Noch keine Learnings</div>';
  }

  // Mesocycle selector: find all distinct meso numbers
  var allMesoNumbers = [];
  APP_STATE.sessions.forEach(function(s) {
    if (s.mesocycle && allMesoNumbers.indexOf(s.mesocycle) === -1) allMesoNumbers.push(s.mesocycle);
  });
  if (allMesoNumbers.indexOf(meso.number) === -1) allMesoNumbers.push(meso.number);
  allMesoNumbers.sort(function(a, b) { return a - b; });

  var mesoSelectorHtml = '';
  if (allMesoNumbers.length > 1) {
    var pills = '';
    allMesoNumbers.forEach(function(mn) {
      var isActive = mn === meso.number;
      var style = isActive
        ? 'background:var(--orange);color:#fff;border:1px solid var(--orange)'
        : 'background:var(--card);color:var(--text-sec);border:1px solid var(--border)';
      pills += '<button style="' + style + ';padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer" onclick="switchMesocycle(' + mn + ')">M' + mn + '</button>';
    });
    mesoSelectorHtml = '<div style="display:flex;gap:6px;margin-bottom:12px">' + pills + '</div>';
  }

  document.getElementById('home-content').innerHTML = `
    <!-- A) Compact Header -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
      <span style="font-size:16px;font-weight:700">${dateStr}</span>
      <div style="display:flex;align-items:center;gap:10px">
        <button style="background:none;border:none;color:var(--text-sec);font-size:12px;cursor:pointer;padding:2px" onclick="navigateTo('calendar')">Kalender</button>
        <span style="font-size:14px;font-weight:600;color:var(--orange)">${nextWorkoutLabel}</span>
      </div>
    </div>
    <div style="font-size:12px;color:var(--text-sec);margin-bottom:16px">${subtitleLine}</div>

    ${mesoSelectorHtml}
    ${deloadBanner}

    <!-- C) Mesocycle Card with clickable week pills -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>Mesozyklus ${meso.number}</h3>
        <span style="color:var(--orange);font-size:14px;font-weight:600">Woche ${cw}</span>
      </div>
      <div style="display:flex;gap:4px;margin-bottom:8px">
        ${Array.from({length: meso.weeksHard}, (_, i) => {
          const w = i + 1;
          const cls = w < cw ? 'done' : w === cw ? 'current' : 'future';
          return `<div class="week-pill" onclick="setHomeWeek(${w})" style="cursor:pointer;padding:4px 8px;font-size:11px;flex:1;text-align:center;${cls === 'done' ? 'background:var(--green);border-color:var(--green);color:#fff;opacity:0.7' : cls === 'current' ? 'background:var(--orange);border-color:var(--orange);color:#fff' : 'opacity:0.5'}">W${w}</div>`;
        }).join('')}
        <div class="week-pill" style="padding:4px 8px;font-size:11px;flex:1;text-align:center;opacity:0.5">DL</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <!-- This Week -->
    <div class="section-title">Diese Woche</div>
    <div class="card">${workoutRows}</div>

    ${APP_STATE.sessions.length > 0 ? '' : `
    <div class="card" style="text-align:center;padding:24px 16px">
      <div style="font-size:32px;margin-bottom:8px">${ICONS.flame || '🔥'}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">Bereit fuer Mesozyklus ${meso.number}!</div>
      <div style="font-size:13px;color:var(--text-sec)">Starte dein erstes Training. Nach W1 werden automatisch progressive Ziele berechnet (Runden-Progression + Volumen-Targets).</div>
    </div>
    `}

    <!-- Meso Goals Widget -->
    ${getMesoGoalWidget()}

    <!-- D) Muskel-Check + Top Performer -->
    ${muskelCheckHtml}
    ${topPerformerHtml}

    ${prHtml}

    <!-- Learnings Widget -->
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Learnings</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button style="background:var(--orange);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;line-height:28px;text-align:center;cursor:pointer" onclick="openLearningModal()">+</button>
        <button style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:600;cursor:pointer" onclick="goToLearnings()">Alle →</button>
      </div>
    </div>
    <div class="card">
      ${learningsHtml}
    </div>
  `;
}

// C) Helper: set current week from pill click
function setHomeWeek(week) {
  APP_STATE.settings.mesocycle.currentWeek = week;
  saveState();
  renderHomePage();
}

function switchMesocycle(mesoNum) {
  APP_STATE.settings.mesocycle.number = mesoNum;
  // Find the max week recorded for this meso
  var maxWeek = 1;
  APP_STATE.sessions.forEach(function(s) {
    if (s.mesocycle === mesoNum && s.week > maxWeek) maxWeek = s.week;
  });
  APP_STATE.settings.mesocycle.currentWeek = maxWeek;
  saveState();
  renderHomePage();
}

function goToStatsAll() {
  statsTab = 'alle';
  navigateTo('stats');
}

function goToLearnings() {
  statsTab = 'learnings';
  navigateTo('stats');
}

function toggleExpand(el) {
  const content = el.nextElementSibling;
  const chevron = el.querySelector('.chevron');
  content.classList.toggle('open');
  chevron.classList.toggle('open');
}

// =============================================
// TRAINING PAGE RENDER
// =============================================

function renderTrainingPage() {
  if (trainingView === 'workout-detail') {
    renderWorkoutDetail();
  } else if (trainingView === 'free-designer') {
    renderFreeDesigner();
  } else {
    renderWeekOverview();
  }
}

function renderWeekOverview() {
  selectedWeek = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;

  // Week pills
  let weekPills = '';
  for (let w = 1; w <= meso.weeksHard; w++) {
    const cls = w < cw ? 'done' : w === cw ? 'current' : 'future';
    const selected = w === selectedWeek ? 'border:2px solid #fff;' : '';
    weekPills += `<button class="week-pill ${cls}" style="${selected}" onclick="selectWeek(${w})">W${w}</button>`;
  }
  weekPills += `<button class="week-pill future" onclick="selectWeek(${totalWeeks})">DL</button>`;

  // Workout rows for selected week
  let workoutRows = '';
  WEEK_SCHEDULE.forEach(wid => {
    const plan = WORKOUT_PLANS[wid];
    var allV = getWorkoutVariants(wid);
    const session = APP_STATE.sessions.find(function(s) {
      return allV.indexOf(s.workoutId) !== -1 && s.week === selectedWeek && s.mesocycle === meso.number;
    });
    const isDone = !!session;
    const status = isDone ? 'done' : (selectedWeek === cw ? getCurrentWeekWorkoutStatus(wid) : 'pending');
    const checkHtml = isDone ? ICONS.check : '';
    const volStr = session ? `${Math.round(calcSessionVolume(session) / 1000)}t` : '-';
    const variantLabel = (session && session.workoutId !== wid) ? ' (Outdoor)' : '';

    workoutRows += `
      <div class="workout-row" onclick="openWorkout('${wid}')">
        <div class="workout-status ${status}">${checkHtml}</div>
        <div class="workout-info">
          <div class="workout-name">${plan.name}${variantLabel}</div>
          <div class="workout-sub">${plan.subtitle} ${isDone ? '- ' + volStr : ''}</div>
        </div>
        <div class="workout-day">${plan.day}</div>
      </div>`;
  });

  // Free workout sessions for this week
  var freeSessions = APP_STATE.sessions.filter(function(s) {
    return s.week === selectedWeek && s.mesocycle === meso.number && s.workoutId && s.workoutId.indexOf('free-') === 0;
  });
  var freeRows = '';
  freeSessions.forEach(function(session) {
    var fp = WORKOUT_PLANS[session.workoutId];
    var name = fp ? fp.name : 'Freies Workout';
    var volStr = Math.round(calcSessionVolume(session) / 1000) + 't';
    freeRows += '<div class="workout-row" onclick="openFreeSession(\'' + session.id + '\')">' +
      '<div class="workout-status done">' + ICONS.check + '</div>' +
      '<div class="workout-info">' +
      '<div class="workout-name">' + name + '</div>' +
      '<div class="workout-sub">Free - ' + volStr + '</div>' +
      '</div>' +
      '<div class="workout-day">' + session.date.split('-').slice(1).reverse().join('.') + '</div>' +
      '</div>';
  });
  var freeSessionsCard = freeRows ? '<div class="card" style="margin-top:8px">' + freeRows + '</div>' : '';

  // Weekly summary
  const weekSessions = APP_STATE.sessions.filter(s => s.week === selectedWeek && s.mesocycle === meso.number);
  const weekVol = weekSessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);

  // Next workout button (only show for current week)
  const nextBtn = selectedWeek === cw
    ? `<button class="btn btn-orange" style="margin:16px 0" onclick="startNextWorkout()">Naechstes Training starten</button>`
    : '';
  const freeBtn = `<button class="btn btn-outline" style="margin:0 0 16px 0;color:var(--orange);border-color:var(--orange)" onclick="openFreeDesigner()">Freies Workout</button>`;

  document.getElementById('training-content').innerHTML = `
    <h1>Training</h1>
    <p style="color:var(--text-sec);margin-bottom:16px">Wochenplan</p>

    <div class="week-pills">${weekPills}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600">Woche ${selectedWeek}</span>
      <span style="font-size:12px;color:var(--text-sec)">${getWeekDateRange(selectedWeek)}</span>
    </div>

    ${nextBtn}
    ${freeBtn}

    <div class="card">${workoutRows}</div>
    ${freeSessionsCard}

    <div class="card">
      <div style="display:flex;justify-content:space-between">
        <div>
          <div style="font-size:12px;color:var(--text-sec)">Sessions</div>
          <div style="font-size:20px;font-weight:700">${weekSessions.length}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--text-sec)">Volumen</div>
          <div style="font-size:20px;font-weight:700">${(weekVol / 1000).toFixed(1)}t</div>
        </div>
      </div>
    </div>
  `;
}

function selectWeek(w) {
  selectedWeek = w;
  renderWeekOverview();
}

function openWorkout(workoutId) {
  // If clicking a base workout that has variants, check if a variant session exists
  var variants = getWorkoutVariants(workoutId);
  if (variants.length > 1) {
    var targetWeek = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
    var existingVariant = APP_STATE.sessions.find(function(s) {
      return variants.indexOf(s.workoutId) !== -1 &&
             s.week === targetWeek &&
             s.mesocycle === APP_STATE.settings.mesocycle.number;
    });
    if (existingVariant) {
      doOpenWorkout(existingVariant.workoutId);
      return;
    }
  }
  // Default: open the base workout (variant can be switched in prep screen)
  doOpenWorkout(workoutId);
}

function switchToVariant(variantId) {
  // Switch current session to a different workout variant
  activeWorkoutId = variantId;
  activeSession.workoutId = variantId;
  activeSession.sets = {};
  activeSession.circuitRounds = {};
  activeSession._currentStrengthSet = {};
  activeSession._currentCircuitRound = {};
  activeSession._circuitDone = {};
  activeSession._readinessDone = false;
  warmupChecked = {};
  activeSubTab = 'prep';
  renderWorkoutDetail();
}

function doOpenWorkout(workoutId) {
  activeWorkoutId = workoutId;
  trainingView = 'workout-detail';
  activeSubTab = 'prep';
  warmupChecked = {};

  // Check if there's an existing session for this workout in current week
  // Also check variants of this workout
  var allVariants = getWorkoutVariants(getBaseWorkoutId(workoutId));
  const existing = APP_STATE.sessions.find(function(s) {
    return s.workoutId === workoutId &&
           s.week === (selectedWeek || APP_STATE.settings.mesocycle.currentWeek) &&
           s.mesocycle === APP_STATE.settings.mesocycle.number;
  });

  if (existing) {
    activeSession = JSON.parse(JSON.stringify(existing));
    activeSession._completed = true;  // It was saved = completed
    activeSubTab = 'done';
  } else {
    activeSession = {
      id: uuid(),
      workoutId: workoutId,
      date: new Date().toISOString().split('T')[0],
      week: selectedWeek || APP_STATE.settings.mesocycle.currentWeek,
      mesocycle: APP_STATE.settings.mesocycle.number,
      duration: 0,
      feeling: null,
      readiness: null,
      sets: {},
      warmupDone: false,
      circuitRounds: {},
      notes: '',
      _startTime: Date.now(),
      _currentStrengthSet: {},
      _currentCircuitRound: {},
      _completed: false,
      _circuitDone: {},
      _readinessDone: false
    };
    resetSessionTimer();
    // Timer starts when warmup timer is clicked, not immediately
  }

  navigateTo('training');
}

function startNextWorkout() {
  const nextId = getNextWorkoutId();
  selectedWeek = APP_STATE.settings.mesocycle.currentWeek;
  openWorkout(nextId);
}

function backToWeekOverview() {
  trainingView = 'week-overview';
  stopRestTimer();
  viewingRound = {};
  renderTrainingPage();
}

// =============================================
// WORKOUT DETAIL RENDER
// =============================================

function renderWorkoutDetail() {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  if (!plan) return;

  const week = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const isCompleted = activeSession && activeSession._completed;

  // Sub tabs - always show all tabs so user can view rounds even when completed
  var tabs;
  if (plan.isFree) {
    tabs = [];
    if (plan.strength && plan.strength.length > 0) tabs.push('strength');
    if (plan.circuits && plan.circuits.length > 0) tabs.push('zirkel');
    tabs.push('done');
  } else {
    tabs = ['prep', 'warmup', 'strength', 'zirkel', 'acc', 'done'];
  }

  let tabsHtml = tabs.map(t => {
    const labels = { prep: 'Prep', warmup: 'Warmup', strength: 'Strength', zirkel: 'Zirkel', acc: 'Acc', done: 'Done' };
    return `<button class="sub-tab ${activeSubTab === t ? 'active' : ''}" onclick="switchSubTab('${t}')">${labels[t]}</button>`;
  }).join('');

  // Session timer bar (shown during active workout)
  let sessionTimerHtml = '';
  if (activeSession && !activeSession._completed) {
    sessionTimerHtml = `
      <div class="session-timer-bar">
        <span>Session</span>
        <span class="session-timer-value timer-value">${formatTime(getSessionSeconds())}</span>
      </div>`;
  }

  let content = '';
  switch (activeSubTab) {
    case 'prep': content = renderPrepTab(plan); break;
    case 'warmup': content = renderWarmupTab(plan); break;
    case 'strength': content = renderStrengthTab(plan); break;
    case 'zirkel': content = renderZirkelTab(plan); break;
    case 'acc': content = renderAccTab(plan); break;
    case 'done': content = renderDoneTab(plan); break;
  }

  const learningBtn = activeSession && !activeSession._completed
    ? '<button onclick="openLearningModal()" style="position:fixed;bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);right:16px;width:48px;height:48px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:20px;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3)" id="learning-fab">💡</button>'
    : '';

  const cadenceBtn = activeSession && !activeSession._completed && (activeSubTab === 'strength' || activeSubTab === 'zirkel' || activeSubTab === 'acc')
    ? '<button onclick="startCadence()" style="position:fixed;bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);left:16px;height:40px;border-radius:20px;background:' + (cadenceState.active ? 'var(--orange)' : 'var(--card)') + ';border:1px solid var(--border);font-size:12px;font-weight:600;color:' + (cadenceState.active ? '#fff' : 'var(--text-sec)') + ';z-index:100;display:flex;align-items:center;justify-content:center;padding:0 14px;gap:6px;box-shadow:0 2px 8px rgba(0,0,0,0.3)">♫ Kadenz</button>'
    : '';

  document.getElementById('training-content').innerHTML = `
    <button class="back-btn" onclick="backToWeekOverview()">${ICONS.back} Woche ${week}</button>
    <h2>${plan.name}</h2>
    <p style="color:var(--text-sec);margin-bottom:16px">${plan.subtitle}</p>
    <div class="sub-tabs">${tabsHtml}</div>
    ${sessionTimerHtml}
    ${content}
    ${learningBtn}
    ${cadenceBtn}
  `;
}

function switchSubTab(tab) {
  activeSubTab = tab;
  renderWorkoutDetail();
}

// =============================================
// WARMUP TAB
// =============================================

function renderReadinessCheck() {
  if (!activeSession || activeSession._readinessDone || activeSession._completed) return '';
  var rd = activeSession.readiness || {};
  var hasAll = rd.sleep > 0 && rd.muscle1 > 0 && rd.muscle2 > 0 && rd.motivation > 0;
  var html = '<div class="card" style="margin-bottom:16px;border:1px solid var(--orange)">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html += '<div style="font-size:14px;font-weight:700;color:var(--text)">Recovery Check</div>';
  if (hasAll) {
    var score = Math.round((rd.sleep + rd.muscle1 + rd.muscle2 + rd.motivation) / 4 * 10) / 10;
    var scoreColor = score >= 4 ? 'var(--green)' : score >= 2.5 ? 'var(--orange)' : 'var(--red)';
    html += '<span style="font-size:14px;font-weight:700;color:' + scoreColor + '">' + score + '/5</span>';
  }
  html += '</div>';
  html += '<div style="font-size:11px;color:var(--text-ter);margin-bottom:12px">Bezogen auf die heutigen Zielmuskelgruppen</div>';

  // Slider 1: Schlaf
  var muscles = WORKOUT_TARGET_MUSCLES[activeWorkoutId] || ['Muskeln', 'Muskeln'];
  html += renderReadinessSlider('sleep', 'Schlaf', rd.sleep || 0, ['😴', '😐', '😊', '😄', '🌟']);
  html += renderReadinessSlider('muscle1', muscles[0], rd.muscle1 || 0, ['🔥', '😣', '😐', '💪', '🦾']);
  html += renderReadinessSlider('muscle2', muscles[1], rd.muscle2 || 0, ['🔥', '😣', '😐', '💪', '🦾']);
  html += renderReadinessSlider('motivation', 'Motivation', rd.motivation || 0, ['😩', '😕', '😐', '😤', '🔥']);

  if (hasAll) {
    html += '<button class="btn btn-sm btn-orange" style="width:100%;margin-top:8px" onclick="confirmReadiness()">Bereit — los gehts!</button>';
  }
  html += '</div>';
  return html;
}

function renderReadinessSlider(key, label, value, emojis) {
  var html = '<div style="margin-bottom:10px">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
  html += '<span style="font-size:12px;font-weight:600;color:var(--text-sec)">' + label + '</span>';
  if (value > 0) html += '<span style="font-size:14px">' + emojis[value - 1] + '</span>';
  html += '</div>';
  html += '<div style="display:flex;gap:4px">';
  for (var i = 1; i <= 5; i++) {
    var isSelected = value === i;
    var bg = isSelected ? (i <= 2 ? 'var(--red)' : i <= 3 ? 'var(--orange)' : 'var(--green)') : 'var(--bg)';
    var color = isSelected ? '#fff' : 'var(--text-sec)';
    html += '<button onclick="setReadiness(\'' + key + '\',' + i + ')" style="flex:1;padding:8px 0;font-size:13px;font-weight:' + (isSelected ? '700' : '400') + ';background:' + bg + ';color:' + color + ';border:1px solid ' + (isSelected ? 'transparent' : 'var(--border)') + ';border-radius:6px;cursor:pointer">' + i + '</button>';
  }
  html += '</div></div>';
  return html;
}

function setReadiness(key, value) {
  if (!activeSession) return;
  if (!activeSession.readiness) activeSession.readiness = {};
  activeSession.readiness[key] = value;
  saveState();
  renderWorkoutDetail();
}

function confirmReadiness() {
  if (!activeSession) return;
  activeSession._readinessDone = true;
  // Calculate score
  var rd = activeSession.readiness;
  if (rd) rd.score = Math.round((rd.sleep + (rd.muscle1 || rd.soreness || 0) + (rd.muscle2 || rd.soreness || 0) + rd.motivation) / 4 * 10) / 10;
  // Save to stored session
  var idx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
  if (idx >= 0) APP_STATE.sessions[idx].readiness = activeSession.readiness;
  saveState();
  renderWorkoutDetail();
}

function renderPrepTab(plan) {
  var html = '';

  // Variant switch button (only if variants exist for this workout's base)
  var baseId = getBaseWorkoutId(plan.id);
  var variants = getWorkoutVariants(baseId);
  if (variants.length > 1) {
    // Build variant options (exclude current)
    var otherVariants = variants.filter(function(v) { return v !== plan.id; });
    if (otherVariants.length > 0) {
      var btns = '';
      otherVariants.forEach(function(vid) {
        var vplan = WORKOUT_PLANS[vid];
        btns += '<div onclick="switchToVariant(\'' + vid + '\')" style="' +
          'display:flex;align-items:center;justify-content:space-between;' +
          'background:var(--card);border:1px solid var(--orange);border-radius:10px;' +
          'padding:10px 14px;cursor:pointer;margin-bottom:8px">' +
          '<div><div style="font-size:13px;font-weight:600;color:var(--orange)">' + vplan.subtitle + '</div>' +
          '<div style="font-size:11px;color:var(--text-sec)">' + vplan.strength[0].name + ' + ' + vplan.circuits[0].exercises.map(function(e){return e.name}).join(' + ') + '</div></div>' +
          '<span style="color:var(--orange);font-size:16px">&rarr;</span></div>';
      });
      html += '<div style="margin-bottom:12px">' +
        '<div style="font-size:11px;color:var(--text-ter);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Alternatives Training</div>' +
        btns + '</div>';
    }
  }

  // Recovery Check
  html += renderReadinessCheck();

  // Estimated Duration
  var dur = getEstimatedDuration(plan.id);
  if (dur) {
    html += '<div class="card" style="padding:12px;margin-bottom:12px;text-align:center">';
    html += '<div style="font-size:12px;color:var(--text-ter)">Geschätzte Dauer</div>';
    html += '<div style="font-size:20px;font-weight:700;color:var(--orange)">' + formatTime(dur) + '</div>';
    html += '</div>';
  }

  // Exercise Overview
  html += '<div class="card" style="padding:12px;margin-bottom:12px">';
  html += '<div style="font-size:14px;font-weight:700;margin-bottom:10px">Übersicht</div>';

  // Strength
  html += '<div style="font-size:12px;font-weight:600;color:var(--orange);margin-bottom:4px">Strength</div>';
  plan.strength.forEach(function(ex) {
    var dbLbl = ex.dumbbell ? ' (DB)' : '';
    var wLbl = ex.bodyweight ? 'BW' : ex.weight + 'kg' + dbLbl;
    html += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)">' +
      '<span>' + ex.name + '</span>' +
      '<span style="color:var(--text-sec)">' + ex.sets + '×' + ex.reps + ' @ ' + wLbl + '</span>' +
    '</div>';
  });

  // Circuits
  plan.circuits.forEach(function(circuit) {
    var targetR = getTargetRounds(circuit.rounds, activeSession ? activeSession.week : APP_STATE.settings.mesocycle.currentWeek);
    html += '<div style="font-size:12px;font-weight:600;color:var(--orange);margin-top:10px;margin-bottom:4px">' + circuit.name + ' (' + targetR + ' Runden)</div>';
    circuit.exercises.forEach(function(ex) {
      var dbLbl = ex.dumbbell ? ' (DB)' : '';
      var wLbl = ex.bodyweight ? 'BW' : ex.weight + 'kg' + dbLbl;
      html += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)">' +
        '<span>' + ex.name + '</span>' +
        '<span style="color:var(--text-sec)">' + ex.reps + ' @ ' + wLbl + '</span>' +
      '</div>';
    });
  });

  // Accessories
  html += '<div style="font-size:12px;font-weight:600;color:var(--orange);margin-top:10px;margin-bottom:4px">Accessories</div>';
  plan.accessories.forEach(function(ex) {
    var dbLbl = ex.dumbbell ? ' (DB)' : '';
    var wLbl = ex.bodyweight ? 'BW' : (ex.weight || '-') + 'kg' + dbLbl;
    html += '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:13px;border-bottom:1px solid var(--border)">' +
      '<span>' + ex.name + '</span>' +
      '<span style="color:var(--text-sec)">' + ex.sets + '×' + ex.reps + ' @ ' + wLbl + '</span>' +
    '</div>';
  });
  html += '</div>';

  // Start button
  var readyDone = activeSession && activeSession._readinessDone;
  html += '<button class="btn btn-orange" style="margin-top:8px" onclick="switchSubTab(\'warmup\')">' + (readyDone ? 'Weiter: Warmup' : 'Warmup starten') + '</button>';

  return html;
}

function renderWarmupTab(plan) {
  // Build cumulative time thresholds for display
  const thresholds = getWarmupThresholds(plan);
  const thresholdMap = {};
  thresholds.forEach(t => { thresholdMap[t.id] = t.at; });
  const elapsed = getCountupSeconds();

  let items = '';
  let currentWarmupIdx = -1;
  plan.warmup.forEach((ex, i) => {
    const checked = warmupChecked[ex.id] ? 'checked' : '';
    const threshold = thresholdMap[ex.id];
    const isActive = threshold !== undefined && elapsed >= threshold && !warmupChecked[ex.id];
    // Track first unchecked item as "current"
    if (currentWarmupIdx === -1 && !warmupChecked[ex.id]) currentWarmupIdx = i;
    // Show cumulative time as "@ 1:30" next to the duration
    const autoLabel = threshold !== undefined
      ? `<span style="color:${elapsed >= threshold ? 'var(--green)' : 'var(--text-ter)'};font-size:11px;margin-left:4px">@ ${formatTime(threshold)}</span>`
      : (ex.duration ? '' : '<span style="color:var(--text-ter);font-size:11px;margin-left:4px">manuell</span>');
    items += `
      <div class="warmup-item" id="warmup-ex-${i}" style="${currentWarmupIdx === i ? 'background:rgba(232,114,12,0.1);border-radius:8px' : ''}">
        <div class="warmup-check ${checked}" onclick="toggleWarmup('${ex.id}')">
          ${warmupChecked[ex.id] ? ICONS.check : ''}
        </div>
        <div class="warmup-text">${ex.name}</div>
        <div class="warmup-duration">${ex.duration}${autoLabel}</div>
      </div>`;
  });

  const allDone = plan.warmup.every(ex => warmupChecked[ex.id]);
  const timerRunning = restTimer.mode === 'countup';
  const totalWarmupTime = thresholds.length > 0 ? thresholds[thresholds.length - 1].at : 0;

  return `
    <div class="card" style="text-align:center;padding:10px 16px">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px">
        <button class="timer-btn" onclick="toggleWarmupTimer()" style="width:32px;height:32px;font-size:14px">
          ${isRestTimerRunning() ? ICONS.pause : ICONS.play}
        </button>
        <div class="rest-timer-display timer-display" style="font-size:32px">${formatTime(getTimerSeconds())}</div>
        <button class="timer-btn" onclick="resetWarmupTimer()" style="width:32px;height:32px;font-size:14px">${ICONS.reset}</button>
      </div>
      ${totalWarmupTime > 0 ? `<div style="font-size:10px;color:var(--text-ter);margin-top:2px">Auto-Check bis ${formatTime(totalWarmupTime)}</div>` : ''}
    </div>
    <div class="card" id="warmup-scroll-container" style="max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch">${items}</div>
    ${allDone ? '<button class="btn btn-orange" onclick="warmupToStrength()">Weiter: Strength</button>' : ''}
  `;
}

function autoScrollWarmup() {
  var container = document.getElementById('warmup-scroll-container');
  if (!container) return;
  // Find first item with highlight background (current exercise)
  var items = container.querySelectorAll('.warmup-item');
  for (var i = 0; i < items.length; i++) {
    if (items[i].style.background && items[i].style.background !== '') {
      items[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
    }
  }
}

function toggleWarmup(id) {
  // Save scroll position before re-render
  var container = document.getElementById('warmup-scroll-container');
  var scrollTop = container ? container.scrollTop : 0;
  warmupChecked[id] = !warmupChecked[id];
  if (activeSession) activeSession.warmupDone = Object.values(warmupChecked).every(v => v);
  var allDone = activeSession && activeSession.warmupDone;
  renderWorkoutDetail();
  // Restore scroll position or scroll to "Weiter" button if all done
  requestAnimationFrame(function() {
    if (allDone) {
      // Scroll the "Weiter: Strength" button into view
      var btn = document.querySelector('.btn-orange');
      if (btn && btn.textContent.indexOf('Strength') !== -1) {
        btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    } else {
      var c = document.getElementById('warmup-scroll-container');
      if (c) c.scrollTop = scrollTop;
    }
  });
}

function toggleWarmupTimer() {
  if (restTimer.mode === 'countup' && !isRestTimerPaused()) {
    pauseRestTimer();
  } else if (restTimer.mode === 'stopped') {
    startCountup();
    // Also start session timer on first warmup action
    if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  } else {
    resumeRestTimer();
  }
  renderWorkoutDetail();
}

function resetWarmupTimer() {
  resetRestTimer();
  // Also reset auto-checked warmup items
  warmupChecked = {};
  renderWorkoutDetail();
}

function warmupToStrength() {
  // Start session timer if not already started
  if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  switchSubTab('strength');
}

function renderStrengthTab(plan) {
  let html = '';

  plan.strength.forEach(ex => {
    const lastStr = formatLastSession(ex.id);
    const sessionSets = activeSession.sets[ex.id] || [];
    const currentSetIndex = activeSession._currentStrengthSet
      ? (activeSession._currentStrengthSet[ex.id] || sessionSets.length)
      : sessionSets.length;
    const hasPyramid = ex.pyramidWeights && ex.pyramidWeights.length > 0;
    const isEMOM = !!ex.emom;
    const dbLabel = ex.dumbbell ? ' (pro DB)' : '';

    // Build target range tag
    let targetTag = '';
    if (isEMOM) {
      targetTag = `EMOM ${ex.emomMinutes}min`;
    } else if (hasPyramid) {
      targetTag = `${ex.sets}x${ex.reps}`;
    } else {
      targetTag = `${ex.sets}x${ex.reps}`;
    }

    html += `<div class="exercise-card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:8px">
          <div class="exercise-name" style="margin:0">${ex.name}</div>
          <span style="font-size:11px;color:var(--orange);background:rgba(232,114,12,0.12);padding:2px 6px;border-radius:4px;white-space:nowrap">${targetTag}</span>
        </div>
        <button id="peek-icon-${ex.id}" onclick="event.stopPropagation();toggleHistoryPeek('${ex.id}')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:12px;color:var(--text-ter);cursor:pointer">📊</button>
      </div>
      <div id="peek-${ex.id}" style="display:none">${renderHistoryPeek(ex.id)}</div>`;

    // To Beat display
    const toBeatStr = formatToBeat(ex.id);
    if (toBeatStr) {
      html += `<div class="to-beat">${toBeatStr}</div>`;
    }
    // RPE Coaching tip for strength section
    html += renderCoachingTip('strength', activeWorkoutId);

    // Timer section - different for EMOM vs regular
    if (isEMOM) {
      // EMOM: continuous countdown timer
      const emomActive = emomTimer.running && emomTimer.exerciseId === ex.id;
      const emomDone = emomTimer.finished && emomTimer.exerciseId === ex.id;
      const emomRound = emomActive ? getEmomCurrentRound() : 0;
      const emomRemaining = emomActive ? getEmomRemaining() : getEmomTotalSeconds() || (ex.emomMinutes * 60 + 10);
      const isPrep = emomActive && emomRound === 0;

      if (!emomActive && !emomDone) {
        // Not started yet - show start button
        html += `
        <div style="text-align:center;margin:12px 0;padding:16px;border-radius:12px;background:rgba(232,114,12,0.1)">
          <div style="font-size:12px;color:var(--orange);font-weight:600;margin-bottom:4px">EMOM ${ex.emomMinutes} MIN</div>
          <div style="font-size:11px;color:var(--text-sec);margin-bottom:12px">${ex.sets} Runden × 60s + 10s Vorbereitung</div>
          <button class="btn btn-orange" style="font-size:16px;padding:12px 32px" onclick="startEmomTimer('${ex.id}', ${ex.sets}, 10)">EMOM Starten</button>
        </div>`;
      } else {
        // Timer running or finished
        const timerColor = isPrep ? 'var(--blue)' : (emomDone ? 'var(--green)' : 'var(--orange)');
        const statusText = isPrep ? 'Vorbereitung...' : (emomDone ? 'Fertig!' : 'Runde ' + emomRound + ' / ' + ex.sets);
        html += `
        <div style="text-align:center;margin:12px 0;padding:16px;border-radius:12px;background:var(--card);border:1px solid rgba(232,114,12,0.3);position:sticky;top:0;z-index:10">
          <div style="font-size:12px;color:${timerColor};font-weight:600;margin-bottom:4px">${statusText}</div>
          <div class="rest-timer-display emom-timer-display" style="font-family:'SF Mono','Menlo',monospace;font-size:48px;font-weight:700;padding:4px 0;color:${timerColor}">${formatTime(Math.ceil(emomRemaining))}</div>
          ${emomDone ? '<button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="resetEmomTimer(); renderWorkoutDetail();">Reset</button>' : ''}
        </div>`;
      }

      // Autofill button
      var confirmedCount = sessionSets.filter(function(s) { return s && s.reps > 0; }).length;
      if (confirmedCount > 0 && confirmedCount < ex.sets) {
        html += `<div style="text-align:center;margin:4px 0 8px">
          <button class="btn btn-sm btn-outline" onclick="autofillEmomSets('${ex.id}', ${ex.sets}, ${!!ex.bodyweight})" style="font-size:12px;padding:6px 16px">
            Alle Sätze ausfüllen (${confirmedCount > 0 ? sessionSets[0].weight + 'kg × ' + sessionSets[0].reps : ''})
          </button>
        </div>`;
      }

      // Show all rounds as input rows
      const toBeat = getToBeat(ex.id);
      for (var ri = 1; ri <= ex.sets; ri++) {
        var savedSet = sessionSets[ri - 1];
        var isCurrent = emomActive && emomRound === ri;
        var isPast = emomActive ? ri < emomRound : (emomDone || savedSet);
        var isConfirmed = !!savedSet;
        var lastEmomSets = getToBeat(ex.id);
        var lastRoundWeight = lastEmomSets && lastEmomSets[ri - 1] ? lastEmomSets[ri - 1].weight : ex.weight;
        var roundWeight = savedSet ? savedSet.weight : lastRoundWeight;
        var roundReps = savedSet ? savedSet.reps : parseInt(ex.reps.split('-')[1] || ex.reps) || 0;
        var toBeatSet = toBeat && toBeat[ri - 1] ? toBeat[ri - 1] : null;
        var toBeatHint = toBeatSet ? ' <span style="color:var(--text-ter);font-size:10px">To Beat: ' + toBeatSet.weight + 'kg×' + toBeatSet.reps + '</span>' : '';

        if (isConfirmed) {
          var isPR = checkPR(ex.id, savedSet.weight, savedSet.reps, ri - 1);
          html += `
          <div class="swipe-wrapper" data-ex-id="${ex.id}" data-set-index="${ri - 1}">
            <div class="swipe-delete-bg">Löschen</div>
            <div class="swipe-content set-card done" onclick="startEditSet('${ex.id}', ${ri - 1})">
              <div class="set-header">
                <span class="set-number">Min ${ri} ${ICONS.check}</span>
                <span class="set-type">EMOM ${isPR ? ICONS.trophy : ''}</span>
              </div>
              <div style="display:flex;gap:12px;font-size:14px;color:var(--text-sec)">
                <span>${savedSet.weight}kg${dbLabel}</span>
                <span>${savedSet.reps} Reps</span>
              </div>
            </div>
          </div>`;
        } else {
          var borderColor = isCurrent ? 'var(--orange)' : (isPast ? 'var(--text-ter)' : 'var(--border)');
          var opacity = (!emomActive && !emomDone && ri > 1) ? '0.4' : '1';
          html += `
          <div class="set-card" style="border-color:${borderColor};opacity:${opacity}">
            <div class="set-header">
              <span class="set-number">Min ${ri}${toBeatHint}</span>
              <span class="set-type">EMOM</span>
            </div>
            <div class="input-row" style="margin-top:4px">
              ${ex.bodyweight ? '<div class="input-group"><div style="text-align:center;padding:8px;font-size:14px">BW</div></div>' :
              '<div class="input-group"><div class="input-label">kg' + dbLabel + '</div><input type="number" inputmode="decimal" class="input-field" id="emom-w-' + ex.id + '-' + ri + '" value="' + roundWeight + '" step="0.5"></div>'}
              <div class="input-group">
                <div class="input-label">Reps</div>
                <input type="number" inputmode="numeric" class="input-field" id="emom-r-${ex.id}-${ri}" value="${roundReps}">
              </div>
              <button class="btn btn-sm btn-green" style="align-self:flex-end;padding:8px 12px;margin-bottom:2px" onclick="confirmEmomRound('${ex.id}', ${ri})">✓</button>
            </div>
          </div>`;
        }
      }
    } else {
      // Regular rest timer
      const restDefault = ex.restSeconds || 120;
      const restPresets = ex.restSeconds === 75 ? [60, 75, 90] : [120, 150, 180];
      html += `
        <div style="text-align:center;margin:12px 0">
          <div class="rest-timer-display" style="font-family:'SF Mono','Menlo',monospace;font-size:36px;font-weight:700;color:var(--orange);padding:8px 0">${formatTime(getTimerSeconds())}</div>
          <div class="timer-presets">
            ${restPresets.map(s => `<button class="timer-preset" onclick="startCountdown(${s})">${formatTime(s)}</button>`).join('')}
          </div>
          <div class="timer-controls">
            <button class="timer-btn" onclick="toggleRestTimer(${restDefault})">${isRestTimerRunning() ? ICONS.pause : ICONS.play}</button>
            <button class="timer-btn" onclick="resetRestTimer(); renderWorkoutDetail();">${ICONS.reset}</button>
          </div>
        </div>`;
    }

    // Completed sets with swipe-to-delete + tap-to-edit (skip for EMOM - handled above)
    if (!isEMOM) sessionSets.forEach((set, i) => {
      const isPR = checkPR(ex.id, set.weight, set.reps, i);
      const isEditing = editingSet && editingSet.exId === ex.id && editingSet.index === i;

            </div>
            <div style="display:flex;gap:12px;font-size:14px;color:var(--text-sec)">
              <span>${set.weight}kg${dbLabel}</span>
              <span>${set.reps} Reps</span>
            </div>
          </div>
        </div>`;
      }

    // Current set input (skip for EMOM - handled above)

      const currentToBeat = toBeatSets && toBeatSets[sessionSets.length] ? toBeatSets[sessionSets.length] : null;

      html += `
        <div class="set-card current">

            <span class="set-number">Satz ${setNum}${toBeatHintCurrent}</span>

              <div class="input-label">Gewicht (kg)${dbLabel}</div>
              <input type="number" inputmode="decimal" class="input-field" id="weight-${ex.id}" value="${defaultWeight}" step="0.5">
            </div>`}
            <div class="input-group">
              <div class="input-label">Reps</div>
              <input type="number" inputmode="decimal" class="input-field" id="reps-${ex.id}" value="${(lastSets && lastSets[sessionSets.length] && lastSets[sessionSets.length].type !== 'drop') ? lastSets[sessionSets.length].reps : parseInt(ex.reps.split('-')[1] || ex.reps)}">
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-orange" style="flex:2" onclick="finishStrengthSet('${ex.id}', ${bw})">${isEMOM ? 'Minute done' : 'Satz fertig'}</button>
          ${isEMOM ? '' : '<button class="btn btn-outline btn-sm" onclick="addDropSet(\'' + ex.id + '\', ' + bw + ')">+ Drop</button>'}
        </div>`;
    }

    // Upcoming sets (dimmed) - skip for EMOM
    if (!isEMOM) for (let i = sessionSets.length + 1; i < totalSets; i++) {
      const upcomingWeight = hasPyramid && ex.pyramidWeights[i] !== undefined
        ? ` @ ${ex.pyramidWeights[i]}kg`
        : (ex.pyramidWeights && ex.pyramidWeights[i] !== undefined ? ` @ ${ex.pyramidWeights[i]}kg` : '');
      const upcomingToBeat = toBeatSets && toBeatSets[i] ? toBeatSets[i] : null;
      const upcomingToBeatHint = upcomingToBeat ? ` <span style="color:var(--text-ter);font-size:10px">To Beat: ${upcomingToBeat.weight}kg×${upcomingToBeat.reps}</span>` : '';
      const upcomingLabel = `Satz ${i + 1}${upcomingWeight}${upcomingToBeatHint}`;
      const upcomingType = (ex.pyramid && hasPyramid) ? (i < Math.ceil(ex.sets / 2) ? 'Aufsteigend' : 'Absteigend')
        : (hasPyramid && !ex.pyramid) ? (i < ex.sets - 1 ? 'Top Set' : 'Backoff')
        : 'Working';
      html += `
        <div class="set-card upcoming" style="margin-top:8px">
          <div class="set-header">
            <span class="set-number">${upcomingLabel}</span>
            <span class="set-type">${upcomingType}</span>
          </div>
        </div>`;
    }

    html += '</div>';
  });

  // Check if all strength sets are done
  const allDone = plan.strength.every(ex => {
    const sets = activeSession.sets[ex.id] || [];
    return sets.length >= ex.sets;
  });

  if (allDone) {
    html += renderRPESelector('strength');
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'zirkel\')">Weiter: Zirkel</button>';
  }

  return html;
}

function finishStrengthSet(exId, isBW) {
  const weightEl = document.getElementById(`weight-${exId}`);
  const rawW = weightEl ? weightEl.value.replace(',', '.') : '0';
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });

  // Check for PR (per set index)
  if (checkPR(exId, weight, reps, activeSession.sets[exId].length - 1)) {
    APP_STATE.prs.push({
      exerciseId: exId,
      date: activeSession.date,
      weight, reps,
      volume: weight * reps,
      week: activeSession.week,
      mesocycle: activeSession.mesocycle
    });
  }

  // Auto-start rest countdown (only if no countdown already running, and not EMOM)
  var plan = WORKOUT_PLANS[activeWorkoutId];
  var exDef = plan.strength.find(function(e) { return e.id === exId; });
  var isEMOM = exDef && exDef.emom;
  if (!isEMOM && !isRestTimerRunning()) {
    var restSec = (exDef && exDef.restSeconds) ? exDef.restSeconds : 120;
    startCountdown(restSec);
  }

  saveState();
  renderWorkoutDetail();
}

function addDropSet(exId, isBW) {
  const weightEl = document.getElementById(`weight-${exId}`);
  const rawW = weightEl ? weightEl.value.replace(',', '.') : '0';
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight: Math.round(weight * 0.7), reps, type: 'drop' });

  saveState();
  renderWorkoutDetail();
}

function toggleRestTimer(defaultSeconds) {
  if (isRestTimerRunning()) {
    pauseRestTimer();
  } else if (restTimer.mode === 'stopped') {
    startCountdown(defaultSeconds || 120);
  } else {
    resumeRestTimer();
  }
  renderWorkoutDetail();
}

function renderZirkelTab(plan) {
  let html = '';

  plan.circuits.forEach((circuit, ci) => {

    const baseRounds = circuit.doubleRounds ? circuit.rounds * 2 : circuit.rounds;
    const totalRounds = baseRounds + (circuit.doubleRounds ? extraRounds * 2 : extraRounds);
    const completedRounds = activeSession.circuitRounds[circuit.id] || 0;
    const isDone = activeSession._completed || (activeSession._circuitDone && activeSession._circuitDone[circuit.id]);
    const isDouble = circuit.doubleRounds;
    const targetRounds = getTargetRounds(circuit.rounds, activeSession.week);
    const targetTotal = isDouble ? targetRounds * 2 : targetRounds;

    const getDoubleLabel = function(r) {
      if (!isDouble) return '' + r;
      var main = Math.ceil(r / 2);
      var sub = (r % 2 === 1) ? 'a' : 'b';
      return main + '' + sub;

    // Currently viewing which round? (null = current input)
    const viewing = viewingRound[circuit.id] || null;

    html += '<div style="margin-bottom:24px">' +

      '</div>' +
      (circuit.note ? '<div style="font-size:11px;color:var(--orange);margin-bottom:8px">' + circuit.note + '</div>' : '');

    // Timer — only when session active & circuit not done
    const sessionActive = !activeSession._completed;
    const isEmomCircuit = circuit.type === 'EMOM';
    if (sessionActive && !isDone) {
      if (isEmomCircuit) {
        // EMOM timer for circuit
        var emomActive = emomTimer.running && emomTimer.exerciseId === circuit.id;
        var emomDone = emomTimer.finished && emomTimer.exerciseId === circuit.id;
        var emomRound = emomActive ? getEmomCurrentRound() : 0;
        var emomRemaining = emomActive ? getEmomRemaining() : (targetTotal * 60 + 10);

            '<div style="font-size:11px;color:var(--text-sec);margin-bottom:10px">' + targetTotal + ' Runden × 60s + 10s Vorbereitung</div>' +

          '</div>';
        } else {
          var isPrep = emomActive && emomRound === 0;
          var timerColor = isPrep ? 'var(--blue)' : (emomDone ? 'var(--green)' : 'var(--orange)');
          var statusText = isPrep ? 'Vorbereitung...' : (emomDone ? 'Fertig!' : 'Runde ' + emomRound + ' / ' + targetTotal);
          html += '<div style="text-align:center;margin:4px 0 8px;padding:12px;border-radius:12px;background:var(--card);border:1px solid rgba(232,114,12,0.3)">' +
            '<div style="font-size:12px;color:' + timerColor + ';font-weight:600;margin-bottom:4px">' + statusText + '</div>' +
            '<div class="rest-timer-display emom-timer-display" style="font-family:\'SF Mono\',\'Menlo\',monospace;font-size:36px;font-weight:700;color:' + timerColor + '">' + formatTime(Math.ceil(emomRemaining)) + '</div>' +
            (emomDone ? '<button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="resetEmomTimer(); renderWorkoutDetail();">Reset</button>' : '') +
          '</div>';
        }
      } else {
        // Regular rest timer
        var circuitRest = circuit.restSeconds || 90;

        html += '<div style="text-align:center;margin:4px 0 8px">' +

              '<button class="timer-btn" onclick="resetRestTimer(); renderWorkoutDetail();">' + ICONS.reset + '</button>' +

        var bw = ex.bodyweight;

                '<div style="display:flex;align-items:center;gap:8px">' +
                  '<input type="number" inputmode="decimal" class="input-field" style="flex:1;padding:5px;font-size:13px" id="edit-w-' + ex.id + '-' + si + '" value="' + set.weight + '" step="0.5">' +
                  '<span style="font-size:12px;color:var(--text-sec)">kg' + dbLbl + ' ×</span>' +
                  '<input type="number" inputmode="numeric" class="input-field" style="width:55px;padding:5px;font-size:13px" id="edit-r-' + ex.id + '-' + si + '" value="' + set.reps + '">' +
                '</div>' +
                '<div style="display:flex;gap:8px;margin-top:6px">' +
                  '<button class="btn btn-sm btn-orange" style="flex:1" onclick="saveEditSet(\'' + ex.id + '\', ' + si + ')">Speichern</button>' +
                  '<button class="btn btn-sm btn-outline" style="flex:1" onclick="cancelEditSet()">Abbrechen</button>' +
                '</div>' +
              '</div>';
            } else {
              html += '<div class="swipe-wrapper" data-ex-id="' + ex.id + '" data-set-index="' + si + '">' +
                '<div class="swipe-delete-bg">Löschen</div>' +
                '<div class="swipe-content set-card done" style="padding:8px 12px;margin-bottom:0" onclick="startEditSet(\'' + ex.id + '\', ' + si + ')">' +

                    '<span style="font-size:13px">Runde ' + (si + 1) + ' ' + ICONS.check + '</span>' +
                    '<span style="font-size:13px;color:var(--text-sec)">' + set.weight + 'kg' + dbLbl + ' x' + set.reps + '</span>' +
                  '</div>' +
                '</div>' +
              '</div>';
            }
          });

          html += '</div>'; // close sets container
        }

        // Inline add-set row (always visible — works in active AND completed sessions)
        if (showAddRow) {
          var nextRound = exSets.length + 1;
          var defaultWeight = exSets.length > 0 ? exSets[exSets.length - 1].weight : (ex.weight || 0);
          var defaultReps = parseInt(ex.reps.toString().split('-')[1] || ex.reps.toString().split('+')[0] || ex.reps) || 10;
          html += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">' +
            '<span style="font-size:12px;width:24px;color:var(--text-sec)">' + nextRound + '</span>' +
            (bw ? '<div style="flex:1;text-align:center;font-size:13px;padding:6px;color:var(--text-sec)">BW</div>' :

            '<input type="number" inputmode="numeric" class="input-field" style="width:55px;padding:6px;font-size:13px" id="ci-r-' + ex.id + '" value="' + defaultReps + '">' +
            '<button class="btn btn-orange btn-sm" style="width:auto;padding:6px 14px;min-height:32px;font-size:13px" onclick="addCircuitSetInline(\'' + circuit.id + '\', \'' + ex.id + '\')">OK</button>' +
          '</div>';
        } else {
          // "+ Runde" button to reveal the input row
          html += '<button class="btn btn-sm btn-outline" style="width:100%;margin-top:6px;font-size:12px;padding:6px" onclick="toggleAddCircuitSet(\'' + ex.id + '\')">+ Runde</button>';
        }

        html += '</div>'; // close exercise-card
      });

      html += renderRPESelector(circuit.id);
    }
    // CURRENT INPUT — ALL exercises visible at once (like Acc tab)
    else if (!isDone) {

      circuit.exercises.forEach(function(ex, exIdx) {
        var exSets = activeSession.sets[ex.id] || [];
        var exRounds = exSets.length;
        var bw = ex.bodyweight;
        var dbLbl = ex.dumbbell ? ' (pro DB)' : '';
        var weightLabel = bw ? '@ BW' : '@ ' + (ex.weight || '') + 'kg' + dbLbl;
        var toBeatStr = formatToBeat(ex.id);
        var lastStr = formatLastSession(ex.id);
        var noteStr = ex.note ? ' | ' + ex.note : '';

        html += '<div class="exercise-card" style="' + (exRounds < completedRounds + 1 ? 'border-color:var(--orange)' : '') + '">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
            '<div>' +
              '<div class="exercise-name" style="font-size:14px">' + ex.name + '</div>' +
              '<div class="exercise-last" style="font-size:11px">' + ex.reps + ' ' + weightLabel + noteStr + (lastStr ? ' | ' + lastStr : '') + '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:6px">' +
              '<span style="font-size:12px;color:var(--text-sec)">' + exRounds + '/' + targetTotal + '</span>' +
              '<button id="peek-icon-' + ex.id + '" onclick="event.stopPropagation();toggleHistoryPeek(\'' + ex.id + '\')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:12px;color:var(--text-ter);cursor:pointer">📊</button>' +
            '</div>' +
          '</div>' +
          '<div id="peek-' + ex.id + '" style="display:none">' + renderHistoryPeek(ex.id) + '</div>' +
          (toBeatStr ? '<div class="to-beat" style="margin-top:4px">' + toBeatStr + '</div>' : '') +
          renderCoachingTip(circuit.id, activeWorkoutId);

        // Show completed sets as done mini-cards (swipe to delete + tap to edit)
        for (var si = 0; si < exSets.length; si++) {
          var set = exSets[si];
          var setDbLbl = ex.dumbbell ? ' (DB)' : '';
          var isEditingThis = editingSet && editingSet.exId === ex.id && editingSet.index === si;

          if (isEditingThis) {
            html += '<div class="set-card current" style="padding:6px 12px;border-color:var(--blue);margin-top:4px">' +
              '<div style="font-size:12px;font-weight:600;color:var(--blue);margin-bottom:4px">Runde ' + (si + 1) + ' bearbeiten</div>' +
              '<div style="display:flex;align-items:center;gap:8px">' +
                '<input type="number" inputmode="decimal" class="input-field" style="flex:1;padding:5px;font-size:13px" id="edit-w-' + ex.id + '-' + si + '" value="' + set.weight + '" step="0.5">' +
                '<span style="font-size:12px;color:var(--text-sec)">kg' + setDbLbl + ' ×</span>' +
                '<input type="number" inputmode="numeric" class="input-field" style="width:55px;padding:5px;font-size:13px" id="edit-r-' + ex.id + '-' + si + '" value="' + set.reps + '">' +
              '</div>' +
              '<div style="display:flex;gap:8px;margin-top:6px">' +
                '<button class="btn btn-sm btn-orange" style="flex:1" onclick="saveEditSet(\'' + ex.id + '\', ' + si + ')">Speichern</button>' +
                '<button class="btn btn-sm btn-outline" style="flex:1" onclick="cancelEditSet()">Abbrechen</button>' +
              '</div>' +
            '</div>';
          } else {
            var circuitPR = checkPR(ex.id, set.weight, set.reps, si);
            html += '<div class="swipe-wrapper" data-ex-id="' + ex.id + '" data-set-index="' + si + '" style="margin-top:4px">' +
              '<div class="swipe-delete-bg">Löschen</div>' +
              '<div class="swipe-content set-card done" style="padding:6px 12px;margin-bottom:0" onclick="startEditSet(\'' + ex.id + '\', ' + si + ')">' +
                '<div style="display:flex;justify-content:space-between;align-items:center">' +
                  '<span style="font-size:12px">' + ICONS.check + ' Runde ' + (si + 1) + (circuitPR ? ' ' + ICONS.trophy : '') + '</span>' +
                  '<span style="font-size:12px;color:var(--text-sec)">' + set.weight + 'kg' + setDbLbl + ' × ' + set.reps + '</span>' +
                '</div>' +
              '</div>' +
            '</div>';
          }
        }

        // Current input row (if not all rounds done for this exercise)
        if (exRounds < totalRounds) {
          html += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px">' +
            '<span style="font-size:12px;width:28px;color:var(--text-sec)">' + (exRounds + 1) + '</span>' +
            (bw ? '<div style="flex:1;text-align:center;font-size:13px;padding:6px">BW</div>' :
            '<input type="number" inputmode="decimal" class="input-field" style="flex:1;padding:6px" id="cw-' + ex.id + '" value="' + (function(){ var ls = getLastSessionSets(ex.id); var rd = exRounds; return ls && ls[rd] && ls[rd].type !== 'drop' ? ls[rd].weight : ex.weight; })() + '" step="0.5">') +
            '<input type="number" inputmode="decimal" class="input-field" style="width:55px;padding:6px" id="cr-' + ex.id + '" value="' + (function(){ var ls = getLastSessionSets(ex.id); var rd = exRounds; return ls && ls[rd] && ls[rd].type !== 'drop' ? ls[rd].reps : parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps); })() + '">' +
            '<button class="btn btn-orange btn-sm" style="width:auto;padding:6px 14px;min-height:32px;font-size:13px" onclick="finishCircuitExercise(\'' + circuit.id + '\', ' + ci + ', ' + exIdx + ', ' + (bw ? 'true' : 'false') + ')">OK</button>' +
          '</div>';
        }

        html += '</div>'; // close exercise-card
      });
    }

    // Zirkel end / add round buttons
    if (!isDone && completedRounds > 0) {
      html += '<div style="display:flex;gap:8px;margin-top:8px">';
      if (completedRounds >= totalRounds) {
        html += '<button class="btn btn-sm btn-outline" style="flex:1" onclick="addCircuitRound(\'' + circuit.id + '\', ' + ci + ')">+ Runde</button>';
      }
      html += '<button class="btn btn-sm btn-outline" style="flex:1;border-color:var(--green);color:var(--green)" onclick="endCircuit(\'' + circuit.id + '\')">Zirkel beenden</button>';
      html += '</div>';
    }

    // (completed circuit rendering is now handled above in the isDone block)

    html += '</div>'; // close zirkel-round-area
    html += '</div>'; // close circuit container
  });

  // Check all circuits done
  const allDone = plan.circuits.every(function(c) {
    return activeSession._circuitDone && activeSession._circuitDone[c.id];
  });

  // Also allow progressing if all planned rounds done
  const allRoundsDone = plan.circuits.every(function(c) {
    var totalRounds = c.doubleRounds ? c.rounds * 2 : c.rounds;
    return (activeSession.circuitRounds[c.id] || 0) >= totalRounds || (activeSession._circuitDone && activeSession._circuitDone[c.id]);
  });

  if (allDone || allRoundsDone) {
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'acc\')">Weiter: Accessories</button>';
  }

  return html;
}

function viewCircuitRound(circuitId, round) {
  viewingRound[circuitId] = round;
  editingCircuitRound = false;
  renderWorkoutDetail();
}

function clearViewingRound(circuitId) {
  delete viewingRound[circuitId];
  editingCircuitRound = false;
  renderWorkoutDetail();
}

function endCircuit(circuitId) {
  if (!activeSession._circuitDone) activeSession._circuitDone = {};
  activeSession._circuitDone[circuitId] = true;
  saveState();
  renderWorkoutDetail();
}

function reopenCircuit(circuitId) {
  if (activeSession._circuitDone) {
    delete activeSession._circuitDone[circuitId];
  }
  // Also un-complete the workout if it was completed
  if (activeSession._completed) {
    activeSession._completed = false;
  }
  saveState();
  renderWorkoutDetail();
}

function toggleAddCircuitSet(exId) {
  _addingCircuitSet[exId] = !_addingCircuitSet[exId];
  renderWorkoutDetail();
}

function addCircuitSetInline(circuitId, exId) {
  var weightEl = document.getElementById('ci-w-' + exId);
  var repsEl = document.getElementById('ci-r-' + exId);

  var exInfo = getExerciseInfo(exId);
  var isBW = exInfo && exInfo.bodyweight;
  var weight = isBW ? APP_STATE.settings.bodyWeight : (weightEl ? (parseFloat(weightEl.value.replace(',', '.')) || 0) : 0);
  var reps = repsEl ? (parseInt(repsEl.value) || 0) : 0;

  if (reps === 0) return;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight: weight, reps: reps, type: 'working' });

  // Recalculate circuit rounds = min(sets.length) across all exercises
  var plan = WORKOUT_PLANS[activeWorkoutId];
  var circuit = null;
  for (var c = 0; c < plan.circuits.length; c++) {
    if (plan.circuits[c].id === circuitId) { circuit = plan.circuits[c]; break; }
  }
  if (circuit) {
    var minSets = Infinity;
    circuit.exercises.forEach(function(e) {
      var len = (activeSession.sets[e.id] || []).length;
      if (len < minSets) minSets = len;
    });
    activeSession.circuitRounds[circuitId] = minSets === Infinity ? 0 : minSets;
  }

  // Check PR (per set index)
  if (checkPR(exId, weight, reps, activeSession.sets[exId].length - 1)) {
    APP_STATE.prs.push({
      exerciseId: exId, date: activeSession.date,
      weight: weight, reps: reps,
      volume: weight * reps,
      week: activeSession.week, mesocycle: activeSession.mesocycle
    });
  }

  // Sync to saved session if workout already completed
  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
      APP_STATE.sessions[savedIdx].circuitRounds = JSON.parse(JSON.stringify(activeSession.circuitRounds));
    }
  }

  // Clear the adding state
  delete _addingCircuitSet[exId];

  saveState();
  renderWorkoutDetail();
}

function saveCircuitRoundEdit(circuitId, circuitIndex, roundNumber) {
  var plan = WORKOUT_PLANS[activeWorkoutId];
  var circuit = plan.circuits[circuitIndex];

  circuit.exercises.forEach(function(ex) {
    var wEl = document.getElementById('cedit-w-' + ex.id + '-' + roundNumber);
    var rEl = document.getElementById('cedit-r-' + ex.id + '-' + roundNumber);
    if (wEl && rEl && activeSession.sets[ex.id] && activeSession.sets[ex.id][roundNumber - 1]) {
      activeSession.sets[ex.id][roundNumber - 1].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
      activeSession.sets[ex.id][roundNumber - 1].reps = parseInt(rEl.value) || 0;
    }
  });

  // Also update saved session if completed
  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingCircuitRound = false;
  saveState();
  renderWorkoutDetail();
}

function deleteCircuitRound(circuitId, circuitIndex, roundNumber) {
  if (!confirm('Runde ' + roundNumber + ' wirklich löschen?')) return;
  const plan = WORKOUT_PLANS[activeWorkoutId];
  const circuit = plan.circuits[circuitIndex];

  // Remove the round data from each exercise's sets array
  circuit.exercises.forEach(function(ex) {
    if (activeSession.sets[ex.id] && activeSession.sets[ex.id].length >= roundNumber) {
      activeSession.sets[ex.id].splice(roundNumber - 1, 1);
    }
  });

  // Recalculate circuit rounds = min(sets.length) across all exercises
  var minSets = Infinity;
  circuit.exercises.forEach(function(ex) {
    var len = (activeSession.sets[ex.id] || []).length;
    if (len < minSets) minSets = len;
  });
  activeSession.circuitRounds[circuitId] = minSets === Infinity ? 0 : minSets;

  // If we had extra rounds, decrement those first
  if (activeSession._extraRounds && activeSession._extraRounds[circuitId] > 0) {
    activeSession._extraRounds[circuitId]--;
  }

  // Un-end circuit if it was ended (since we now have fewer rounds)
  if (activeSession._circuitDone) delete activeSession._circuitDone[circuitId];

  delete viewingRound[circuitId];
  saveState();
  renderWorkoutDetail();
}

function addCircuitRound(circuitId, circuitIndex) {
  // Track extra rounds beyond the plan
  if (!activeSession._extraRounds) activeSession._extraRounds = {};
  activeSession._extraRounds[circuitId] = (activeSession._extraRounds[circuitId] || 0) + 1;
  // Un-end the circuit if it was ended
  if (activeSession._circuitDone) delete activeSession._circuitDone[circuitId];
  saveState();
  renderWorkoutDetail();
}

function finishCircuitExercise(circuitId, circuitIndex, exIdx, isBW) {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  const circuit = plan.circuits[circuitIndex];
  const ex = circuit.exercises[exIdx];

  var weightEl = document.getElementById('cw-' + ex.id);
  var repsEl = document.getElementById('cr-' + ex.id);
  var weight = isBW ? APP_STATE.settings.bodyWeight : (weightEl ? (parseFloat(weightEl.value.replace(',', '.')) || ex.weight || 0) : ex.weight || 0);
  var reps = repsEl ? (parseInt(repsEl.value) || 0) : 0;

  if (reps === 0) {
    renderWorkoutDetail();
    return;
  }

  // Push one set for this exercise
  if (!activeSession.sets[ex.id]) activeSession.sets[ex.id] = [];
  activeSession.sets[ex.id].push({ weight: weight, reps: reps, type: 'working' });

  // Recalculate circuit rounds = min(sets.length) across all exercises
  var minSets = Infinity;
  circuit.exercises.forEach(function(e) {
    var len = (activeSession.sets[e.id] || []).length;
    if (len < minSets) minSets = len;
  });
  activeSession.circuitRounds[circuitId] = minSets === Infinity ? 0 : minSets;

  // Check PR for this exercise (per set index)
  var lastSet = { weight: weight, reps: reps };
  if (checkPR(ex.id, lastSet.weight, lastSet.reps, activeSession.sets[ex.id].length - 1)) {
    APP_STATE.prs.push({
      exerciseId: ex.id, date: activeSession.date,
      weight: lastSet.weight, reps: lastSet.reps,
      volume: lastSet.weight * lastSet.reps,
      week: activeSession.week, mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

function renderAccTab(plan) {
  let html = '';
  let i = 0;

  while (i < plan.accessories.length) {
    const ex = plan.accessories[i];

    if (ex.group) {
      // Collect all exercises in this superset group
      const groupExercises = [];
      const groupId = ex.group;
      while (i < plan.accessories.length && plan.accessories[i].group === groupId) {
        groupExercises.push(plan.accessories[i]);
        i++;
      }
      html += renderAccSuperset(groupExercises);
    } else {
      html += renderAccExercise(ex);
      i++;
    }
  }

  html += renderRPESelector('acc');
  html += '<button class="btn btn-green" style="margin-top:20px" onclick="finishWorkout()">Training abschliessen</button>';

  return html;
}

function finishAccSet(exId, isBW) {
  const weightEl = document.getElementById(`aw-${exId}`);
  const rawW = weightEl ? weightEl.value.replace(',', '.') : '0';
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`ar-${exId}`).value) || 0;

  // Clear extra-set flag so "+ Satz" button reappears after this set
  if (activeSession._accExtra) delete activeSession._accExtra[exId];

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });
  const workingSetIdx = activeSession.sets[exId].length - 1;

  // Check for drop set — only if the drop row is visible
  const dropRow = document.getElementById('acc-drop-row-' + exId);
  if (dropRow && dropRow.style.display !== 'none') {
    const dropWeightEl = document.getElementById('adw-' + exId);
    const dropRepsEl = document.getElementById('adr-' + exId);
    if (dropWeightEl && dropRepsEl) {
      const dw = parseFloat((dropWeightEl.value || '0').replace(',', '.')) || 0;
      const dr = parseInt(dropRepsEl.value) || 0;
      if (dw > 0 && dr > 0) {
        activeSession.sets[exId].push({ weight: dw, reps: dr, type: 'drop' });
      }
    }
  }

  if (checkPR(exId, weight, reps, workingSetIdx)) {
    APP_STATE.prs.push({
      exerciseId: exId, date: activeSession.date,
      weight, reps, volume: weight * reps,
      week: activeSession.week, mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

function addExtraAccSet(exId) {
  if (!activeSession._accExtra) activeSession._accExtra = {};
  activeSession._accExtra[exId] = true;
  renderWorkoutDetail();
}

function addExtraAccSuperset(mainExId) {

  activeSession._accExtra[mainExId] = true;

    setsHtml += '<button class="btn btn-orange btn-sm" style="width:100%;padding:8px;min-height:36px" onclick="finishAccSuperset([' + extraExIds + '])">OK</button>';
    setsHtml += '</div>';
  } else {

    var addExIds = exercises.map(function(e) { return "'" + e.id + "'"; }).join(',');
    setsHtml += '<button class="btn btn-sm btn-outline" style="margin-top:4px;font-size:12px" onclick="addExtraAccSuperset(\'' + mainEx.id + '\')">+ Satz</button>';

    '<div style="display:flex;justify-content:space-between;align-items:center">' +

function finishAccSuperset(exIds) {
  exIds.forEach(function(exId) {
    var exInfo = getExerciseInfo(exId);
    var bw = exInfo && exInfo.bodyweight;
    var wEl = document.getElementById('ssw-' + exId);
    var rEl = document.getElementById('ssr-' + exId);
    var weight = bw ? APP_STATE.settings.bodyWeight : (wEl ? (parseFloat(wEl.value.replace(',', '.')) || 0) : 0);
    var reps = rEl ? (parseInt(rEl.value) || 0) : 0;

    if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
    activeSession.sets[exId].push({ weight: weight, reps: reps, type: 'working' });

    if (checkPR(exId, weight, reps, activeSession.sets[exId].length - 1)) {
      APP_STATE.prs.push({
        exerciseId: exId, date: activeSession.date,
        weight: weight, reps: reps, volume: weight * reps,
        week: activeSession.week, mesocycle: activeSession.mesocycle
      });
    }
  });

  saveState();
  renderWorkoutDetail();
}

function saveEditSuperset(mainExId, setIndex, exIds) {
  exIds.forEach(function(exId) {
    var exInfo = getExerciseInfo(exId);
    var bw = exInfo && exInfo.bodyweight;
    var wEl = document.getElementById('edit-w-' + exId + '-' + setIndex);
    var rEl = document.getElementById('edit-r-' + exId + '-' + setIndex);
    if (activeSession.sets[exId] && activeSession.sets[exId][setIndex]) {
      if (!bw && wEl) activeSession.sets[exId][setIndex].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
      if (rEl) activeSession.sets[exId][setIndex].reps = parseInt(rEl.value) || 0;
    }
  });

  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingSet = null;
  saveState();
  renderWorkoutDetail();
}

// =============================================
// FINISH WORKOUT
// =============================================

function finishWorkout() {
  if (!activeSession) return;

  activeSession._completed = true;

  // Use session timer for accurate duration
  const sessionSec = getSessionSeconds();
  activeSession.duration = sessionSec > 0 ? sessionSec : (activeSession._startTime ? Math.round((Date.now() - activeSession._startTime) / 1000) : 3600);

  stopSessionTimer();
  stopRestTimer();

  // Remove internal props before saving
  const toSave = { ...activeSession };
  delete toSave._startTime;
  delete toSave._currentStrengthSet;
  delete toSave._currentCircuitRound;
  delete toSave._completed;
  delete toSave._readinessDone;
  delete toSave._accExtra;
  delete toSave._circuitPending;
  delete toSave._circuitExIdx;
  // Keep _circuitDone and _extraRounds for round viewing after completion
  // delete toSave._circuitDone;

  // Replace or add session
  const idx = APP_STATE.sessions.findIndex(s => s.id === toSave.id);
  if (idx >= 0) {
    APP_STATE.sessions[idx] = toSave;
  } else {
    APP_STATE.sessions.push(toSave);
  }

  // Check if auto-goals should be set after W1 completion
  checkAutoGoals();

  saveState();

  // Auto-sync to cloud after workout
  autoCloudPush();

  activeSubTab = 'done';
  renderWorkoutDetail();
}
