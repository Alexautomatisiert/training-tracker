function renderZirkelTab(plan) {
  let html = '';

  plan.circuits.forEach((circuit, ci) => {
    const extraRounds = (activeSession._extraRounds && activeSession._extraRounds[circuit.id]) || 0;
    const baseRounds = circuit.doubleRounds ? circuit.rounds * 2 : circuit.rounds;
    const totalRounds = baseRounds + (circuit.doubleRounds ? extraRounds * 2 : extraRounds);
    const completedRounds = activeSession.circuitRounds[circuit.id] || 0;
    const isDone = activeSession._completed || (activeSession._circuitDone && activeSession._circuitDone[circuit.id]);
    const isDouble = circuit.doubleRounds;
    const targetRounds = getTargetRounds(circuit.rounds, activeSession.week);
    const targetTotal = isDouble ? targetRounds * 2 : targetRounds;

    const getDoubleLabel = function(r) {
      if (!isDouble) return '' + r;
      var main = Math.ceil(r / 2);
      var sub = (r % 2 === 1) ? 'a' : 'b';
      return main + '' + sub;
    };

    // Currently viewing which round? (null = current input)
    const viewing = viewingRound[circuit.id] || null;

    html += '<div style="margin-bottom:24px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
        '<h3>' + circuit.name + '</h3>' +
        '<span style="font-size:12px;color:var(--text-sec)">' + circuit.type + ' | ' + completedRounds + '/' + targetTotal + ' Runden' + (isDouble ? ' (2x)' : '') + '</span>' +
      '</div>' +
      (circuit.note ? '<div style="font-size:11px;color:var(--orange);margin-bottom:8px">' + circuit.note + '</div>' : '');

    // Round pills - clickable for completed rounds
    html += '<div class="round-pills">';
    for (let r = 1; r <= Math.max(totalRounds, completedRounds); r++) {
      const isDoneR = r <= completedRounds;
      const isCurrent = r === completedRounds + 1 && !isDone;
      const isViewing = viewing === r;
      let cls = isDoneR ? 'done clickable' : isCurrent ? 'current' : '';
      if (isViewing) cls = 'viewing clickable';
      const onclick = isDoneR ? ' onclick="viewCircuitRound(\'' + circuit.id + '\', ' + r + ')"' : '';
      html += '<div class="round-pill ' + cls + '"' + onclick + '>' + getDoubleLabel(r) + '</div>';
    }
    html += '</div>';

    // Timer with reset button
    const circuitRest = circuit.restSeconds || 90;
    const timerPresets = circuitRest >= 150 ? [120, 150, 180] : circuitRest >= 90 ? [60, 90, 120] : [45, 60, 90];
    html += '<div style="text-align:center;margin:8px 0">' +
        '<div class="rest-timer-display" style="font-family:\'SF Mono\',\'Menlo\',monospace;font-size:32px;font-weight:700;color:var(--orange);padding:4px 0">' + formatTime(getTimerSeconds()) + '</div>' +
        '<div class="timer-presets">' +
          timerPresets.map(function(s) { return '<button class="timer-preset" onclick="startCountdown(' + s + ')">' + formatTime(s) + '</button>'; }).join('') +
        '</div>' +
        '<div class="timer-controls" style="margin-top:8px">' +
          '<button class="timer-btn" onclick="toggleRestTimer(' + circuitRest + ')">' + (isRestTimerRunning() ? ICONS.pause : ICONS.play) + '</button>' +
          '<button class="timer-btn" onclick="resetRestTimer(); renderWorkoutDetail();">' + ICONS.reset + '</button>' +
        '</div>' +
      '</div>';

    // Swipeable round content area
    html += '<div class="zirkel-round-area" data-circuit-id="' + circuit.id + '" data-circuit-index="' + ci + '" data-completed="' + completedRounds + '" data-total="' + targetTotal + '">';

    // VIEWING A PAST ROUND (with edit capability)
    if (viewing !== null && viewing <= completedRounds) {
      var isEditMode = editingCircuitRound;
      var borderColor = isEditMode ? 'var(--orange)' : 'var(--blue)';
      html += '<div style="margin:8px 0;padding:8px;border:1px solid ' + borderColor + ';border-radius:var(--radius)">' +
        '<div style="font-size:13px;font-weight:600;color:' + borderColor + ';margin-bottom:8px">' +
        'Runde ' + getDoubleLabel(viewing) + (isEditMode ? ' bearbeiten' : ' ansehen') + '</div>';

      circuit.exercises.forEach(function(ex) {
        var sets = activeSession.sets[ex.id] || [];
        var roundData = sets[viewing - 1]; // 0-indexed
        if (roundData) {
          var dbLbl = ex.dumbbell ? ' (DB)' : '';
          if (isEditMode) {
            html += '<div style="padding:6px 0;border-bottom:1px solid var(--border)">' +
              '<div style="font-size:12px;margin-bottom:4px">' + ex.name + '</div>' +
              '<div style="display:flex;gap:8px;align-items:center">' +
                '<input type="number" inputmode="decimal" class="input-field" style="flex:1;padding:5px;font-size:13px" id="cedit-w-' + ex.id + '-' + viewing + '" value="' + roundData.weight + '" step="0.5">' +
                '<span style="font-size:12px;color:var(--text-sec)">kg' + dbLbl + ' ×</span>' +
                '<input type="number" inputmode="numeric" class="input-field" style="width:55px;padding:5px;font-size:13px" id="cedit-r-' + ex.id + '-' + viewing + '" value="' + roundData.reps + '">' +
              '</div></div>';
          } else {
            html += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">' +
              '<span>' + ex.name + '</span>' +
              '<span style="color:var(--text-sec)">' + roundData.weight + 'kg' + dbLbl + ' × ' + roundData.reps + '</span>' +
            '</div>';
          }
        }
      });

      if (isEditMode) {
        html += '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<button class="btn btn-sm btn-orange" style="flex:1" onclick="saveCircuitRoundEdit(\'' + circuit.id + '\', ' + ci + ', ' + viewing + ')">Speichern</button>' +
          '<button class="btn btn-sm btn-outline" style="flex:1" onclick="editingCircuitRound=false; renderWorkoutDetail();">Abbrechen</button>' +
        '</div>';
      } else {
        html += '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<button class="btn btn-sm btn-outline" onclick="clearViewingRound(\'' + circuit.id + '\')">Zurück</button>' +
          '<button class="btn btn-sm btn-outline" style="border-color:var(--orange);color:var(--orange)" onclick="editingCircuitRound=true; renderWorkoutDetail();">Bearbeiten</button>' +
          '<button class="btn btn-sm" style="background:var(--red);color:#fff" onclick="deleteCircuitRound(\'' + circuit.id + '\', ' + ci + ', ' + viewing + ')">Löschen</button>' +
        '</div>';
      }

      html += '</div>';
    }
    // CURRENT ROUND INPUT (only if not done and not viewing past)
    else if (!isDone && completedRounds < totalRounds) {
      const currentRound = completedRounds + 1;

      circuit.exercises.forEach(function(ex) {
        var bw = ex.bodyweight;
        var dbLbl = ex.dumbbell ? ' (pro DB)' : '';
        var weightLabel = bw ? '@ BW' : '@ ' + ex.weight + 'kg' + dbLbl;
        var toBeatStr = formatToBeat(ex.id);

        html += '<div class="exercise-card">' +
          '<div class="exercise-name">' + ex.name + '</div>' +
          '<div class="exercise-last">' + ex.reps + ' ' + weightLabel + (ex.note ? ' (' + ex.note + ')' : '') + '</div>' +
          (toBeatStr ? '<div class="to-beat">' + toBeatStr + '</div>' : '') +
          '<div class="input-row" style="margin-top:8px">' +
            (bw ? '<div class="input-group"><div class="input-label">Gewicht</div><div style="text-align:center;padding:8px;font-size:14px">BW</div></div>' :
            '<div class="input-group">' +
              '<div class="input-label">Gewicht (kg)' + dbLbl + '</div>' +
              '<input type="number" inputmode="decimal" class="input-field" id="cw-' + ex.id + '" value="' + (function(){ var ls = getLastSessionSets(ex.id); var rd = activeSession.circuitRounds[circuit.id] || 0; return ls && ls[rd] ? ls[rd].weight : ex.weight; })() + '" step="0.5">' +
            '</div>') +
            '<div class="input-group">' +
              '<div class="input-label">Reps</div>' +
              '<input type="number" inputmode="decimal" class="input-field" id="cr-' + ex.id + '" value="' + parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps) + '">' +
            '</div>' +
          '</div>' +
        '</div>';
      });

      var roundLabel = isDouble ? getDoubleLabel(currentRound) : currentRound;
      html += '<button class="btn btn-orange" onclick="finishCircuitRound(\'' + circuit.id + '\', ' + ci + ')">Runde ' + roundLabel + ' done</button>';
    }

    // Zirkel end / add round buttons
    if (!isDone && completedRounds > 0) {
      html += '<div style="display:flex;gap:8px;margin-top:8px">';
      if (completedRounds >= totalRounds) {
        html += '<button class="btn btn-sm btn-outline" style="flex:1" onclick="addCircuitRound(\'' + circuit.id + '\', ' + ci + ')">+ Runde</button>';
      }
      html += '<button class="btn btn-sm btn-outline" style="flex:1;border-color:var(--green);color:var(--green)" onclick="endCircuit(\'' + circuit.id + '\')">Zirkel beenden</button>';
      html += '</div>';
    }

    // If circuit is ended
    if (isDone) {
      html += '<div style="text-align:center;padding:12px;color:var(--green);font-size:14px;font-weight:600">✓ Zirkel abgeschlossen (' + completedRounds + ' Runden)</div>';
    }

    html += '</div>'; // close zirkel-round-area
    html += '</div>'; // close circuit container
  });

  // Check all circuits done
  const allDone = plan.circuits.every(function(c) {
    return activeSession._circuitDone && activeSession._circuitDone[c.id];
  });

  // Also allow progressing if all planned rounds done
  const allRoundsDone = plan.circuits.every(function(c) {
    var totalRounds = c.doubleRounds ? c.rounds * 2 : c.rounds;
    return (activeSession.circuitRounds[c.id] || 0) >= totalRounds || (activeSession._circuitDone && activeSession._circuitDone[c.id]);
  });

  if (allDone || allRoundsDone) {
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'acc\')">Weiter: Accessories</button>';
  }

  return html;
}

function viewCircuitRound(circuitId, round) {
  viewingRound[circuitId] = round;
  editingCircuitRound = false;
  renderWorkoutDetail();
}

function clearViewingRound(circuitId) {
  delete viewingRound[circuitId];
  editingCircuitRound = false;
  renderWorkoutDetail();
}

function endCircuit(circuitId) {
  if (!activeSession._circuitDone) activeSession._circuitDone = {};
  activeSession._circuitDone[circuitId] = true;
  saveState();
  renderWorkoutDetail();
}

function saveCircuitRoundEdit(circuitId, circuitIndex, roundNumber) {
  var plan = WORKOUT_PLANS[activeWorkoutId];
  var circuit = plan.circuits[circuitIndex];

  circuit.exercises.forEach(function(ex) {
    var wEl = document.getElementById('cedit-w-' + ex.id + '-' + roundNumber);
    var rEl = document.getElementById('cedit-r-' + ex.id + '-' + roundNumber);
    if (wEl && rEl && activeSession.sets[ex.id] && activeSession.sets[ex.id][roundNumber - 1]) {
      activeSession.sets[ex.id][roundNumber - 1].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
      activeSession.sets[ex.id][roundNumber - 1].reps = parseInt(rEl.value) || 0;
    }
  });

  // Also update saved session if completed
  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingCircuitRound = false;
  saveState();
  renderWorkoutDetail();
}

function deleteCircuitRound(circuitId, circuitIndex, roundNumber) {
  if (!confirm('Runde ' + roundNumber + ' wirklich löschen?')) return;
  const plan = WORKOUT_PLANS[activeWorkoutId];
  const circuit = plan.circuits[circuitIndex];

  // Remove the round data from each exercise's sets array
  circuit.exercises.forEach(function(ex) {
    if (activeSession.sets[ex.id] && activeSession.sets[ex.id].length >= roundNumber) {
      activeSession.sets[ex.id].splice(roundNumber - 1, 1);
    }
  });

  // Decrement circuit rounds counter
  activeSession.circuitRounds[circuitId] = Math.max(0, (activeSession.circuitRounds[circuitId] || 0) - 1);

  // If we had extra rounds, decrement those first
  if (activeSession._extraRounds && activeSession._extraRounds[circuitId] > 0) {
    activeSession._extraRounds[circuitId]--;
  }

  // Un-end circuit if it was ended (since we now have fewer rounds)
  if (activeSession._circuitDone) delete activeSession._circuitDone[circuitId];

  delete viewingRound[circuitId];
  saveState();
  renderWorkoutDetail();
}

function addCircuitRound(circuitId, circuitIndex) {
  // Track extra rounds beyond the plan
  if (!activeSession._extraRounds) activeSession._extraRounds = {};
  activeSession._extraRounds[circuitId] = (activeSession._extraRounds[circuitId] || 0) + 1;
  // Un-end the circuit if it was ended
  if (activeSession._circuitDone) delete activeSession._circuitDone[circuitId];
  saveState();
  renderWorkoutDetail();
}

function finishCircuitRound(circuitId, circuitIndex) {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  const circuit = plan.circuits[circuitIndex];

  var allZeroReps = true;
  var roundData = [];

  circuit.exercises.forEach(function(ex) {
    var bw = ex.bodyweight;
    var weightEl = document.getElementById('cw-' + ex.id);
    var repsEl = document.getElementById('cr-' + ex.id);
    var weight = bw ? APP_STATE.settings.bodyWeight : (weightEl ? (parseFloat(weightEl.value.replace(',', '.')) || ex.weight || 0) : ex.weight || 0);
    var reps = repsEl ? (parseInt(repsEl.value) || parseInt(ex.reps.split('-')[1] || ex.reps) || 0) : (parseInt(ex.reps.split('-')[1] || ex.reps) || 0);

    roundData.push({ exId: ex.id, weight: weight, reps: reps });
    if (reps > 0) allZeroReps = false;
  });

  // Skip round if ALL exercises have 0 reps
  if (allZeroReps) {
    alert('Runde übersprungen — alle Übungen haben 0 Reps.');
    renderWorkoutDetail();
    return;
  }

  roundData.forEach(function(d) {
    if (!activeSession.sets[d.exId]) activeSession.sets[d.exId] = [];
    activeSession.sets[d.exId].push({ weight: d.weight, reps: d.reps, type: 'working' });
  });

  activeSession.circuitRounds[circuitId] = (activeSession.circuitRounds[circuitId] || 0) + 1;

  // DON'T auto-start timer - user starts it manually
  saveState();
  renderWorkoutDetail();
}

// =============================================
// ACCESSORIES TAB
// =============================================

function renderAccTab(plan) {
  let html = '';
  let i = 0;

  while (i < plan.accessories.length) {
    const ex = plan.accessories[i];

    if (ex.group) {
      // Collect all exercises in this superset group
      const groupExercises = [];
      const groupId = ex.group;
      while (i < plan.accessories.length && plan.accessories[i].group === groupId) {
        groupExercises.push(plan.accessories[i]);
        i++;
      }
      html += renderAccSuperset(groupExercises);
    } else {
      html += renderAccExercise(ex);
      i++;
    }
  }

  html += '<button class="btn btn-green" style="margin-top:20px" onclick="finishWorkout()">Training abschliessen</button>';

  return html;
}

function renderAccExercise(ex) {
  const sessionSets = activeSession.sets[ex.id] || [];
  const bw = ex.bodyweight;
  const lastStr = formatLastSession(ex.id);
  const dbLabel = ex.dumbbell ? ' (DB)' : '';
  const noteStr = ex.note ? ` | ${ex.note}` : '';

  let setsHtml = '';

  // To Beat display
  const toBeatStr = formatToBeat(ex.id);

  // Completed sets with swipe-to-delete + tap-to-edit
  sessionSets.forEach((set, i) => {
    const isEditing = editingSet && editingSet.exId === ex.id && editingSet.index === i;
    const hasDrop = ex.dropWeight;

function finishAccSet(exId, isBW) {
  const rawW = document.getElementById(`aw-${exId}`).value.replace(',', '.');
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`ar-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });

  // Check for drop set
  const dropWeightEl = document.getElementById('adw-' + exId);
  const dropRepsEl = document.getElementById('adr-' + exId);
  if (dropWeightEl && dropRepsEl) {
    const dw = parseFloat((dropWeightEl.value || '0').replace(',', '.')) || 0;
    const dr = parseInt(dropRepsEl.value) || 0;
    if (dw > 0 && dr > 0) {
      activeSession.sets[exId].push({ weight: dw, reps: dr, type: 'drop' });
    }
  }

  if (checkPR(exId, weight, reps)) {
    APP_STATE.prs.push({
      exerciseId: exId, date: activeSession.date,
      weight, reps, volume: weight * reps,
      week: activeSession.week, mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

function saveEditSuperset(mainExId, setIndex, exIds) {
  exIds.forEach(function(exId) {
    var exInfo = getExerciseInfo(exId);
    var bw = exInfo && exInfo.bodyweight;
    var wEl = document.getElementById('edit-w-' + exId + '-' + setIndex);
    var rEl = document.getElementById('edit-r-' + exId + '-' + setIndex);
    if (activeSession.sets[exId] && activeSession.sets[exId][setIndex]) {
      if (!bw && wEl) activeSession.sets[exId][setIndex].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
      if (rEl) activeSession.sets[exId][setIndex].reps = parseInt(rEl.value) || 0;
    }
  });

  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingSet = null;
  saveState();
  renderWorkoutDetail();
}

// =============================================
// FINISH WORKOUT
// =============================================

function finishWorkout() {
  if (!activeSession) return;

  activeSession._completed = true;

  // Use session timer for accurate duration
  const sessionSec = getSessionSeconds();
  activeSession.duration = sessionSec > 0 ? sessionSec : (activeSession._startTime ? Math.round((Date.now() - activeSession._startTime) / 1000) : 3600);

  stopSessionTimer();
  stopRestTimer();

  // Remove internal props before saving
  const toSave = { ...activeSession };
  delete toSave._startTime;
  delete toSave._currentStrengthSet;
  delete toSave._currentCircuitRound;
  delete toSave._completed;
  // Keep _circuitDone and _extraRounds for round viewing after completion
  // delete toSave._circuitDone;

  // Replace or add session
  const idx = APP_STATE.sessions.findIndex(s => s.id === toSave.id);
  if (idx >= 0) {
    APP_STATE.sessions[idx] = toSave;
  } else {
    APP_STATE.sessions.push(toSave);
  }

  // Check if auto-goals should be set after W1 completion
  checkAutoGoals();

  saveState();

  activeSubTab = 'done';
  renderWorkoutDetail();
}

// =============================================
// AUTO-GOAL ENGINE
// Progressive Overload: +15% over 5 weeks (~3% per week)
// Based on Renaissance Periodization / Eric Helms research
// =============================================

function checkAutoGoals() {
  const meso = APP_STATE.settings.mesocycle;

  // Only auto-set goals once, after W1 is complete
  if (APP_STATE.settings.goalsAutoSet) return;

  // Check if all 4 W1 workouts exist
  const w1Sessions = APP_STATE.sessions.filter(
    s => s.week === 1 && s.mesocycle === meso.number
  );
  const w1WorkoutIds = new Set(w1Sessions.map(s => s.workoutId));
  const allW1Done = WEEK_SCHEDULE.every(wid => w1WorkoutIds.has(wid));

  if (!allW1Done) return;

  // Calculate W1 baseline volumes
  const baseTotal = w1Sessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);
  const muscles = ['ruecken', 'brust', 'quads', 'hams'];
  const baseMuscle = {};
  muscles.forEach(m => {
    baseMuscle[m] = w1Sessions.reduce((sum, s) => sum + calcMuscleVolume(s, m), 0);
  });

  // Set W5 targets: baseline + 15% (challenging but sustainable)
  // Weekly progression: ~3% per week linear ramp
  const TARGET_INCREASE = 0.15; // 15% over 5 weeks
  APP_STATE.settings.goals.weeklyVolume = Math.round(baseTotal * (1 + TARGET_INCREASE));
  muscles.forEach(m => {
    APP_STATE.settings.goals[m] = Math.round(baseMuscle[m] * (1 + TARGET_INCREASE));
  });

  APP_STATE.settings.goalsAutoSet = true;
  APP_STATE.settings.goalsBaseline = {
    weeklyVolume: baseTotal,
    ruecken: baseMuscle.ruecken,
    brust: baseMuscle.brust,
    quads: baseMuscle.quads,
    hams: baseMuscle.hams
  };

  console.log('Auto-Goals gesetzt! Baseline:', baseTotal, '-> Ziel W5:', APP_STATE.settings.goals.weeklyVolume);
}

// Get the progressive target for a specific week (linear ramp from baseline to W5 goal)
function getWeekTarget(week, muscle) {
  const baseline = APP_STATE.settings.goalsBaseline;
  const goals = APP_STATE.settings.goals;
  if (!baseline || !goals) return 0;

  const key = muscle || 'weeklyVolume';
  const base = baseline[key] || 0;
  const target = goals[key] || 0;

  if (base === 0 || target === 0) return 0;

  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard;

  if (week >= totalWeeks + 1) {
    // Deload week: -40% from peak
    return Math.round(target * 0.6);
  }

  // Linear interpolation: W1 = base, W5 = target
  const progress = (week - 1) / (totalWeeks - 1);
  return Math.round(base + (target - base) * progress);
}

// =============================================
// DONE TAB
// =============================================

function renderDoneTab(plan) {
  const session = activeSession || APP_STATE.sessions.find(
    s => s.workoutId === activeWorkoutId &&
         s.week === (selectedWeek || APP_STATE.settings.mesocycle.currentWeek) &&
         s.mesocycle === APP_STATE.settings.mesocycle.number
  );

  if (!session) return '<p style="text-align:center;color:var(--text-sec);padding:40px 0">Kein abgeschlossenes Training</p>';

  const totalVol = calcSessionVolume(session);
  const duration = session.duration || (sessionTimer.running ? getSessionSeconds() : 0);
  const durationMin = Math.round(duration / 60);

  // Muscle volume boxes
  const split = plan.muscleSplit;
  const muscleLabels = { ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hams', bizeps: 'Bizeps', core: 'Core', trizeps: 'Trizeps', schultern: 'Schultern' };

  let statsBoxes = '';
  Object.entries(split).forEach(([muscle, pct]) => {
    const vol = Math.round(totalVol * pct / 100);
    const totalReps = Object.entries(session.sets || {}).reduce((sum, [_, sets]) => sum + calcTotalReps(sets), 0);
    const muscleReps = Math.round(totalReps * pct / 100);
    statsBoxes += `
      <div class="done-stat-box">
        <div class="done-stat-label">${muscleLabels[muscle] || muscle}</div>
        <div class="done-stat-value">${(vol / 1000).toFixed(1)}t</div>
        <div class="done-stat-sub">${muscleReps} Reps</div>
      </div>`;
  });

  // PRs from this session
  const sessionPRs = APP_STATE.prs.filter(pr => pr.date === session.date);
  let prHtml = '';
  if (sessionPRs.length > 0) {
    prHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin:12px 0">';
    sessionPRs.forEach(pr => {
      prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
    });
    prHtml += '</div>';
  }

  // Compare with last session
  const lastSession = APP_STATE.sessions.find(
    s => s.workoutId === session.workoutId && s.id !== session.id && s.date < session.date
  );
  let improvHtml = '';
  if (lastSession) {
    const lastVol = calcSessionVolume(lastSession);
    const volChange = totalVol - lastVol;
    const volPct = lastVol > 0 ? Math.round(volChange / lastVol * 100) : 0;
    const changeClass = volChange >= 0 ? 'up' : 'down';
    const sign = volChange >= 0 ? '+' : '';
    improvHtml = `
      <div class="card">
        <h3>Steigerungen</h3>
        <div style="margin-top:8px;display:flex;justify-content:space-between">
          <span>Volumen vs. letztes Mal</span>
          <span class="volume-change ${changeClass}">${sign}${volPct}% (${sign}${(volChange/1000).toFixed(1)}t)</span>
        </div>
      </div>`;
  }

  // Motivation messages
  const motivations = [
    'Jede Wiederholung zaehlt. Du wirst staerker!',
    'Konsistenz schlaegt Intensitaet. Weiter so!',
    'Der Koerper erreicht, was der Geist glaubt.',
    'Fortschritt ist Fortschritt, egal wie klein.',
    'Heute hast du dein zukuenftiges Ich staerker gemacht.'
  ];
  const motivText = motivations[Math.floor(Math.random() * motivations.length)];

  // Feeling selector
  const feeling = session.feeling || (activeSession && activeSession.feeling);
  const feelings = [
    { id: 'hard', label: 'Hart' },
    { id: 'good', label: 'Gut' },
    { id: 'easy', label: 'Easy' }
  ];

  return `
    <div class="celebration">
      <div class="celebration-icon">${ICONS.check}</div>
      <h2>Stark trainiert!</h2>
      <p style="color:var(--text-sec);margin-top:4px">${plan.name} | ${durationMin} Min.</p>
    </div>

    <div class="done-stats">${statsBoxes}</div>

    ${prHtml}

    ${improvHtml}

    <div class="motivation-card">
      <div class="motivation-text">${motivText}</div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:12px">Wie hat es sich angefuehlt?</h3>
      <div class="feeling-selector">
        ${feelings.map(f => `
          <button class="feeling-btn ${feeling === f.id ? 'selected' : ''}" onclick="setFeeling('${f.id}')">
            ${f.label}
          </button>
        `).join('')}
      </div>
    </div>

    <button class="btn btn-outline" style="margin-top:12px" onclick="backToWeekOverview()">Zurueck zur Uebersicht</button>
  `;
}

function setFeeling(feeling) {
  if (activeSession) {
    activeSession.feeling = feeling;
    // Update saved session too
    const idx = APP_STATE.sessions.findIndex(s => s.id === activeSession.id);
    if (idx >= 0) APP_STATE.sessions[idx].feeling = feeling;
    saveState();
    renderWorkoutDetail();
  }
}

// =============================================
// LEARNINGS
// =============================================

let learningModalOpen = false;

function addLearning(text) {
  if (!text || !text.trim()) return;
  if (!APP_STATE.learnings) APP_STATE.learnings = [];
  APP_STATE.learnings.push({
    id: Date.now(),
    date: new Date().toISOString().split('T')[0],
    workoutId: activeWorkoutId || null,
    text: text.trim(),
    mesocycle: APP_STATE.settings.mesocycle.number,
    week: APP_STATE.settings.mesocycle.currentWeek
  });
  saveState();
}

function deleteLearning(id) {
  if (!confirm('Learning löschen?')) return;
  APP_STATE.learnings = (APP_STATE.learnings || []).filter(l => l.id !== id);
  saveState();
  renderStatsPage();
}

function openLearningModal() {
  learningModalOpen = true;
  var overlay = document.createElement('div');
  overlay.id = 'learning-modal';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px';
  overlay.innerHTML = '<div style="background:var(--card);border-radius:16px;padding:20px;width:100%;max-width:360px">' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:12px">💡 Learning notieren</div>' +
    '<textarea id="learning-text" style="width:100%;height:100px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:14px;resize:none" placeholder="Was hast du gelernt?"></textarea>' +
    '<div style="display:flex;gap:8px;margin-top:12px">' +
      '<button class="btn btn-orange" style="flex:1" onclick="submitLearning()">Speichern</button>' +
      '<button class="btn btn-outline" style="flex:1" onclick="closeLearningModal()">Abbrechen</button>' +
    '</div></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeLearningModal(); });
  setTimeout(function() { document.getElementById('learning-text').focus(); }, 100);
}

function submitLearning() {
  var text = document.getElementById('learning-text').value;
  if (text && text.trim()) {
    addLearning(text);
  }
  closeLearningModal();
}

function closeLearningModal() {
  learningModalOpen = false;
  var modal = document.getElementById('learning-modal');
  if (modal) modal.remove();
}

function renderLearningsTab() {
  const learnings = (APP_STATE.learnings || []).slice().reverse();
  if (learnings.length === 0) {
    return '<div class="card"><p style="color:var(--text-sec);font-size:14px;text-align:center;padding:24px">Noch keine Learnings. Nutze den 💡 Button während des Trainings!</p></div>';
  }

  let html = '';
  let currentMonth = '';
  learnings.forEach(l => {
    const month = l.date.substring(0, 7);
    if (month !== currentMonth) {
      currentMonth = month;
      const [y, m] = month.split('-');
      const monthNames = ['Jan', 'Feb', 'Mär', 'Apr', 'Mai', 'Jun', 'Jul', 'Aug', 'Sep', 'Okt', 'Nov', 'Dez'];
      html += '<div style="font-size:12px;color:var(--text-ter);font-weight:600;margin:16px 0 8px;text-transform:uppercase">' + monthNames[parseInt(m) - 1] + ' ' + y + '</div>';
    }
    const workoutName = l.workoutId && WORKOUT_PLANS[l.workoutId] ? WORKOUT_PLANS[l.workoutId].name : '';
    html += '<div class="card" style="margin-bottom:8px;padding:12px">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
        '<div style="flex:1">' +
          '<div style="font-size:14px;line-height:1.4">' + l.text + '</div>' +
          '<div style="font-size:11px;color:var(--text-ter);margin-top:6px">' + l.date + (workoutName ? ' · ' + workoutName : '') + ' · W' + (l.week || '?') + '</div>' +
        '</div>' +
        '<button style="color:var(--text-ter);font-size:16px;padding:4px 8px;background:none;border:none" onclick="deleteLearning(' + l.id + ')">×</button>' +
      '</div>' +
    '</div>';
  });
  return html;
}

function renderStatsPage() {
  const allTabs = ['alle', 'ruecken', 'brust', 'quads', 'hams', 'bizeps', 'trizeps', 'learnings'];
  const tabLabels = { alle: 'Alle', ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hams', bizeps: 'Bizeps', trizeps: 'Trizeps', learnings: '💡' };

  let tabsHtml = allTabs.map(t =>
    `<button class="sub-tab ${statsTab === t ? 'active' : ''}" onclick="switchStatsTab('${t}')">${tabLabels[t]}</button>`
  ).join('');

  let content = '';
  if (statsTab === 'alle') {
    content = renderStatsAll();
  } else if (statsTab === 'learnings') {
    content = renderLearningsTab();
  } else {
    content = renderStatsMuscle(statsTab);
  }

  document.getElementById('stats-content').innerHTML = `
    <h1>Statistiken</h1>
    <p style="color:var(--text-sec);margin-bottom:16px">Mesozyklus ${APP_STATE.settings.mesocycle.number}</p>
    <div class="sub-tabs">${tabsHtml}</div>
    ${content}
  `;
}

function switchStatsTab(tab) {
  statsTab = tab;
  renderStatsPage();
}

function renderStatsAll() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const goal = APP_STATE.settings.goals.weeklyVolume;

  // Weekly volume chart
  let bars = '';
  let maxVol = goal;
  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekVolume(w);
    if (vol > maxVol) maxVol = vol;
  }

  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekVolume(w);
    const pct = maxVol > 0 ? (vol / maxVol * 100) : 0;
    bars += `
      <div class="chart-bar-wrapper">
        <div class="chart-value">${(vol/1000).toFixed(1)}t</div>
        <div class="chart-bar" style="height:${pct}%"></div>
        <div class="chart-label">W${w}</div>
      </div>`;
  }

  const goalPct = maxVol > 0 ? (goal / maxVol * 100) : 50;
  const goalBottom = goalPct;

  // Mesocycle progress
  const startVol = calcWeekVolume(1);
  const currentVol = calcWeekVolume(cw);
  const progressPct = goal > 0 ? Math.min(100, (currentVol / goal * 100)) : 0;

  // 1RM estimates (simplified: max weight * (1 + reps/30))
  const strengthExercises = [];
  Object.values(WORKOUT_PLANS).forEach(plan => {
    plan.strength.forEach(ex => {
      let best1RM = 0;
      let first1RM = 0;
      APP_STATE.sessions.forEach((s, si) => {
        (s.sets[ex.id] || []).forEach(set => {
          const est = set.weight * (1 + set.reps / 30);
          if (si < 4 && !first1RM) first1RM = est;
          if (est > best1RM) best1RM = est;
        });
      });
      if (best1RM > 0) {
        const change = first1RM > 0 ? Math.round((best1RM - first1RM) / first1RM * 100) : 0;
        strengthExercises.push({ name: ex.name, rm: Math.round(best1RM * 10) / 10, change });
      }
    });
  });

  let rmHtml = '';
  strengthExercises.forEach(ex => {
    const cls = ex.change >= 0 ? 'up' : 'down';
    const sign = ex.change >= 0 ? '+' : '';
    rmHtml += `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${ex.name}</span>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:14px;font-weight:600">${ex.rm}kg</span>
          <span class="volume-change ${cls}" style="font-size:12px">${sign}${ex.change}%</span>
        </div>
      </div>`;
  });

  // Recent PRs
  const recentPRs = APP_STATE.prs.filter(pr => pr.mesocycle === APP_STATE.settings.mesocycle.number).slice(-8).reverse();
  let prHtml = '';
  recentPRs.forEach(pr => {
    prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
  });

  return `
    <div class="card">
      <h3 style="margin-bottom:12px">Wochen-Volumen</h3>
      <div class="chart-container">
        <div class="chart-bar-group" style="position:relative">
          <div class="chart-goal-line" style="bottom:${goalBottom}%;position:absolute;left:0;right:0"></div>
          ${bars}
        </div>
        <div style="text-align:right;font-size:10px;color:var(--text-ter);margin-top:4px">Ziel: ${(goal/1000).toFixed(1)}t ---</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">Mesozyklus Fortschritt</h3>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-sec);margin-bottom:8px">
        <span>Start: ${(startVol/1000).toFixed(1)}t</span>
        <span>Aktuell: ${(currentVol/1000).toFixed(1)}t</span>
        <span>Ziel: ${(goal/1000).toFixed(1)}t</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">1RM Entwicklung</h3>
      ${rmHtml}
    </div>

    ${prHtml ? '<div class="card"><h3 style="margin-bottom:8px">PRs Mesozyklus</h3><div style="display:flex;flex-wrap:wrap;gap:4px">' + prHtml + '</div></div>' : ''}
  `;
}

function renderStatsMuscle(muscle) {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const goal = APP_STATE.settings.goals[muscle] || 3000;
  const muscleLabels = { ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hamstrings', bizeps: 'Bizeps', trizeps: 'Trizeps' };

  // Weekly chart for this muscle
  let bars = '';
  let maxVol = goal;
  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekMuscleVolume(w, muscle);
    if (vol > maxVol) maxVol = vol;
  }

  const muscleColors = { ruecken: 'var(--blue)', brust: 'var(--orange)', quads: 'var(--green)', hams: 'var(--purple)', bizeps: 'var(--red)', trizeps: '#3498DB' };
  const barColor = muscleColors[muscle] || 'var(--orange)';

  for (let w = 1; w <= cw; w++) {
    const vol = calcWeekMuscleVolume(w, muscle);
    const pct = maxVol > 0 ? (vol / maxVol * 100) : 0;
    bars += `
      <div class="chart-bar-wrapper">
        <div class="chart-value">${(vol/1000).toFixed(1)}t</div>
        <div class="chart-bar" style="height:${pct}%;background:${barColor}"></div>
        <div class="chart-label">W${w}</div>
      </div>`;
  }

  // Progression
  const startVol = calcWeekMuscleVolume(1, muscle);
  const currentVol = calcWeekMuscleVolume(cw, muscle);
  const progressPct = goal > 0 ? Math.min(100, (currentVol / goal * 100)) : 0;

  // Exercises for this muscle (filtered by EXERCISE_MUSCLE map)
  const exercises = [];
  Object.values(WORKOUT_PLANS).forEach(plan => {
    const allExercises = [...plan.strength, ...plan.circuits.flatMap(c => c.exercises), ...plan.accessories];
    allExercises.forEach(ex => {
      if (EXERCISE_MUSCLE[ex.id] !== muscle) return;
      if (exercises.find(e => e.id === ex.id)) return;
      let best1RM = 0, first1RM = 0;
      APP_STATE.sessions.forEach((s, si) => {
        (s.sets[ex.id] || []).forEach(set => {
          const est = set.weight * (1 + set.reps / 30);
          if (si < 4 && !first1RM) first1RM = est;
          if (est > best1RM) best1RM = est;
        });
      });
      if (best1RM > 0) {
        const change = first1RM > 0 ? Math.round((best1RM - first1RM) / first1RM * 100) : 0;
        exercises.push({ id: ex.id, name: ex.name, rm: Math.round(best1RM * 10) / 10, change });
      }
    });
  });

  let exHtml = '';
  exercises.forEach(ex => {
    const cls = ex.change >= 0 ? 'up' : 'down';
    const sign = ex.change >= 0 ? '+' : '';
    exHtml += `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">${ex.name}</span>
        <div style="display:flex;gap:12px;align-items:center">
          <span style="font-size:14px;font-weight:600">${ex.rm}kg</span>
          <span class="volume-change ${cls}">${sign}${ex.change}%</span>
        </div>
      </div>`;
  });

  // PRs for this muscle
  const musclePRs = APP_STATE.prs.filter(pr => {
    const exName = getExerciseName(pr.exerciseId);
    return exercises.some(e => e.id === pr.exerciseId) && pr.mesocycle === APP_STATE.settings.mesocycle.number;
  }).slice(-6).reverse();

  let prHtml = '';
  musclePRs.forEach(pr => {
    prHtml += `<div class="pr-badge">${ICONS.trophy} ${getExerciseName(pr.exerciseId)} ${pr.weight}kg x${pr.reps}</div>`;
  });

  const goalPct = maxVol > 0 ? (goal / maxVol * 100) : 50;

  return `
    <div class="card">
      <h3 style="margin-bottom:12px">${muscleLabels[muscle]} Wochen-Volumen</h3>
      <div class="chart-container">
        <div class="chart-bar-group" style="position:relative">
          <div class="chart-goal-line" style="bottom:${goalPct}%"></div>
          ${bars}
        </div>
        <div style="text-align:right;font-size:10px;color:var(--text-ter);margin-top:4px">Ziel: ${(goal/1000).toFixed(1)}t ---</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">Progression</h3>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-sec);margin-bottom:8px">
        <span>Start: ${(startVol/1000).toFixed(1)}t</span>
        <span>Aktuell: ${(currentVol/1000).toFixed(1)}t</span>
        <span>Ziel: ${(goal/1000).toFixed(1)}t</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%;background:${barColor}"></div></div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px">1RM Entwicklung</h3>
      ${exHtml || '<p style="color:var(--text-sec);font-size:14px">Keine Daten</p>'}
    </div>

    ${prHtml ? '<div class="card"><h3 style="margin-bottom:8px">PRs</h3><div style="display:flex;flex-wrap:wrap;gap:4px">' + prHtml + '</div></div>' : ''}
  `;
}

      </div>
      <div class="settings-row" onclick="exportCSV()" style="cursor:pointer">
        <div class="settings-label">CSV Export (Google Sheets)</div>
        <span style="color:var(--text-sec);font-size:18px">&rarr;</span>
      </div>
      <div class="settings-row" onclick="startNewMesocycle()" style="cursor:pointer">
        <div class="settings-label" style="color:var(--orange)">Neuen Mesozyklus starten</div>
        <span style="color:var(--orange);font-size:18px">&rarr;</span>
      </div>
      <div class="settings-row" onclick="confirmDeleteData()" style="cursor:pointer">
        <div class="settings-label" style="color:var(--red)">Alle Daten loeschen</div>
        <span style="color:var(--red);font-size:18px">&rarr;</span>
      </div>
    </div>

    <div style="text-align:center;padding:20px 0;color:var(--text-ter);font-size:12px">
      Training Tracker v3.0
    </div>
  `;
}

function updateBodyWeight() {
  const val = parseFloat(document.getElementById('body-weight-input').value);
  if (!isNaN(val) && val > 0) {
    APP_STATE.settings.bodyWeight = val;
    APP_STATE.settings.weightHistory.push({
      date: new Date().toISOString().split('T')[0],
      weight: val
    });
    saveState();
    renderSettingsPage();
  }
}

function changeWeek(delta) {
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;
  meso.currentWeek = Math.max(1, Math.min(totalWeeks, meso.currentWeek + delta));
  selectedWeek = meso.currentWeek;
  saveState();
  renderSettingsPage();
}

function saveGoals() {
  APP_STATE.settings.goals.weeklyVolume = parseInt(document.getElementById('goal-total').value) || 13500;
  APP_STATE.settings.goals.ruecken = parseInt(document.getElementById('goal-ruecken').value) || 5500;
  APP_STATE.settings.goals.brust = parseInt(document.getElementById('goal-brust').value) || 3400;
  APP_STATE.settings.goals.quads = parseInt(document.getElementById('goal-quads').value) || 3000;
  APP_STATE.settings.goals.hams = parseInt(document.getElementById('goal-hams').value) || 2800;
  saveState();
  renderSettingsPage();
}

function updateExWeight(exId, value) {
  const w = parseFloat(value);
  if (!APP_STATE.customWeights) APP_STATE.customWeights = {};
  if (!isNaN(w) && w >= 0) {
    APP_STATE.customWeights[exId] = w;
    // Also update the WORKOUT_PLANS in memory for this session
    for (const plan of Object.values(WORKOUT_PLANS)) {
      for (const ex of plan.strength) { if (ex.id === exId) ex.weight = w; }
      for (const circuit of plan.circuits) {
        for (const ex of circuit.exercises) { if (ex.id === exId) ex.weight = w; }
      }
      for (const ex of plan.accessories) { if (ex.id === exId) ex.weight = w; }
    }
    saveState();
  }
}

// Apply custom weights on load
function applyCustomWeights() {
  const cw = APP_STATE.customWeights || {};
  for (const [exId, w] of Object.entries(cw)) {
    for (const plan of Object.values(WORKOUT_PLANS)) {
      for (const ex of plan.strength) { if (ex.id === exId) ex.weight = w; }
      for (const circuit of plan.circuits) {
        for (const ex of circuit.exercises) { if (ex.id === exId) ex.weight = w; }
      }
      for (const ex of plan.accessories) { if (ex.id === exId) ex.weight = w; }
    }
  }
}
// Clear stale customWeights on version update
const APP_VERSION = '3.1';
if (APP_STATE._appVersion !== APP_VERSION) {
  APP_STATE.customWeights = {};
  APP_STATE._appVersion = APP_VERSION;
  saveState();
}
applyCustomWeights();

function exportData() {
  const dataStr = JSON.stringify(APP_STATE, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `training-data-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportCSV() {
  // Build CSV with all sessions and sets for Google Sheets
  const rows = [['Datum', 'Woche', 'Meso', 'Workout', 'Uebung', 'Set', 'Gewicht (kg)', 'Reps', 'Volumen', 'Gefuehl']];

  APP_STATE.sessions
    .sort((a, b) => a.date.localeCompare(b.date))
    .forEach(session => {
      const plan = WORKOUT_PLANS[session.workoutId];
      if (!plan) return;

      Object.entries(session.sets || {}).forEach(([exId, sets]) => {
        const exName = getExerciseName(exId);
        sets.forEach((set, i) => {
          const isDB = isDumbbellExercise(exId);
          const volMultiplier = isDB ? 2 : 1;
          rows.push([
            session.date,
            session.week,
            session.mesocycle,
            plan.name,
            exName + (isDB ? ' (DB)' : ''),
            i + 1,
            set.weight,
            set.reps,
            set.weight * volMultiplier * set.reps,
            session.feeling || ''
          ]);
        });
      });
    });

  // Add summary rows
  rows.push([]);
  rows.push(['--- WOCHEN-ZUSAMMENFASSUNG ---']);
  rows.push(['Woche', 'Meso', 'Total Vol.', 'Ruecken', 'Brust', 'Quads', 'Hams']);

  const meso = APP_STATE.settings.mesocycle;
  for (let w = 1; w <= meso.currentWeek; w++) {
    rows.push([
      'W' + w,
      meso.number,
      calcWeekVolume(w, meso.number),
      calcWeekMuscleVolume(w, 'ruecken', meso.number),
      calcWeekMuscleVolume(w, 'brust', meso.number),
      calcWeekMuscleVolume(w, 'quads', meso.number),
      calcWeekMuscleVolume(w, 'hams', meso.number)
    ]);
  }

  const csvContent = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `training-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function confirmDeleteData() {
  if (confirm('Alle Trainingsdaten wirklich loeschen? Das kann nicht rueckgaengig gemacht werden.')) {
    localStorage.removeItem(STORAGE_KEY);
    APP_STATE = getDefaultState();
    saveState();
    navigateTo('home');
  }
}

function startNewMesocycle() {
  if (!confirm('Neuen Mesozyklus starten? Bestehende Daten bleiben erhalten, aber Ziele werden zurueckgesetzt.')) return;
  const meso = APP_STATE.settings.mesocycle;
  meso.number += 1;
  meso.currentWeek = 1;
  APP_STATE.settings.goals = { weeklyVolume: 0, ruecken: 0, brust: 0, quads: 0, hams: 0 };
  APP_STATE.settings.goalsAutoSet = false;
  delete APP_STATE.settings.goalsBaseline;
  saveState();
  navigateTo('home');
}

// =============================================
// SWIPE TO DELETE
// =============================================

let swipeStartX = 0;
let swipeCurrentX = 0;
let swipeEl = null;
let swipeHappened = false;

document.addEventListener('touchstart', function(e) {
  var wrapper = e.target.closest('.swipe-wrapper');
  if (!wrapper) return;
  swipeEl = wrapper.querySelector('.swipe-content');
  swipeStartX = e.touches[0].clientX;
  swipeCurrentX = swipeStartX;
  swipeHappened = false;
  if (swipeEl) swipeEl.style.transition = 'none';
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!swipeEl) return;
  swipeCurrentX = e.touches[0].clientX;
  var diff = swipeCurrentX - swipeStartX;
  if (Math.abs(diff) > 5) swipeHappened = true;
  if (diff < 0) {
    var wrapper = swipeEl.closest('.swipe-wrapper');
    if (wrapper && !wrapper.classList.contains('swiping')) wrapper.classList.add('swiping');
    swipeEl.style.transform = 'translateX(' + Math.max(diff, -80) + 'px)';
  }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!swipeEl) return;
  swipeEl.style.transition = 'transform 0.2s ease';
  var diff = swipeCurrentX - swipeStartX;

  if (diff < -60) {
    // Swiped enough - show delete
    swipeEl.style.transform = 'translateX(-80px)';
    var wrapper = swipeEl.closest('.swipe-wrapper');
    var bg = wrapper.querySelector('.swipe-delete-bg');
    if (bg) {
      bg.onclick = function() {
        var exId = wrapper.dataset.exId;
        var setIdx = parseInt(wrapper.dataset.setIndex);
        deleteSet(exId, setIdx);
      };
    }
  } else {
    swipeEl.style.transform = 'translateX(0)';
    var w = swipeEl.closest('.swipe-wrapper');
    if (w) w.classList.remove('swiping');
  }
  swipeEl = null;
});

function deleteSet(exId, setIndex) {
  if (!activeSession || !activeSession.sets[exId]) return;

  // Check if this exercise belongs to a superset group — delete from all members
  var exInfo = getExerciseInfo(exId);
  if (exInfo && exInfo.group && activeWorkoutId) {
    var plan = WORKOUT_PLANS[activeWorkoutId];
    if (plan) {
      plan.accessories.forEach(function(acc) {
        if (acc.group === exInfo.group && activeSession.sets[acc.id] && activeSession.sets[acc.id].length > setIndex) {
          activeSession.sets[acc.id].splice(setIndex, 1);
        }
      });
    }
  } else {
    activeSession.sets[exId].splice(setIndex, 1);
  }

  saveState();
  renderWorkoutDetail();
}

function startEditSet(exId, index) {
  // Don't trigger edit if a swipe just happened
  if (swipeHappened) { swipeHappened = false; return; }
  editingSet = { exId: exId, index: index };
  renderWorkoutDetail();
}

function cancelEditSet() {
  editingSet = null;
  renderWorkoutDetail();
}

function saveEditSet(exId, index) {
  if (!activeSession || !activeSession.sets[exId] || !activeSession.sets[exId][index]) return;

  var wEl = document.getElementById('edit-w-' + exId + '-' + index);
  var rEl = document.getElementById('edit-r-' + exId + '-' + index);
  if (wEl) activeSession.sets[exId][index].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
  if (rEl) activeSession.sets[exId][index].reps = parseInt(rEl.value) || 0;

  // Check if a drop set was added via edit
  var dwEl = document.getElementById('edit-dw-' + exId + '-' + index);
  var drEl = document.getElementById('edit-dr-' + exId + '-' + index);
  if (dwEl && drEl) {
    var dw = parseFloat(dwEl.value.replace(',', '.')) || 0;
    var dr = parseInt(drEl.value) || 0;
    if (dw > 0 && dr > 0) {
      // Insert drop set right after this set
      activeSession.sets[exId].splice(index + 1, 0, { weight: dw, reps: dr, type: 'drop' });
    }
  }

  // Also update the saved session in APP_STATE if workout was already finished
  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingSet = null;
  saveState();
  renderWorkoutDetail();
}

// =============================================
// ZIRKEL ROUND SWIPE NAVIGATION
// =============================================

let zirkelSwipeStartX = 0;
let zirkelSwipeStartY = 0;
let zirkelSwipeArea = null;
let zirkelSwipeLocked = false; // true = horizontal swipe confirmed

document.addEventListener('touchstart', function(e) {
  // Don't hijack swipe-to-delete
  if (e.target.closest('.swipe-wrapper')) return;
  var area = e.target.closest('.zirkel-round-area');
  if (!area) return;
  zirkelSwipeArea = area;
  zirkelSwipeStartX = e.touches[0].clientX;
  zirkelSwipeStartY = e.touches[0].clientY;
  zirkelSwipeLocked = false;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!zirkelSwipeArea) return;
  var dx = e.touches[0].clientX - zirkelSwipeStartX;
  var dy = e.touches[0].clientY - zirkelSwipeStartY;
  // Lock direction after 10px movement
  if (!zirkelSwipeLocked && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
    if (Math.abs(dx) > Math.abs(dy)) {
      zirkelSwipeLocked = true; // horizontal swipe
    } else {
      zirkelSwipeArea = null; // vertical scroll, bail out
    }
  }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!zirkelSwipeArea || !zirkelSwipeLocked) {
    zirkelSwipeArea = null;
    return;
  }
  var dx = e.changedTouches[0].clientX - zirkelSwipeStartX;
  var circuitId = zirkelSwipeArea.dataset.circuitId;
  var completed = parseInt(zirkelSwipeArea.dataset.completed) || 0;

  if (Math.abs(dx) > 50) {
    var current = viewingRound[circuitId] || (completed + 1);
    if (dx < -50 && current < completed) {
      // Swipe left → next round
      viewCircuitRound(circuitId, current + 1);
    } else if (dx < -50 && current === completed) {
      // Swipe left from last completed → back to input
      clearViewingRound(circuitId);
    } else if (dx > 50 && current > 1) {
      // Swipe right → previous round
      viewCircuitRound(circuitId, current - 1);
    } else if (dx > 50 && !viewingRound[circuitId] && completed > 0) {
      // Swipe right from input → view last completed round
      viewCircuitRound(circuitId, completed);
    }
  }
  zirkelSwipeArea = null;
});
