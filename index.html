<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D14">
<title>Training Tracker</title>
<style>
/* =============================================
   CSS CUSTOM PROPERTIES
   ============================================= */
:root {
  --bg: #0D0D14;
  --card: #1A1A25;
  --border: #2A2A35;
  --orange: #E8720C;
  --green: #28B463;
  --red: #E24B4A;
  --blue: #3498DB;
  --purple: #9B59B6;
  --text: #fff;
  --text-sec: #888;
  --text-ter: #555;
  --radius: 12px;
  --nav-height: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
  overflow: hidden;
  height: 100%;
}

body {
  height: 100%;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

input, button, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  border: none;
  outline: none;
  background: none;
}

button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; }

/* =============================================
   APP SHELL
   ============================================= */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* =============================================
   PAGES
   ============================================= */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--nav-height) + var(--safe-bottom) + 16px) 16px;
  padding-top: calc(var(--safe-top) + 16px);
}

.page.active {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* =============================================
   BOTTOM NAVIGATION
   ============================================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  display: flex;
  background: #111118;
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 0;
  gap: 4px;
  color: var(--text-ter);
  transition: color 0.2s;
  min-height: var(--nav-height);
}

.nav-item.active { color: var(--orange); }
.nav-item svg { width: 24px; height: 24px; }
.nav-item span { font-size: 10px; font-weight: 500; }

/* =============================================
   CARDS & COMMON ELEMENTS
   ============================================= */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 14px;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  margin-top: 20px;
}

.section-title:first-child { margin-top: 0; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
h3 { font-size: 15px; font-weight: 600; }

/* =============================================
   WORKOUT ROW
   ============================================= */
.workout-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  min-height: 56px;
}

.workout-row:last-child { border-bottom: none; }

.workout-status {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.workout-status.done { background: var(--green); }
.workout-status.pending { border: 2px solid var(--border); }
.workout-status.current { border: 2px solid var(--orange); }

.workout-info { flex: 1; }
.workout-name { font-size: 15px; font-weight: 600; }
.workout-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.workout-day { font-size: 12px; color: var(--text-ter); flex-shrink: 0; }

/* =============================================
   WEEK PILLS
   ============================================= */
.week-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.week-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  border: 1px solid var(--border);
  color: var(--text-sec);
  background: transparent;
  flex-shrink: 0;
}

.week-pill.current { background: var(--orange); color: #fff; border-color: var(--orange); }
.week-pill.done { background: var(--green); color: #fff; border-color: var(--green); opacity: 0.7; }
.week-pill.future { opacity: 0.5; }

/* =============================================
   SUB TABS
   ============================================= */
.sub-tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 0;
  z-index: 10;
}

.sub-tab {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sec);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}

.sub-tab.active {
  background: var(--orange);
  color: #fff;
}

/* =============================================
   BUTTONS
   ============================================= */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 24px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  min-height: 48px;
  transition: opacity 0.2s;
}

.btn:active { opacity: 0.8; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-outline { border: 1px solid var(--border); color: var(--text-sec); }

.btn-sm {
  padding: 8px 16px;
  font-size: 14px;
  min-height: 36px;
  width: auto;
}

/* =============================================
   INPUT FIELDS
   ============================================= */
.input-field {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 16px;
  color: var(--text);
  text-align: center;
  width: 100%;
  transition: border-color 0.2s;
}

.input-field:focus { border-color: var(--orange); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.input-label {
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
}

/* =============================================
   TIMER
   ============================================= */
.timer-display {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 48px;
  font-weight: 700;
  color: var(--orange);
  text-align: center;
  padding: 16px 0;
}

.timer-presets {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.timer-preset {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-preset.active { border-color: var(--orange); color: var(--orange); }

.timer-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.timer-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-btn.active { border-color: var(--orange); color: var(--orange); }

/* =============================================
   SET CARD
   ============================================= */
.set-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.set-card.done {
  border-color: var(--green);
}
.set-card.done .set-header,
.set-card.done div { color: var(--text-sec); }

.set-card.current { border-color: var(--orange); }
.set-card.upcoming { opacity: 0.4; }

.set-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.set-number { font-size: 14px; font-weight: 600; }
.set-type { font-size: 11px; color: var(--text-sec); }

/* =============================================
   EXERCISE CARD
   ============================================= */
.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.exercise-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.exercise-last { font-size: 12px; color: var(--text-sec); margin-bottom: 12px; }

/* =============================================
   VOLUME BAR
   ============================================= */
.volume-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.volume-label { font-size: 13px; width: 70px; flex-shrink: 0; }
.volume-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.volume-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.volume-change {
  font-size: 12px;
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

.volume-change.up { color: var(--green); }
.volume-change.down { color: var(--red); }

/* =============================================
   ROUND PILLS
   ============================================= */
.round-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  justify-content: center;
}

.round-pill {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid var(--border);
  color: var(--text-sec);
}

.round-pill.done { background: var(--green); border-color: var(--green); color: #fff; }
.round-pill.current { border-color: var(--orange); color: var(--orange); }

/* =============================================
   PROGRESS BAR
   ============================================= */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  width: 100%;
}

.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* =============================================
   PR BADGE
   ============================================= */
.pr-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(232, 114, 12, 0.15);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  margin: 2px 4px 2px 0;
}

/* =============================================
   FEELING SELECTOR
   ============================================= */
.feeling-selector {
  display: flex;
  gap: 8px;
}

.feeling-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.feeling-btn.selected { border-color: var(--orange); background: rgba(232, 114, 12, 0.1); }

/* =============================================
   CHART
   ============================================= */
.chart-container {
  width: 100%;
  height: 180px;
  position: relative;
  margin-bottom: 8px;
}

.chart-bar-group {
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  height: 140px;
  padding: 0 8px;
  position: relative;
}

.chart-bar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
}

.chart-bar {
  width: 32px;
  background: var(--orange);
  border-radius: 4px 4px 0 0;
  transition: height 0.5s ease;
  min-height: 2px;
}

.chart-label { font-size: 11px; color: var(--text-sec); }
.chart-value { font-size: 10px; color: var(--text-ter); }

.chart-goal-line {
  position: absolute;
  left: 0;
  right: 0;
  border-top: 2px dashed var(--text-ter);
  z-index: 1;
}

/* =============================================
   WARMUP ITEM
   ============================================= */
.warmup-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.warmup-item:last-child { border-bottom: none; }

.warmup-check {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s;
}

.warmup-check.checked { background: var(--green); border-color: var(--green); }
.warmup-text { font-size: 14px; flex: 1; }
.warmup-duration { font-size: 12px; color: var(--text-sec); }

/* =============================================
   SETTINGS ROWS
   ============================================= */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}

.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 15px; }
.settings-value { font-size: 15px; color: var(--text-sec); }

/* =============================================
   DONE PAGE STATS
   ============================================= */
.done-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.done-stat-box {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
}

.done-stat-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
.done-stat-value { font-size: 18px; font-weight: 700; }
.done-stat-sub { font-size: 11px; color: var(--text-ter); margin-top: 2px; }

/* =============================================
   SUPERSET GROUP
   ============================================= */
.superset-group {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}

.superset-header {
  background: rgba(155, 89, 182, 0.1);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
}

.superset-group .exercise-card {
  border: none;
  border-radius: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.superset-group .exercise-card:last-child { border-bottom: none; }

/* =============================================
   BACK BUTTON
   ============================================= */
.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--orange);
  padding: 8px 0;
  margin-bottom: 8px;
}

/* =============================================
   CELEBRATION
   ============================================= */
.celebration {
  text-align: center;
  padding: 32px 0 24px;
}

.celebration-icon {
  width: 64px;
  height: 64px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}

/* =============================================
   SCROLLBAR STYLE
   ============================================= */
.page::-webkit-scrollbar { width: 0; }

/* =============================================
   EXPANDABLE
   ============================================= */
.expandable-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.expandable-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.expandable-content.open { max-height: 500px; }

.chevron {
  transition: transform 0.3s;
  color: var(--text-sec);
}

.chevron.open { transform: rotate(180deg); }

/* =============================================
   MOTIVATION CARD
   ============================================= */
.motivation-card {
  background: linear-gradient(135deg, rgba(232,114,12,0.15), rgba(155,89,182,0.1));
  border: 1px solid rgba(232,114,12,0.3);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.motivation-text {
  font-size: 15px;
  font-style: italic;
  line-height: 1.4;
}

/* SESSION TIMER BAR */
.session-timer-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: rgba(232, 114, 12, 0.08);
  border: 1px solid rgba(232, 114, 12, 0.2);
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-sec);
}
.session-timer-bar .timer-value {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--orange);
}

/* SWIPE TO DELETE */
.swipe-wrapper { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 8px; }
.swipe-wrapper .set-card { margin-bottom: 0; border-radius: 0; }
.swipe-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--red); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 13px; z-index: 0; opacity: 0; transition: opacity 0.15s ease; }
.swipe-wrapper.swiping .swipe-delete-bg { opacity: 1; }
.swipe-content { position: relative; z-index: 1; background: var(--card); transition: transform 0.2s ease; }

/* TO BEAT */
.to-beat { font-size: 11px; color: var(--blue); padding: 4px 8px; background: rgba(52,152,219,0.08); border-radius: 6px; margin-bottom: 8px; display: inline-block; }

/* DROP SET INPUT */
.drop-input-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
.drop-label { font-size: 10px; font-weight: 600; color: var(--red); width: 36px; flex-shrink: 0; text-align: center; }

/* ROUND PILL CLICKABLE */
.round-pill.clickable { cursor: pointer; }
.round-pill.viewing { border-color: var(--blue); color: var(--blue); background: rgba(52,152,219,0.15); }
</style>
</head>
<body>

<div id="app">
  <!-- =============================================
       HOME PAGE
       ============================================= -->
  <div id="page-home" class="page active">
    <div id="home-content"></div>
  </div>

  <!-- =============================================
       TRAINING PAGE
       ============================================= -->
  <div id="page-training" class="page">
    <div id="training-content"></div>
  </div>

  <!-- =============================================
       STATS PAGE
       ============================================= -->
  <div id="page-stats" class="page">
    <div id="stats-content"></div>
  </div>

  <!-- =============================================
       SETTINGS PAGE
       ============================================= -->
  <div id="page-settings" class="page">
    <div id="settings-content"></div>
  </div>

  <!-- =============================================
       BOTTOM NAVIGATION
       ============================================= -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-page="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4M6 12h12"/>
      </svg>
      <span>Training</span>
    </button>
    <button class="nav-item" data-page="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="6" width="4" height="15" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Stats</span>
    </button>
    <button class="nav-item" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      <span>Settings</span>
    </button>
  </nav>
</div>

<script>
/* =============================================================================
   TRAINING APP - MAIN APPLICATION
   ============================================================================= */

// =============================================
// DATA: WORKOUT PLAN DEFINITIONS
// =============================================

const WORKOUT_PLANS = {
  va: {
    id: 'va',
    name: 'Vorderseite A',
    subtitle: 'Chest Fokus',
    day: 'Mo',
    dayIndex: 1,
    muscleSplit: { brust: 40, quads: 25, trizeps: 15, schultern: 20 },
    warmup: [
      { id: 'va-w1', name: 'Iso Aussenrotation R', duration: '30s' },
      { id: 'va-w2', name: 'Iso Aussenrotation L', duration: '30s' },

const STORAGE_KEY = 'training-app';

function getDefaultState() {
  return {
    settings: {
      bodyWeight: 82.5,
      weightHistory: [],
      mesocycle: { number: 1, currentWeek: 1, weeksHard: 5, weeksDeload: 1 },
      goals: { weeklyVolume: 0, ruecken: 0, brust: 0, quads: 0, hams: 0 },
      goalsAutoSet: false
    },
    sessions: [],
    activeWorkout: null,
    prs: [],
    customWeights: {}, // user overrides for default exercise weights
    learnings: [] // { id, date, workoutId, text, mesocycle, week }
  };
}

let APP_STATE = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      const state = Object.assign(getDefaultState(), parsed);
      // Repair any NaN values in session sets (caused by iOS locale decimal bug)
      (state.sessions || []).forEach(function(session) {
        Object.keys(session.sets || {}).forEach(function(exId) {
          (session.sets[exId] || []).forEach(function(set) {
            if (set.weight === null || set.weight === undefined || isNaN(set.weight)) set.weight = 0;
            if (set.reps === null || set.reps === undefined || isNaN(set.reps)) set.reps = 0;
          });
        });
      });
      return state;
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
  return getDefaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_STATE));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

// =============================================
// SAMPLE DATA GENERATION
// =============================================

function generateSampleData() {
  const state = getDefaultState();
  const baseDate = new Date('2026-05-11'); // Week 1 start (Monday)
  const bw = state.settings.bodyWeight;

  // Generate 3 complete weeks + partial week 4
  for (let week = 1; week <= 4; week++) {
    const weekStart = new Date(baseDate);
    weekStart.setDate(weekStart.getDate() + (week - 1) * 7);

    WEEK_SCHEDULE.forEach((wid, idx) => {
      // Week 4: only first 2 workouts done
      if (week === 4 && idx >= 2) return;

      const plan = WORKOUT_PLANS[wid];
      const dayOffsets = { va: 0, ra: 2, vb: 4, rb: 6 };
      const sessionDate = new Date(weekStart);
      sessionDate.setDate(sessionDate.getDate() + dayOffsets[wid]);

      const session = {
        id: `s-w${week}-${wid}`,
        workoutId: wid,
        date: sessionDate.toISOString().split('T')[0],
        week: week,
        mesocycle: 2,
        duration: 2700 + Math.floor(Math.random() * 900),
        feeling: ['hard', 'good', 'easy'][Math.floor(Math.random() * 3)],
        sets: {},
        warmupDone: true,
        circuitRounds: {},
        notes: ''
      };

      // Progressive overload: slightly increase weights/reps each week
      const progression = 1 + (week - 1) * 0.03;

      // Strength sets
      plan.strength.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          const r = Math.max(maxRep - s, parseInt(ex.reps.split('-')[0] || '6'));
          sets.push({ weight: w, reps: r, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      // Circuit exercises
      plan.circuits.forEach(circuit => {
        const rounds = circuit.rounds - (Math.random() > 0.7 ? 1 : 0);
        session.circuitRounds[circuit.id] = rounds;
        circuit.exercises.forEach(ex => {
          const sets = [];
          for (let r = 0; r < rounds; r++) {
            const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
            const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps);
            sets.push({ weight: w, reps: maxRep, type: 'working' });
          }
          session.sets[ex.id] = sets;
        });
      });

      // Accessories
      plan.accessories.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round((ex.weight || 10) * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          sets.push({ weight: w, reps: maxRep, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      state.sessions.push(session);
    });
  }

  // Detect PRs from sample data
  state.prs = detectAllPRs(state.sessions);

  return state;
}

// =============================================
// PR DETECTION
// =============================================

function detectAllPRs(sessions) {
  const prs = [];
  const bestByExercise = {};

  // Sort sessions by date
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));

  sorted.forEach(session => {
    Object.entries(session.sets || {}).forEach(([exId, sets]) => {
      sets.forEach(set => {
        const volume = set.weight * set.reps;
        if (!bestByExercise[exId] || volume > bestByExercise[exId]) {
          if (bestByExercise[exId]) {
            prs.push({
              exerciseId: exId,
              date: session.date,
              weight: set.weight,
              reps: set.reps,
              volume: volume,
              week: session.week,
              mesocycle: session.mesocycle
            });
          }
          bestByExercise[exId] = volume;
        }
      });
    });
  });

  return prs;
}

function checkPR(exerciseId, weight, reps) {
  const volume = weight * reps;
  let best = 0;
  APP_STATE.sessions.forEach(s => {
    (s.sets[exerciseId] || []).forEach(set => {
      const v = set.weight * set.reps;
      if (v > best) best = v;
    });
  });
  return volume > best && best > 0;
}

function getExerciseName(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex.name;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex.name;
    for (const ex of plan.accessories) if (ex.id === exId) return ex.name;
  }
  return exId;
}

function getExerciseInfo(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex;
    for (const ex of plan.accessories) if (ex.id === exId) return ex;
  }
  return null;
}

function isDumbbellExercise(exId) {
  const ex = getExerciseInfo(exId);
  return ex ? !!ex.dumbbell : false;
}

// Get effective weight for volume calculation (doubles for DB exercises)
function getVolumeWeight(exId, trackedWeight) {
  return isDumbbellExercise(exId) ? trackedWeight * 2 : trackedWeight;
}

// Circuit round viewing state
let viewingRound = {}; // { circuitId: roundNumber (1-based) } when viewing past rounds
let editingSet = null; // { exId, index } when editing a completed set
let editingCircuitRound = false; // true when editing a circuit round inline

// Get "To Beat" data from last session
function getToBeat(exerciseId) {
  const sets = getLastSessionSets(exerciseId);
  if (!sets || sets.length === 0) return null;
  return sets;
}

function formatToBeat(exerciseId) {
  const sets = getToBeat(exerciseId);
  if (!sets) return '';
  const parts = sets.map((s, i) => 'S' + (i+1) + ': ' + s.weight + 'kg×' + s.reps);
  return 'To Beat: ' + parts.join(' | ');
}

// Progressive overload: target rounds for current week
function getTargetRounds(baseRounds, week) {
  // 3->3->4->4->4 progression (weeks 1-5)
  if (baseRounds <= 3) {
    if (week <= 2) return 3;
    return 4;
  }
  return baseRounds;
}

// =============================================
// WARMUP AUTO-CHECK (timer-driven)
// =============================================

function parseDuration(str) {
  if (!str) return 0;
  const s = str.replace(/\s/g, '').toLowerCase();
  if (s.endsWith('s')) return parseInt(s) || 0;
  if (s.endsWith('m')) return (parseInt(s) || 0) * 60;
  return parseInt(s) || 0;
}

function getWarmupThresholds(plan) {
  // Returns array of { id, cumulativeSeconds } for each exercise with a duration
  let cumulative = 0;
  const thresholds = [];
  plan.warmup.forEach(ex => {
    const dur = parseDuration(ex.duration);
    if (dur > 0) {
      cumulative += dur;
      thresholds.push({ id: ex.id, at: cumulative });
    }
    // Exercises without duration (e.g. "20 Push-ups") require manual check
  });
  return thresholds;
}

let lastAutoCheckTime = 0; // prevent double-beeps

function checkWarmupAutoComplete() {
  // Only run when we're on warmup tab with a running countup timer
  if (activeSubTab !== 'warmup' || restTimer.mode !== 'countup') return;
  if (!activeWorkoutId) return;
  const plan = WORKOUT_PLANS[activeWorkoutId];
  if (!plan) return;

  const elapsed = getCountupSeconds();
  const thresholds = getWarmupThresholds(plan);
  let changed = false;

  thresholds.forEach(t => {
    if (elapsed >= t.at && !warmupChecked[t.id]) {
      warmupChecked[t.id] = true;
      changed = true;
    }
  });

  if (changed) {
    // Short tick sound for auto-check
    playTick();
    if (navigator.vibrate) navigator.vibrate(100);
    if (activeSession) activeSession.warmupDone = plan.warmup.every(ex => warmupChecked[ex.id]);
    renderWorkoutDetail();
    setTimeout(autoScrollWarmup, 50);
  }
}

function playTick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 660;
    gain.gain.value = 0.25;
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.08);
  } catch(e) {}
}

// =============================================
// TIMER SYSTEM (Date.now() based, survives app switch)
// =============================================

let restTimer = {
  mode: 'stopped',    // 'stopped' | 'countdown' | 'countup'
  endTime: null,      // Date.now() + ms for countdown
  startTime: null,    // Date.now() for countup
  pausedRemaining: null, // ms remaining when paused (countdown)
  pausedElapsed: null,   // ms elapsed when paused (countup)
  completed: false
};

let sessionTimer = {
  startTime: null,
  running: false,
  pausedElapsed: 0
};

let displayInterval = null;

function startDisplayUpdate() {
  if (displayInterval) return;
  displayInterval = setInterval(function() {
    updateAllTimerDisplays();
    checkCountdownCompletion();
    checkWarmupAutoComplete();
    checkEmomTimer();
  }, 250);
}

function stopDisplayUpdate() {
  if (restTimer.mode === 'stopped' && !sessionTimer.running && !emomTimer.running) {
    if (displayInterval) { clearInterval(displayInterval); displayInterval = null; }
  }
}

function getCountdownSeconds() {
  if (restTimer.mode !== 'countdown') return 0;
  if (restTimer.pausedRemaining !== null) return Math.max(0, Math.ceil(restTimer.pausedRemaining / 1000));
  var remaining = restTimer.endTime - Date.now();
  return Math.max(0, Math.ceil(remaining / 1000));
}

function getCountupSeconds() {
  if (restTimer.mode !== 'countup') return 0;
  if (restTimer.pausedElapsed !== null) return Math.floor(restTimer.pausedElapsed / 1000);
  return Math.floor((Date.now() - restTimer.startTime) / 1000);
}

function getTimerSeconds() {
  if (restTimer.mode === 'countdown') return getCountdownSeconds();
  if (restTimer.mode === 'countup') return getCountupSeconds();
  return 0;
}

function getSessionSeconds() {
  if (!sessionTimer.startTime) return 0;
  if (!sessionTimer.running) return Math.floor(sessionTimer.pausedElapsed / 1000);
  return Math.floor((sessionTimer.pausedElapsed + Date.now() - sessionTimer.startTime) / 1000);
}

function startCountdown(seconds) {
  restTimer.mode = 'countdown';
  restTimer.endTime = Date.now() + seconds * 1000;
  restTimer.pausedRemaining = null;
  restTimer.completed = false;
  startDisplayUpdate();
  updateAllTimerDisplays();
}

function startCountup() {
  restTimer.mode = 'countup';
  restTimer.startTime = Date.now();
  restTimer.pausedElapsed = null;
  restTimer.completed = false;
  startDisplayUpdate();
  updateAllTimerDisplays();
}

function pauseRestTimer() {
  if (restTimer.mode === 'countdown' && restTimer.pausedRemaining === null) {
    restTimer.pausedRemaining = Math.max(0, restTimer.endTime - Date.now());
  } else if (restTimer.mode === 'countup' && restTimer.pausedElapsed === null) {
    restTimer.pausedElapsed = Date.now() - restTimer.startTime;
  }
}

function resumeRestTimer() {
  if (restTimer.mode === 'countdown' && restTimer.pausedRemaining !== null) {
    restTimer.endTime = Date.now() + restTimer.pausedRemaining;
    restTimer.pausedRemaining = null;
  } else if (restTimer.mode === 'countup' && restTimer.pausedElapsed !== null) {
    restTimer.startTime = Date.now() - restTimer.pausedElapsed;
    restTimer.pausedElapsed = null;
  }
  startDisplayUpdate();
}

function stopRestTimer() {
  restTimer.mode = 'stopped';
  restTimer.endTime = null;
  restTimer.startTime = null;
  restTimer.pausedRemaining = null;
  restTimer.pausedElapsed = null;
  restTimer.completed = false;
  stopDisplayUpdate();
}

function resetRestTimer() {
  stopRestTimer();
  updateAllTimerDisplays();
}

function isRestTimerPaused() {
  return (restTimer.mode === 'countdown' && restTimer.pausedRemaining !== null) ||
         (restTimer.mode === 'countup' && restTimer.pausedElapsed !== null);
}

function isRestTimerRunning() {
  return restTimer.mode !== 'stopped' && !isRestTimerPaused();
}

// Session timer
function startSessionTimer() {
  if (sessionTimer.running) return;
  sessionTimer.startTime = Date.now();
  sessionTimer.running = true;
  startDisplayUpdate();
}

function stopSessionTimer() {
  if (!sessionTimer.running) return;
  sessionTimer.pausedElapsed += Date.now() - sessionTimer.startTime;
  sessionTimer.running = false;
  stopDisplayUpdate();
}

function resetSessionTimer() {
  sessionTimer.startTime = null;
  sessionTimer.running = false;
  sessionTimer.pausedElapsed = 0;
}

// EMOM Timer (separate from rest timer - runs independently)
let emomTimer = {
  running: false,
  startTime: null,
  prepSeconds: 10,
  totalRounds: 0,
  exerciseId: null,
  lastAnnouncedRound: 0,
  finished: false
};

function startEmomTimer(exId, rounds, prepSec) {
  emomTimer.running = true;
  emomTimer.startTime = Date.now();
  emomTimer.prepSeconds = prepSec || 10;
  emomTimer.totalRounds = rounds;
  emomTimer.exerciseId = exId;
  emomTimer.lastAnnouncedRound = 0;
  emomTimer.finished = false;
  // Also start session timer if not running
  if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  startDisplayUpdate();
  renderWorkoutDetail();
}

function stopEmomTimer() {
  emomTimer.running = false;
  emomTimer.finished = true;
}

function resetEmomTimer() {
  emomTimer.running = false;
  emomTimer.startTime = null;
  emomTimer.lastAnnouncedRound = 0;
  emomTimer.finished = false;
  emomTimer.exerciseId = null;
}

function getEmomElapsed() {
  if (!emomTimer.startTime) return 0;
  return (Date.now() - emomTimer.startTime) / 1000;
}

function getEmomTotalSeconds() {
  return emomTimer.prepSeconds + emomTimer.totalRounds * 60;
}

function getEmomRemaining() {
  return Math.max(0, getEmomTotalSeconds() - getEmomElapsed());
}

function getEmomCurrentRound() {
  var elapsed = getEmomElapsed();
  if (elapsed < emomTimer.prepSeconds) return 0; // prep phase
  var roundElapsed = elapsed - emomTimer.prepSeconds;
  return Math.min(Math.floor(roundElapsed / 60) + 1, emomTimer.totalRounds);
}

function checkEmomTimer() {
  if (!emomTimer.running) return;
  var remaining = getEmomRemaining();
  var currentRound = getEmomCurrentRound();

  // Beep at round transitions
  if (currentRound > emomTimer.lastAnnouncedRound && currentRound > 0) {
    emomTimer.lastAnnouncedRound = currentRound;
    playEmomBeep(currentRound === emomTimer.totalRounds);
    if (navigator.vibrate) navigator.vibrate(200);
  }

  // Beep at prep→round1 transition
  if (currentRound === 1 && emomTimer.lastAnnouncedRound === 0) {
    emomTimer.lastAnnouncedRound = 1;
    playEmomBeep(false);
    if (navigator.vibrate) navigator.vibrate(200);
  }

  // Timer finished
  if (remaining <= 0) {
    stopEmomTimer();
    playBeep(); // final alert
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    renderWorkoutDetail();
  }
}

function playEmomBeep(isFinal) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var freq = isFinal ? 880 : 660;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.4;
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
    if (!isFinal) {
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = freq + 100;
      gain2.gain.value = 0.3;
      osc2.start(audioCtx.currentTime + 0.2);
      osc2.stop(audioCtx.currentTime + 0.35);
    }
  } catch(e) {}
}

function confirmEmomRound(exId, roundNum) {
  var wEl = document.getElementById('emom-w-' + exId + '-' + roundNum);
  var rEl = document.getElementById('emom-r-' + exId + '-' + roundNum);
  if (!wEl || !rEl) return;
  var weight = parseFloat(wEl.value.replace(',', '.')) || 0;
  var reps = parseInt(rEl.value) || 0;
  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  // Set or update the round's data
  while (activeSession.sets[exId].length < roundNum) {
    activeSession.sets[exId].push({ weight: 0, reps: 0, type: 'working' });
  }
  activeSession.sets[exId][roundNum - 1] = { weight: weight, reps: reps, type: 'working' };
  checkPR(exId, weight, reps);
  saveState();
  renderWorkoutDetail();
}

// Audio beep
let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var playTone = function(freq, startMs) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.4;
      var t = audioCtx.currentTime + startMs / 1000;
      osc.start(t);
      osc.stop(t + 0.15);
    };
    playTone(880, 0);
    playTone(880, 250);
    playTone(1100, 500);
  } catch(e) { console.log('Audio not available'); }
}

function checkCountdownCompletion() {
  if (restTimer.mode === 'countdown' && !restTimer.completed && restTimer.pausedRemaining === null) {
    if (Date.now() >= restTimer.endTime) {
      restTimer.completed = true;
      playBeep();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
  }
}

// Visibility change handler - check timer on return
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) {
    checkCountdownCompletion();
    updateAllTimerDisplays();
  }
});

function formatTime(totalSeconds) {
  var m = Math.floor(Math.abs(totalSeconds) / 60);
  var s = Math.abs(totalSeconds) % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateAllTimerDisplays() {
  // Update all timer-display elements (skip EMOM displays - they use class emom-timer-display)
  var els = document.querySelectorAll('.rest-timer-display:not(.emom-timer-display)');
  var sec = getTimerSeconds();
  els.forEach(function(el) { el.textContent = formatTime(sec); });

  // EMOM timer display
  if (emomTimer.running) {
    var emomEls = document.querySelectorAll('.emom-timer-display');
    var emomSec = Math.ceil(getEmomRemaining());
    emomEls.forEach(function(el) { el.textContent = formatTime(emomSec); });
  }

  // Session timer
  var sessionEls = document.querySelectorAll('.session-timer-value');
  var sessionSec = getSessionSeconds();
  sessionEls.forEach(function(el) { el.textContent = formatTime(sessionSec); });
}

// =============================================
// VOLUME CALCULATIONS
// =============================================

function calcSessionVolume(session) {
  let total = 0;
  Object.entries(session.sets || {}).forEach(([exId, sets]) => {
    const multiplier = isDumbbellExercise(exId) ? 2 : 1;
    sets.forEach(set => {
      const w = Number(set.weight) || 0;
      const r = Number(set.reps) || 0;
      total += w * multiplier * r;
    });
  });
  return total;
}

function calcMuscleVolume(session, muscle) {
  const plan = WORKOUT_PLANS[session.workoutId];
  if (!plan) return 0;
  const totalVolume = calcSessionVolume(session);
  const pct = plan.muscleSplit[muscle] || 0;
  return Math.round(totalVolume * pct / 100);
}

function calcWeekVolume(week, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcSessionVolume(s), 0);
}

function calcWeekMuscleVolume(week, muscle, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcMuscleVolume(s, muscle), 0);
}

function getLastSession(workoutId) {
  const sessions = APP_STATE.sessions
    .filter(s => s.workoutId === workoutId)
    .sort((a, b) => b.date.localeCompare(a.date));
  return sessions[0] || null;
}

function getLastSessionSets(exerciseId) {
  const sorted = [...APP_STATE.sessions].sort((a, b) => b.date.localeCompare(a.date));
  for (const s of sorted) {
    if (s.sets[exerciseId]) return s.sets[exerciseId];
  }
  return null;
}

function formatLastSession(exerciseId) {
  const sets = getLastSessionSets(exerciseId);
  if (!sets || sets.length === 0) return null;
  const reps = sets.map(s => s.reps).join('/');
  const w = sets[0].weight;
  return `${reps} @ ${w}kg`;
}

function calcTotalReps(sets) {
  return (sets || []).reduce((sum, s) => sum + (Number(s.reps) || 0), 0);
}

function calcTotalVolume(sets) {
  return (sets || []).reduce((sum, s) => sum + (Number(s.weight) || 0) * (Number(s.reps) || 0), 0);
}

// DATE HELPERS
// =============================================

function getWeekDateRange(week) {
  const baseDate = new Date('2026-05-11'); // Meso 2, Week 1 start
  const start = new Date(baseDate);
  start.setDate(start.getDate() + (week - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => `${d.getDate()}.${d.getMonth() + 1}`;
  return `${fmt(start)} - ${fmt(end)}`;
}

function getCurrentWeekWorkoutStatus(workoutId) {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const session = APP_STATE.sessions.find(
    s => s.workoutId === workoutId && s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  );
  if (session) return 'done';
  // Check if this is the next workout
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  if (WEEK_SCHEDULE.indexOf(workoutId) === doneCount) return 'current';
  if (WEEK_SCHEDULE.indexOf(workoutId) < doneCount) return 'done';
  return 'pending';
}

function getNextWorkoutId() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  return WEEK_SCHEDULE[Math.min(doneCount, WEEK_SCHEDULE.length - 1)];
}

          const w = i + 1;

          return `<div class="week-pill" style="padding:4px 8px;font-size:11px;flex:1;text-align:center;${cls === 'done' ? 'background:var(--green);border-color:var(--green);color:#fff;opacity:0.7' : cls === 'current' ? 'background:var(--orange);border-color:var(--orange);color:#fff' : 'opacity:0.5'}">W${w}</div>`;
        }).join('')}
        <div class="week-pill" style="padding:4px 8px;font-size:11px;flex:1;text-align:center;opacity:0.5">DL</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    </div>

    <!-- This Week -->
    <div class="section-title">Diese Woche</div>
    <div class="card">${workoutRows}</div>

    <!-- Volume Section -->
    ${APP_STATE.sessions.length > 0 ? `
    <div class="section-title">Volumen W${lastWeek}</div>
    <div class="card">
      <div class="expandable-header" onclick="toggleExpand(this)">
        <span style="font-size:14px;font-weight:600">Muskelgruppen</span>
        <span class="chevron">${ICONS.chevDown}</span>
      </div>
      <div class="expandable-content open" style="margin-top:12px">
        ${volumeBars}
      </div>
    </div>
    ` : `
    <div class="card" style="text-align:center;padding:24px 16px">
      <div style="font-size:32px;margin-bottom:8px">${ICONS.flame || '🔥'}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:4px">Bereit fuer Mesozyklus ${meso.number}!</div>
      <div style="font-size:13px;color:var(--text-sec)">Starte dein erstes Training. Nach W1 werden automatisch progressive Ziele berechnet (+15% ueber 5 Wochen).</div>
    </div>
    `}

    ${prHtml}

    <!-- Stats Quick View -->
    ${APP_STATE.sessions.length > 0 ? `
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Statistiken</span>
      <button style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:600;cursor:pointer" onclick="goToStatsAll()">Alle anzeigen →</button>
    </div>
    <div class="card" onclick="goToStatsAll()" style="cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text-sec)">Wochen-Volumen W${cw}</span>
        <span style="font-size:14px;font-weight:600">${(currentWeekVol/1000).toFixed(1)}t / ${(weekVolGoal/1000).toFixed(1)}t</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${weekVolPct}%"></div></div>
      ${rmSummary ? '<div style="margin-top:8px"><div style="font-size:12px;color:var(--text-sec);font-weight:600;margin-bottom:4px">1RM Schätzungen</div>' + rmSummary + '</div>' : ''}
    </div>
    ` : ''}

    <!-- Learnings Widget -->
    <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
      <span>Learnings</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button style="background:var(--orange);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:18px;line-height:28px;text-align:center;cursor:pointer" onclick="openLearningModal()">+</button>
        <button style="background:none;border:none;color:var(--orange);font-size:12px;font-weight:600;cursor:pointer" onclick="goToLearnings()">Alle →</button>
      </div>
    </div>
    <div class="card">
      ${learningsHtml}
    </div>
  `;
}

function goToStatsAll() {
  statsTab = 'alle';
  navigateTo('stats');
}

function goToLearnings() {
  statsTab = 'learnings';
  navigateTo('stats');
}

function toggleExpand(el) {
  const content = el.nextElementSibling;
  const chevron = el.querySelector('.chevron');
  content.classList.toggle('open');
  chevron.classList.toggle('open');
}

// =============================================
// TRAINING PAGE RENDER
// =============================================

function renderTrainingPage() {
  if (trainingView === 'workout-detail') {
    renderWorkoutDetail();
  } else {
    renderWeekOverview();
  }
}

function renderWeekOverview() {
  selectedWeek = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;

  // Week pills
  let weekPills = '';
  for (let w = 1; w <= meso.weeksHard; w++) {
    const cls = w < cw ? 'done' : w === cw ? 'current' : 'future';
    const selected = w === selectedWeek ? 'border:2px solid #fff;' : '';
    weekPills += `<button class="week-pill ${cls}" style="${selected}" onclick="selectWeek(${w})">W${w}</button>`;
  }
  weekPills += `<button class="week-pill future" onclick="selectWeek(${totalWeeks})">DL</button>`;

  // Workout rows for selected week
  let workoutRows = '';
  WEEK_SCHEDULE.forEach(wid => {
    const plan = WORKOUT_PLANS[wid];
    const session = APP_STATE.sessions.find(
      s => s.workoutId === wid && s.week === selectedWeek && s.mesocycle === meso.number
    );
    const isDone = !!session;
    const status = isDone ? 'done' : (selectedWeek === cw ? getCurrentWeekWorkoutStatus(wid) : 'pending');
    const checkHtml = isDone ? ICONS.check : '';
    const volStr = session ? `${Math.round(calcSessionVolume(session) / 1000)}t` : '-';

    workoutRows += `
      <div class="workout-row" onclick="openWorkout('${wid}')">
        <div class="workout-status ${status}">${checkHtml}</div>
        <div class="workout-info">
          <div class="workout-name">${plan.name}</div>
          <div class="workout-sub">${plan.subtitle} ${isDone ? '- ' + volStr : ''}</div>
        </div>
        <div class="workout-day">${plan.day}</div>
      </div>`;
  });

  // Weekly summary
  const weekSessions = APP_STATE.sessions.filter(s => s.week === selectedWeek && s.mesocycle === meso.number);
  const weekVol = weekSessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);

  // Next workout button (only show for current week)
  const nextBtn = selectedWeek === cw
    ? `<button class="btn btn-orange" style="margin:16px 0" onclick="startNextWorkout()">Naechstes Training starten</button>`
    : '';

  document.getElementById('training-content').innerHTML = `
    <h1>Training</h1>
    <p style="color:var(--text-sec);margin-bottom:16px">Wochenplan</p>

    <div class="week-pills">${weekPills}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <span style="font-size:14px;font-weight:600">Woche ${selectedWeek}</span>
      <span style="font-size:12px;color:var(--text-sec)">${getWeekDateRange(selectedWeek)}</span>
    </div>

    ${nextBtn}

    <div class="card">${workoutRows}</div>

    <div class="card">
      <div style="display:flex;justify-content:space-between">
        <div>
          <div style="font-size:12px;color:var(--text-sec)">Sessions</div>
          <div style="font-size:20px;font-weight:700">${weekSessions.length}/4</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--text-sec)">Volumen</div>
          <div style="font-size:20px;font-weight:700">${(weekVol / 1000).toFixed(1)}t</div>
        </div>
      </div>
    </div>
  `;
}

function selectWeek(w) {
  selectedWeek = w;
  renderWeekOverview();
}

function openWorkout(workoutId) {
  activeWorkoutId = workoutId;
  trainingView = 'workout-detail';
  activeSubTab = 'warmup';
  warmupChecked = {};

  // Check if there's an existing session for this workout in current week
  const existing = APP_STATE.sessions.find(
    s => s.workoutId === workoutId &&
         s.week === (selectedWeek || APP_STATE.settings.mesocycle.currentWeek) &&
         s.mesocycle === APP_STATE.settings.mesocycle.number
  );

  if (existing) {
    activeSession = JSON.parse(JSON.stringify(existing));
    activeSession._completed = true;  // It was saved = completed
    activeSubTab = 'done';
  } else {
    activeSession = {
      id: uuid(),
      workoutId: workoutId,
      date: new Date().toISOString().split('T')[0],
      week: selectedWeek || APP_STATE.settings.mesocycle.currentWeek,
      mesocycle: APP_STATE.settings.mesocycle.number,
      duration: 0,
      feeling: null,
      sets: {},
      warmupDone: false,
      circuitRounds: {},
      notes: '',
      _startTime: Date.now(),
      _currentStrengthSet: {},
      _currentCircuitRound: {},
      _completed: false,
      _circuitDone: {}
    };
    resetSessionTimer();
    // Timer starts when warmup timer is clicked, not immediately
  }

  navigateTo('training');
}

function startNextWorkout() {
  const nextId = getNextWorkoutId();
  selectedWeek = APP_STATE.settings.mesocycle.currentWeek;
  openWorkout(nextId);
}

function backToWeekOverview() {
  trainingView = 'week-overview';
  stopRestTimer();
  viewingRound = {};
  renderTrainingPage();
}

// =============================================
// WORKOUT DETAIL RENDER
// =============================================

function renderWorkoutDetail() {
  const plan = WORKOUT_PLANS[activeWorkoutId];
  if (!plan) return;

  const week = selectedWeek || APP_STATE.settings.mesocycle.currentWeek;
  const isCompleted = activeSession && activeSession._completed;

  // Sub tabs - always show all tabs so user can view rounds even when completed
  const tabs = ['warmup', 'strength', 'zirkel', 'acc', 'done'];

  let tabsHtml = tabs.map(t => {
    const labels = { warmup: 'Warmup', strength: 'Strength', zirkel: 'Zirkel', acc: 'Acc', done: 'Done' };
    return `<button class="sub-tab ${activeSubTab === t ? 'active' : ''}" onclick="switchSubTab('${t}')">${labels[t]}</button>`;
  }).join('');

  // Session timer bar (shown during active workout)
  let sessionTimerHtml = '';
  if (activeSession && !activeSession._completed) {
    sessionTimerHtml = `
      <div class="session-timer-bar">
        <span>Session</span>
        <span class="session-timer-value timer-value">${formatTime(getSessionSeconds())}</span>
      </div>`;
  }

  let content = '';
  switch (activeSubTab) {
    case 'warmup': content = renderWarmupTab(plan); break;
    case 'strength': content = renderStrengthTab(plan); break;
    case 'zirkel': content = renderZirkelTab(plan); break;
    case 'acc': content = renderAccTab(plan); break;
    case 'done': content = renderDoneTab(plan); break;
  }

  const learningBtn = activeSession && !activeSession._completed
    ? '<button onclick="openLearningModal()" style="position:fixed;bottom:calc(var(--nav-height) + var(--safe-bottom) + 16px);right:16px;width:48px;height:48px;border-radius:50%;background:var(--card);border:1px solid var(--border);font-size:20px;z-index:100;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3)" id="learning-fab">💡</button>'
    : '';

  document.getElementById('training-content').innerHTML = `
    <button class="back-btn" onclick="backToWeekOverview()">${ICONS.back} Woche ${week}</button>
    <h2>${plan.name}</h2>
    <p style="color:var(--text-sec);margin-bottom:16px">${plan.subtitle}</p>
    <div class="sub-tabs">${tabsHtml}</div>
    ${sessionTimerHtml}
    ${content}
    ${learningBtn}
  `;
}

function switchSubTab(tab) {
  activeSubTab = tab;
  renderWorkoutDetail();
}

// =============================================
// WARMUP TAB
// =============================================

function renderWarmupTab(plan) {
  // Build cumulative time thresholds for display
  const thresholds = getWarmupThresholds(plan);
  const thresholdMap = {};
  thresholds.forEach(t => { thresholdMap[t.id] = t.at; });
  const elapsed = getCountupSeconds();

  let items = '';
  let currentWarmupIdx = -1;
  plan.warmup.forEach((ex, i) => {
    const checked = warmupChecked[ex.id] ? 'checked' : '';
    const threshold = thresholdMap[ex.id];
    const isActive = threshold !== undefined && elapsed >= threshold && !warmupChecked[ex.id];
    // Track first unchecked item as "current"
    if (currentWarmupIdx === -1 && !warmupChecked[ex.id]) currentWarmupIdx = i;
    // Show cumulative time as "@ 1:30" next to the duration
    const autoLabel = threshold !== undefined
      ? `<span style="color:${elapsed >= threshold ? 'var(--green)' : 'var(--text-ter)'};font-size:11px;margin-left:4px">@ ${formatTime(threshold)}</span>`
      : (ex.duration ? '' : '<span style="color:var(--text-ter);font-size:11px;margin-left:4px">manuell</span>');
    items += `
      <div class="warmup-item" id="warmup-ex-${i}" style="${currentWarmupIdx === i ? 'background:rgba(232,114,12,0.1);border-radius:8px' : ''}">
        <div class="warmup-check ${checked}" onclick="toggleWarmup('${ex.id}')">
          ${warmupChecked[ex.id] ? ICONS.check : ''}
        </div>
        <div class="warmup-text">${ex.name}</div>
        <div class="warmup-duration">${ex.duration}${autoLabel}</div>
      </div>`;
  });

  const allDone = plan.warmup.every(ex => warmupChecked[ex.id]);
  const timerRunning = restTimer.mode === 'countup';
  const totalWarmupTime = thresholds.length > 0 ? thresholds[thresholds.length - 1].at : 0;

  return `
    <div class="card" style="text-align:center;padding:24px">
      <div class="rest-timer-display timer-display">${formatTime(getTimerSeconds())}</div>
      ${totalWarmupTime > 0 ? `<div style="font-size:11px;color:var(--text-ter);margin-top:4px">Auto-Check bis ${formatTime(totalWarmupTime)}</div>` : ''}
      <div class="timer-controls" style="margin-top:8px">
        <button class="timer-btn" onclick="toggleWarmupTimer()">
          ${isRestTimerRunning() ? ICONS.pause : ICONS.play}
        </button>
        <button class="timer-btn" onclick="resetWarmupTimer()">${ICONS.reset}</button>
      </div>
    </div>
    <div class="card" id="warmup-scroll-container" style="max-height:45vh;overflow-y:auto;-webkit-overflow-scrolling:touch">${items}</div>
    ${allDone ? '<button class="btn btn-orange" onclick="warmupToStrength()">Weiter: Strength</button>' : ''}
  `;
}

function autoScrollWarmup() {
  var container = document.getElementById('warmup-scroll-container');
  if (!container) return;
  // Find first item with highlight background (current exercise)
  var items = container.querySelectorAll('.warmup-item');
  for (var i = 0; i < items.length; i++) {
    if (items[i].style.background && items[i].style.background !== '') {
      items[i].scrollIntoView({ behavior: 'smooth', block: 'center' });
      break;
    }
  }
}

function toggleWarmup(id) {
  warmupChecked[id] = !warmupChecked[id];
  if (activeSession) activeSession.warmupDone = Object.values(warmupChecked).every(v => v);
  renderWorkoutDetail();
}

function toggleWarmupTimer() {
  if (restTimer.mode === 'countup' && !isRestTimerPaused()) {
    pauseRestTimer();
  } else if (restTimer.mode === 'stopped') {
    startCountup();
    // Also start session timer on first warmup action
    if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  } else {
    resumeRestTimer();
  }
  renderWorkoutDetail();
}

function resetWarmupTimer() {
  resetRestTimer();
  // Also reset auto-checked warmup items
  warmupChecked = {};
  renderWorkoutDetail();
}

function warmupToStrength() {
  // Start session timer if not already started
  if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  switchSubTab('strength');
}

// =============================================
// STRENGTH TAB
// =============================================

function renderStrengthTab(plan) {
  let html = '';

  plan.strength.forEach(ex => {
    const lastStr = formatLastSession(ex.id);
    const sessionSets = activeSession.sets[ex.id] || [];
    const currentSetIndex = activeSession._currentStrengthSet
      ? (activeSession._currentStrengthSet[ex.id] || sessionSets.length)
      : sessionSets.length;
    const hasPyramid = ex.pyramidWeights && ex.pyramidWeights.length > 0;
    const isEMOM = !!ex.emom;
    const dbLabel = ex.dumbbell ? ' (pro DB)' : '';

    // Build subtitle line
    let subtitleText = '';
    if (isEMOM) {
      subtitleText = `EMOM ${ex.emomMinutes}min @ ${ex.weight}kg${dbLabel}`;
    } else if (hasPyramid) {
      subtitleText = `Pyramid ${ex.sets}x${ex.reps} | ${ex.pyramidWeights.join('-')}kg${dbLabel}`;
    } else if (ex.pyramidWeights && ex.pyramidWeights.length === ex.sets) {
      subtitleText = `${ex.sets}x${ex.reps} | ${ex.pyramidWeights.join('-')}kg${dbLabel}`;
    } else {
      subtitleText = `${ex.sets}x${ex.reps} @ ${ex.weight}kg${dbLabel}`;
    }
    // Only append note if it adds new info (skip if EMOM/pyramid already says it all)
    if (ex.note && !isEMOM && !hasPyramid) subtitleText += ` (${ex.note})`;

    html += `<div class="exercise-card">
      <div class="exercise-name">${ex.name}</div>
      <div class="exercise-last">${subtitleText}${lastStr ? ' | Letztes Mal: ' + lastStr : ''}</div>`;

    // To Beat display
    const toBeatStr = formatToBeat(ex.id);
    if (toBeatStr) {
      html += `<div class="to-beat">${toBeatStr}</div>`;
    }

    // Timer section - different for EMOM vs regular
    if (isEMOM) {
      // EMOM: continuous countdown timer
      const emomActive = emomTimer.running && emomTimer.exerciseId === ex.id;
      const emomDone = emomTimer.finished && emomTimer.exerciseId === ex.id;
      const emomRound = emomActive ? getEmomCurrentRound() : 0;
      const emomRemaining = emomActive ? getEmomRemaining() : getEmomTotalSeconds() || (ex.emomMinutes * 60 + 10);
      const isPrep = emomActive && emomRound === 0;

      if (!emomActive && !emomDone) {
        // Not started yet - show start button
        html += `
        <div style="text-align:center;margin:12px 0;padding:16px;border-radius:12px;background:rgba(232,114,12,0.1)">
          <div style="font-size:12px;color:var(--orange);font-weight:600;margin-bottom:4px">EMOM ${ex.emomMinutes} MIN</div>
          <div style="font-size:11px;color:var(--text-sec);margin-bottom:12px">${ex.sets} Runden × 60s + 10s Vorbereitung</div>
          <button class="btn btn-orange" style="font-size:16px;padding:12px 32px" onclick="startEmomTimer('${ex.id}', ${ex.sets}, 10)">EMOM Starten</button>
        </div>`;
      } else {
        // Timer running or finished
        const timerColor = isPrep ? 'var(--blue)' : (emomDone ? 'var(--green)' : 'var(--orange)');
        const statusText = isPrep ? 'Vorbereitung...' : (emomDone ? 'Fertig!' : 'Runde ' + emomRound + ' / ' + ex.sets);
        html += `
        <div style="text-align:center;margin:12px 0;padding:16px;border-radius:12px;background:rgba(232,114,12,0.1)">
          <div style="font-size:12px;color:${timerColor};font-weight:600;margin-bottom:4px">${statusText}</div>
          <div class="rest-timer-display emom-timer-display" style="font-family:'SF Mono','Menlo',monospace;font-size:48px;font-weight:700;padding:4px 0;color:${timerColor}">${formatTime(Math.ceil(emomRemaining))}</div>
          ${emomDone ? '<button class="btn btn-sm btn-outline" style="margin-top:8px" onclick="resetEmomTimer(); renderWorkoutDetail();">Reset</button>' : ''}
        </div>`;
      }

      // Show all rounds as input rows
      const toBeat = getToBeat(ex.id);
      for (var ri = 1; ri <= ex.sets; ri++) {
        var savedSet = sessionSets[ri - 1];
        var isCurrent = emomActive && emomRound === ri;
        var isPast = emomActive ? ri < emomRound : (emomDone || savedSet);
        var isConfirmed = !!savedSet;
        var lastEmomSets = getToBeat(ex.id);
        var lastRoundWeight = lastEmomSets && lastEmomSets[ri - 1] ? lastEmomSets[ri - 1].weight : ex.weight;
        var roundWeight = savedSet ? savedSet.weight : lastRoundWeight;
        var roundReps = savedSet ? savedSet.reps : parseInt(ex.reps.split('-')[1] || ex.reps) || 0;
        var toBeatSet = toBeat && toBeat[ri - 1] ? toBeat[ri - 1] : null;
        var toBeatHint = toBeatSet ? ' <span style="color:var(--text-ter);font-size:10px">To Beat: ' + toBeatSet.weight + 'kg×' + toBeatSet.reps + '</span>' : '';

        if (isConfirmed) {
          var isPR = checkPR(ex.id, savedSet.weight, savedSet.reps);
          html += `
          <div class="swipe-wrapper" data-ex-id="${ex.id}" data-set-index="${ri - 1}">
            <div class="swipe-delete-bg">Löschen</div>
            <div class="swipe-content set-card done" onclick="startEditSet('${ex.id}', ${ri - 1})">
              <div class="set-header">
                <span class="set-number">Min ${ri} ${ICONS.check}</span>
                <span class="set-type">EMOM ${isPR ? ICONS.trophy : ''}</span>
              </div>
              <div style="display:flex;gap:12px;font-size:14px;color:var(--text-sec)">
                <span>${savedSet.weight}kg${dbLabel}</span>
                <span>${savedSet.reps} Reps</span>
              </div>
            </div>
          </div>`;
        } else {
          var borderColor = isCurrent ? 'var(--orange)' : (isPast ? 'var(--text-ter)' : 'var(--border)');
          var opacity = (!emomActive && !emomDone && ri > 1) ? '0.4' : '1';
          html += `
          <div class="set-card" style="border-color:${borderColor};opacity:${opacity}">
            <div class="set-header">
              <span class="set-number">Min ${ri}${toBeatHint}</span>
              <span class="set-type">EMOM</span>
            </div>
            <div class="input-row" style="margin-top:4px">
              ${ex.bodyweight ? '<div class="input-group"><div style="text-align:center;padding:8px;font-size:14px">BW</div></div>' :
              '<div class="input-group"><div class="input-label">kg' + dbLabel + '</div><input type="number" inputmode="decimal" class="input-field" id="emom-w-' + ex.id + '-' + ri + '" value="' + roundWeight + '" step="0.5"></div>'}
              <div class="input-group">
                <div class="input-label">Reps</div>
                <input type="number" inputmode="numeric" class="input-field" id="emom-r-${ex.id}-${ri}" value="${roundReps}">
              </div>
              <button class="btn btn-sm btn-green" style="align-self:flex-end;padding:8px 12px;margin-bottom:2px" onclick="confirmEmomRound('${ex.id}', ${ri})">✓</button>
            </div>
          </div>`;
        }
      }
    } else {
      // Regular rest timer
      const restDefault = ex.restSeconds || 120;
      const restPresets = ex.restSeconds === 75 ? [60, 75, 90] : [120, 150, 180];
      html += `
        <div style="text-align:center;margin:12px 0">
          <div class="rest-timer-display" style="font-family:'SF Mono','Menlo',monospace;font-size:36px;font-weight:700;color:var(--orange);padding:8px 0">${formatTime(getTimerSeconds())}</div>
          <div class="timer-presets">
            ${restPresets.map(s => `<button class="timer-preset" onclick="startCountdown(${s})">${formatTime(s)}</button>`).join('')}
          </div>
          <div class="timer-controls">
            <button class="timer-btn" onclick="toggleRestTimer(${restDefault})">${isRestTimerRunning() ? ICONS.pause : ICONS.play}</button>
            <button class="timer-btn" onclick="resetRestTimer(); renderWorkoutDetail();">${ICONS.reset}</button>
          </div>
        </div>`;
    }

    // Completed sets with swipe-to-delete + tap-to-edit (skip for EMOM - handled above)
    if (!isEMOM) sessionSets.forEach((set, i) => {
      const isPR = checkPR(ex.id, set.weight, set.reps);
      const isEditing = editingSet && editingSet.exId === ex.id && editingSet.index === i;

      if (isEditing) {
        html += `
        <div class="set-card current" style="border-color:var(--blue)">
          <div class="set-header">
            <span class="set-number">${isEMOM ? 'Min ' + (i + 1) : 'Satz ' + (i + 1)} — Bearbeiten</span>
            <span class="set-type">${set.type === 'drop' ? 'Drop' : 'Working'}</span>
          </div>
          <div class="input-row" style="margin-top:6px">
            <div class="input-group">
              <div class="input-label">kg${dbLabel}</div>
              <input type="number" inputmode="decimal" class="input-field" id="edit-w-${ex.id}-${i}" value="${set.weight}" step="0.5">
            </div>
            <div class="input-group">
              <div class="input-label">Reps</div>
              <input type="number" inputmode="numeric" class="input-field" id="edit-r-${ex.id}-${i}" value="${set.reps}">
            </div>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-sm btn-orange" style="flex:1" onclick="saveEditSet('${ex.id}', ${i})">Speichern</button>
            <button class="btn btn-sm btn-outline" style="flex:1" onclick="cancelEditSet()">Abbrechen</button>
          </div>
        </div>`;
      } else {
        html += `
        <div class="swipe-wrapper" data-ex-id="${ex.id}" data-set-index="${i}">
          <div class="swipe-delete-bg">Löschen</div>
          <div class="swipe-content set-card done" onclick="startEditSet('${ex.id}', ${i})">
            <div class="set-header">
              <span class="set-number">${isEMOM ? 'Min ' + (i + 1) : 'Satz ' + (i + 1)} ${ICONS.check}</span>
              <span class="set-type">${set.type === 'drop' ? 'Drop' : isEMOM ? 'EMOM' : 'Working'} ${isPR ? ICONS.trophy : ''}</span>
            </div>
            <div style="display:flex;gap:12px;font-size:14px;color:var(--text-sec)">
              <span>${set.weight}kg${dbLabel}</span>
              <span>${set.reps} Reps</span>
            </div>
          </div>
        </div>`;
      }
    });

    // Current set input (skip for EMOM - handled above)
    const totalSets = ex.sets;
    const toBeatSets = getToBeat(ex.id);
    if (!isEMOM && (currentSetIndex < totalSets || !activeSession._completed)) {
      const setNum = sessionSets.length + 1;
      const bw = ex.bodyweight;
      // Weight priority: last session actual > pyramid config > plan default
      const lastSets = getLastSessionSets(ex.id);
      const lastWeight = lastSets && lastSets[sessionSets.length] ? lastSets[sessionSets.length].weight : null;
      const defaultWeight = hasPyramid && ex.pyramidWeights[sessionSets.length] !== undefined
        ? (lastWeight !== null ? lastWeight : ex.pyramidWeights[sessionSets.length])
        : (lastWeight !== null ? lastWeight : ex.weight);
      const setLabel = isEMOM ? 'EMOM'
        : (ex.pyramid && hasPyramid) ? (sessionSets.length < Math.ceil(ex.sets / 2) ? 'Aufsteigend' : 'Absteigend')
        : (hasPyramid && !ex.pyramid) ? (sessionSets.length < ex.sets - 1 ? 'Top Set' : 'Backoff')
        : 'Working';
      const currentToBeat = toBeatSets && toBeatSets[sessionSets.length] ? toBeatSets[sessionSets.length] : null;
      const toBeatHintCurrent = currentToBeat ? `<span style="color:var(--text-ter);font-size:10px;margin-left:6px">To Beat: ${currentToBeat.weight}kg×${currentToBeat.reps}</span>` : '';
      html += `
        <div class="set-card current">
          <div class="set-header">
            <span class="set-number">Satz ${setNum}${toBeatHintCurrent}</span>
            <span class="set-type">${setLabel}</span>
          </div>
          <div class="input-row">
            ${bw ? '<div class="input-group"><div class="input-label">Gewicht</div><div style="text-align:center;padding:10px;font-size:16px">BW</div></div>' :
            `<div class="input-group">
              <div class="input-label">Gewicht (kg)${dbLabel}</div>
              <input type="number" inputmode="decimal" class="input-field" id="weight-${ex.id}" value="${defaultWeight}" step="0.5">
            </div>`}
            <div class="input-group">
              <div class="input-label">Reps</div>
              <input type="number" inputmode="decimal" class="input-field" id="reps-${ex.id}" value="${parseInt(ex.reps.split('-')[1] || ex.reps)}">
            </div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-orange" style="flex:2" onclick="finishStrengthSet('${ex.id}', ${bw})">${isEMOM ? 'Minute done' : 'Satz fertig'}</button>
          ${isEMOM ? '' : '<button class="btn btn-outline btn-sm" onclick="addDropSet(\'' + ex.id + '\', ' + bw + ')">+ Drop</button>'}
        </div>`;
    }

    // Upcoming sets (dimmed) - skip for EMOM
    if (!isEMOM) for (let i = sessionSets.length + 1; i < totalSets; i++) {
      const upcomingWeight = hasPyramid && ex.pyramidWeights[i] !== undefined
        ? ` @ ${ex.pyramidWeights[i]}kg`
        : (ex.pyramidWeights && ex.pyramidWeights[i] !== undefined ? ` @ ${ex.pyramidWeights[i]}kg` : '');
      const upcomingToBeat = toBeatSets && toBeatSets[i] ? toBeatSets[i] : null;
      const upcomingToBeatHint = upcomingToBeat ? ` <span style="color:var(--text-ter);font-size:10px">To Beat: ${upcomingToBeat.weight}kg×${upcomingToBeat.reps}</span>` : '';
      const upcomingLabel = `Satz ${i + 1}${upcomingWeight}${upcomingToBeatHint}`;
      const upcomingType = (ex.pyramid && hasPyramid) ? (i < Math.ceil(ex.sets / 2) ? 'Aufsteigend' : 'Absteigend')
        : (hasPyramid && !ex.pyramid) ? (i < ex.sets - 1 ? 'Top Set' : 'Backoff')
        : 'Working';
      html += `
        <div class="set-card upcoming" style="margin-top:8px">
          <div class="set-header">
            <span class="set-number">${upcomingLabel}</span>
            <span class="set-type">${upcomingType}</span>
          </div>
        </div>`;
    }

    html += '</div>';
  });

  // Check if all strength sets are done
  const allDone = plan.strength.every(ex => {
    const sets = activeSession.sets[ex.id] || [];
    return sets.length >= ex.sets;
  });

  if (allDone) {
    html += '<button class="btn btn-green" style="margin-top:12px" onclick="switchSubTab(\'zirkel\')">Weiter: Zirkel</button>';
  }

  return html;
}

function finishStrengthSet(exId, isBW) {
  const rawW = document.getElementById(`weight-${exId}`).value.replace(',', '.');
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight, reps, type: 'working' });

  // Start rest timer - use exercise-specific rest time
  const exInfo = getExerciseInfo(exId);
  const restTime = (exInfo && exInfo.restSeconds) ? exInfo.restSeconds : 120;
  startCountdown(restTime);

  // Check for PR
  if (checkPR(exId, weight, reps)) {
    APP_STATE.prs.push({
      exerciseId: exId,
      date: activeSession.date,
      weight, reps,
      volume: weight * reps,
      week: activeSession.week,
      mesocycle: activeSession.mesocycle
    });
  }

  saveState();
  renderWorkoutDetail();
}

function addDropSet(exId, isBW) {
  const rawW = document.getElementById(`weight-${exId}`).value.replace(',', '.');
  const weight = isBW ? APP_STATE.settings.bodyWeight : (parseFloat(rawW) || 0);
  const reps = parseInt(document.getElementById(`reps-${exId}`).value) || 0;

  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  activeSession.sets[exId].push({ weight: Math.round(weight * 0.7), reps, type: 'drop' });

  startCountdown(90);
  saveState();
  renderWorkoutDetail();
}

function toggleRestTimer(defaultSeconds) {
  if (isRestTimerRunning()) {
    pauseRestTimer();
  } else if (restTimer.mode === 'stopped') {
    startCountdown(defaultSeconds || 120);
  } else {
    resumeRestTimer();
  }
  renderWorkoutDetail();
}

// ZIRKEL TAB
