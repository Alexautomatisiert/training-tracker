<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D14">
<title>Training Tracker</title>
<style>
/* =============================================
   CSS CUSTOM PROPERTIES
   ============================================= */
:root {
  --bg: #0D0D14;
  --card: #1A1A25;
  --border: #2A2A35;
  --orange: #E8720C;
  --green: #28B463;
  --red: #E24B4A;
  --blue: #3498DB;
  --purple: #9B59B6;
  --text: #fff;
  --text-sec: #888;
  --text-ter: #555;
  --radius: 12px;
  --nav-height: 52px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

/* =============================================
   RESET & BASE
   ============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-family: -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-text-size-adjust: 100%;
  touch-action: manipulation;
  overflow: hidden;
  height: 100%;
  height: 100dvh;
  height: -webkit-fill-available;
}

body {
  height: 100%;
  height: 100dvh;
  height: -webkit-fill-available;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

input, button, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  border: none;
  outline: none;
  background: none;
}

button { cursor: pointer; -webkit-tap-highlight-color: transparent; }
a { color: inherit; text-decoration: none; }

/* =============================================
   APP SHELL
   ============================================= */
#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
  height: -webkit-fill-available;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* =============================================
   PAGES
   ============================================= */
.page {
  display: none;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px calc(var(--nav-height) + var(--safe-bottom) + 24px) 16px;
  padding-top: calc(var(--safe-top) + 16px);
}

.page.active {
  display: block;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* =============================================
   BOTTOM NAVIGATION
   ============================================= */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100%;
  max-width: 430px;
  margin: 0 auto;
  display: flex;
  background: #111118;
  border-top: 1px solid var(--border);
  padding-bottom: calc(var(--safe-bottom) + 8px);
  z-index: 100;
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 6px 0;
  gap: 2px;
  color: var(--text-ter);
  transition: color 0.2s;
  min-height: var(--nav-height);
}
.nav-item svg { width: 22px; height: 22px; }

.nav-item.active { color: var(--orange); }
.nav-item span { font-size: 10px; font-weight: 500; }

/* =============================================
   CARDS & COMMON ELEMENTS
   ============================================= */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.section-title {
  font-size: 14px;
  color: var(--text-sec);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  margin-top: 20px;
}

.section-title:first-child { margin-top: 0; }

h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
h3 { font-size: 15px; font-weight: 600; }

/* =============================================
   WORKOUT ROW
   ============================================= */
.workout-row {
  display: flex;
  align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  min-height: 56px;
}

.workout-row:last-child { border-bottom: none; }

.workout-status {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.workout-status.done { background: var(--green); }
.workout-status.pending { border: 2px solid var(--border); }
.workout-status.current { border: 2px solid var(--orange); }

.workout-info { flex: 1; }
.workout-name { font-size: 15px; font-weight: 600; }
.workout-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
.workout-day { font-size: 12px; color: var(--text-ter); flex-shrink: 0; }

/* =============================================
   WEEK PILLS
   ============================================= */
.week-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.week-pill {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  border: 1px solid var(--border);
  color: var(--text-sec);
  background: transparent;
  flex-shrink: 0;
}

.week-pill.current { background: var(--orange); color: #fff; border-color: var(--orange); }
.week-pill.done { background: var(--green); color: #fff; border-color: var(--green); opacity: 0.7; }
.week-pill.future { opacity: 0.5; }

/* =============================================
   SUB TABS
   ============================================= */
.sub-tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  position: sticky;
  top: 0;
  z-index: 10;
}

.sub-tab {
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-sec);
  white-space: nowrap;
  flex-shrink: 0;
  transition: all 0.2s;
}

.sub-tab.active {
  background: var(--orange);
  color: #fff;
}

/* =============================================
   BUTTONS
   ============================================= */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 24px;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  width: 100%;
  min-height: 48px;
  transition: opacity 0.2s;
}

.btn:active { opacity: 0.8; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-green { background: var(--green); color: #fff; }
.btn-outline { border: 1px solid var(--border); color: var(--text-sec); }

.btn-sm {
  padding: 8px 16px;
  font-size: 14px;
  min-height: 36px;
  width: auto;
}

/* =============================================
   INPUT FIELDS
   ============================================= */
.input-field {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 16px;
  color: var(--text);
  text-align: center;
  width: 100%;
  transition: border-color 0.2s;
}

.input-field:focus { border-color: var(--orange); }

.input-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.input-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.input-label {
  font-size: 11px;
  color: var(--text-sec);
  text-align: center;
}

/* =============================================
   TIMER
   ============================================= */
.timer-display {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 48px;
  font-weight: 700;
  color: var(--orange);
  text-align: center;
  padding: 16px 0;
}

.timer-presets {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.timer-preset {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-preset.active { border-color: var(--orange); color: var(--orange); }

.timer-controls {
  display: flex;
  gap: 8px;
  justify-content: center;
}

.timer-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  color: var(--text-sec);
}

.timer-btn.active { border-color: var(--orange); color: var(--orange); }

/* =============================================
   SET CARD
   ============================================= */
.set-card {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  transition: all 0.2s;
}

.set-card.done {
  border-color: var(--green);
}
.set-card.done .set-header,
.set-card.done div { color: var(--text-sec); }

.set-card.current { border-color: var(--orange); }
.set-card.upcoming { opacity: 0.4; }

.set-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.set-number { font-size: 14px; font-weight: 600; }
.set-type { font-size: 11px; color: var(--text-sec); }

/* =============================================
   EXERCISE CARD
   ============================================= */
.exercise-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.exercise-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.exercise-last { font-size: 12px; color: var(--text-sec); margin-bottom: 12px; }

/* =============================================
   VOLUME BAR
   ============================================= */
.volume-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.volume-label { font-size: 13px; width: 70px; flex-shrink: 0; }
.volume-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}

.volume-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}

.volume-change {
  font-size: 12px;
  width: 50px;
  text-align: right;
  flex-shrink: 0;
}

.volume-change.up { color: var(--green); }
.volume-change.down { color: var(--red); }

/* =============================================
   ROUND PILLS
   ============================================= */
.round-pills {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  justify-content: center;
}

.round-pill {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 600;
  border: 2px solid var(--border);
  color: var(--text-sec);
}

.round-pill.done { background: var(--green); border-color: var(--green); color: #fff; }
.round-pill.current { border-color: var(--orange); color: var(--orange); }

/* =============================================
   PROGRESS BAR
   ============================================= */
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  width: 100%;
}

.progress-fill {
  height: 100%;
  background: var(--orange);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* =============================================
   PR BADGE
   ============================================= */
.pr-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(232, 114, 12, 0.15);
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--orange);
  margin: 2px 4px 2px 0;
}

/* =============================================
   FEELING SELECTOR
   ============================================= */
.feeling-selector {
  display: flex;
  gap: 8px;
}

.feeling-btn {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}

.feeling-btn.selected { border-color: var(--orange); background: rgba(232, 114, 12, 0.1); }

/* =============================================
   CHART
   ============================================= */
.chart-container {
  width: 100%;
  position: relative;
  margin-bottom: 8px;
}

.chart-bar-group {
  display: flex;
  align-items: flex-end;
  height: 160px;
  padding: 0 0 0 36px;
  position: relative;
}

.chart-bar-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  flex: 1;
  max-width: 80px;
}

.chart-bar {
  width: 100%;
  max-width: 48px;
  background: var(--orange);
  border-radius: 6px 6px 0 0;
  transition: height 0.5s ease;
  min-height: 4px;
}

.chart-label { font-size: 12px; color: var(--text-sec); font-weight: 600; margin-top: 4px; }
.chart-value { font-size: 12px; color: var(--text); font-weight: 700; }

.chart-goal-line {
  position: absolute;
  left: 36px;
  right: 0;
  border-top: 2px dashed var(--text-ter);
  z-index: 1;
}

.chart-y-axis {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 36px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 2px 0 20px;
}
.chart-y-label {
  font-size: 10px;
  color: var(--text-ter);
  text-align: right;
  padding-right: 4px;
}

/* =============================================
   WARMUP ITEM
   ============================================= */
.warmup-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.warmup-item:last-child { border-bottom: none; }

.warmup-check {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s;
}

.warmup-check.checked { background: var(--green); border-color: var(--green); }
.warmup-text { font-size: 14px; flex: 1; }
.warmup-duration { font-size: 12px; color: var(--text-sec); }

/* =============================================
   SETTINGS ROWS
   ============================================= */
.settings-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
  min-height: 48px;
}

.settings-row:last-child { border-bottom: none; }
.settings-label { font-size: 15px; }
.settings-value { font-size: 15px; color: var(--text-sec); }

/* =============================================
   DONE PAGE STATS
   ============================================= */
.done-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 16px;
}

.done-stat-box {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 12px;
  text-align: center;
}

.done-stat-label { font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
.done-stat-value { font-size: 18px; font-weight: 700; }
.done-stat-sub { font-size: 11px; color: var(--text-ter); margin-top: 2px; }

/* =============================================
   SUPERSET GROUP
   ============================================= */
.superset-group {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}

.superset-header {
  background: rgba(155, 89, 182, 0.1);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--purple);
}

.superset-group .exercise-card {
  border: none;
  border-radius: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 0;
}

.superset-group .exercise-card:last-child { border-bottom: none; }

/* =============================================
   BACK BUTTON
   ============================================= */
.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  color: var(--orange);
  padding: 8px 0;
  margin-bottom: 8px;
}

/* =============================================
   CELEBRATION
   ============================================= */
.celebration {
  text-align: center;
  padding: 32px 0 24px;
}

.celebration-icon {
  width: 64px;
  height: 64px;
  background: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 16px;
}

/* =============================================
   SCROLLBAR STYLE
   ============================================= */
.page::-webkit-scrollbar { width: 0; }

/* =============================================
   EXPANDABLE
   ============================================= */
.expandable-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
}

.expandable-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

.expandable-content.open { max-height: 500px; }

.chevron {
  transition: transform 0.3s;
  color: var(--text-sec);
}

.chevron.open { transform: rotate(180deg); }

/* =============================================
   MOTIVATION CARD
   ============================================= */
.motivation-card {
  background: linear-gradient(135deg, rgba(232,114,12,0.15), rgba(155,89,182,0.1));
  border: 1px solid rgba(232,114,12,0.3);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  margin-bottom: 12px;
}

.motivation-text {
  font-size: 15px;
  font-style: italic;
  line-height: 1.4;
}

/* SESSION TIMER BAR */
.session-timer-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: rgba(232, 114, 12, 0.08);
  border: 1px solid rgba(232, 114, 12, 0.2);
  border-radius: 8px;
  margin-bottom: 12px;
  font-size: 12px;
  color: var(--text-sec);
}
.session-timer-bar .timer-value {
  font-family: 'SF Mono', 'Menlo', monospace;
  font-size: 16px;
  font-weight: 700;
  color: var(--orange);
}

/* SWIPE TO DELETE */
.swipe-wrapper { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 8px; }
.swipe-wrapper .set-card { margin-bottom: 0; border-radius: 0; }
.swipe-delete-bg { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; background: var(--red); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 13px; z-index: 0; opacity: 0; transition: opacity 0.15s ease; }
.swipe-wrapper.swiping .swipe-delete-bg { opacity: 1; }
.swipe-content { position: relative; z-index: 1; background: var(--card); transition: transform 0.2s ease; }

/* TO BEAT */
.to-beat { font-size: 11px; color: var(--blue); padding: 4px 8px; background: rgba(52,152,219,0.08); border-radius: 6px; margin-bottom: 8px; display: inline-block; }

/* DROP SET INPUT */
.drop-input-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; padding-top: 6px; border-top: 1px dashed var(--border); }
.drop-label { font-size: 10px; font-weight: 600; color: var(--red); width: 36px; flex-shrink: 0; text-align: center; }

/* ROUND PILL CLICKABLE */
.round-pill.clickable { cursor: pointer; }
.round-pill.viewing { border-color: var(--blue); color: var(--blue); background: rgba(52,152,219,0.15); }
</style>
</head>
<body>

<div id="app">
  <!-- =============================================
       HOME PAGE
       ============================================= -->
  <div id="page-home" class="page active">
    <div id="home-content"></div>
  </div>

  <!-- =============================================
       TRAINING PAGE
       ============================================= -->
  <div id="page-training" class="page">
    <div id="training-content"></div>
  </div>

  <!-- =============================================
       STATS PAGE
       ============================================= -->
  <div id="page-stats" class="page">
    <div id="stats-content"></div>
  </div>

  <!-- =============================================
       CALENDAR PAGE
       ============================================= -->
  <div id="page-calendar" class="page">
    <div id="calendar-content"></div>
  </div>

  <!-- =============================================
       SETTINGS PAGE
       ============================================= -->
  <div id="page-settings" class="page">
    <div id="settings-content"></div>
  </div>

  <!-- =============================================
       BOTTOM NAVIGATION
       ============================================= -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" data-page="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 4v16M18 4v16M2 8h4M18 8h4M2 16h4M18 16h4M6 12h12"/>
      </svg>
      <span>Training</span>
    </button>
    <button class="nav-item" data-page="stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="6" width="4" height="15" rx="1"/>
        <rect x="17" y="3" width="4" height="18" rx="1"/>
      </svg>
      <span>Stats</span>
    </button>
    <button class="nav-item" data-page="calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>

// Workout variants: maps variant ID → base schedule ID

function getBaseWorkoutId(workoutId) {
  var plan = WORKOUT_PLANS[workoutId];
  return (plan && plan.variantOf) ? plan.variantOf : workoutId;

// Get all variant IDs for a base workout (including the base itself)

const STORAGE_KEY = 'training-app';

function getDefaultState() {
  return {
    settings: {
      bodyWeight: 77.5,
      weightHistory: [],
      mesocycle: { number: 1, currentWeek: 1, weeksHard: 5, weeksDeload: 1, startDate: null },
      goals: { weeklyVolume: 0, ruecken: 0, brust: 0, quads: 0, hams: 0 },
      goalsAutoSet: false
    },
    sessions: [],
    activeWorkout: null,
    prs: [],
    customWeights: {}, // user overrides for default exercise weights
    learnings: [], // { id, date, workoutId, text, mesocycle, week }
    exerciseCatalog: {} // name→{muscle, bodyweight, dumbbell, unilateral, weight}
  };
}

let APP_STATE = loadState();

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      const state = Object.assign(getDefaultState(), parsed);
      // Repair any NaN values in session sets (caused by iOS locale decimal bug)
      (state.sessions || []).forEach(function(session) {
        Object.keys(session.sets || {}).forEach(function(exId) {
          (session.sets[exId] || []).forEach(function(set) {
            if (set.weight === null || set.weight === undefined || isNaN(set.weight)) set.weight = 0;
            if (set.reps === null || set.reps === undefined || isNaN(set.reps)) set.reps = 0;
          });
        });
      });
      // Migrate: remove duplicate old-alias exercise entries from sessions
      // (caused by circuit split #100 storing sets under both old and new IDs)
      // Only applies to circuit-split aliases, NOT superset-split (vb-a2b/vb-a2 are different exercises)
      var CIRCUIT_SPLIT_ALIASES = {
        'va-c2-e3': 'va-c1-e3',
        'va-c2-e4': 'va-c1-e4',
        'vb-c2-e1': 'vb-c1-e1',
        'vb-c2-e4': 'vb-c1-e4',
        'vb-c2-e5': 'vb-c1-e5'
      };
      var migrated = false;
      (state.sessions || []).forEach(function(session) {
        Object.keys(session.sets || {}).forEach(function(exId) {
          var newId = null;
          for (var k in CIRCUIT_SPLIT_ALIASES) {
            if (CIRCUIT_SPLIT_ALIASES[k] === exId) { newId = k; break; }
          }
          if (newId && session.sets[newId]) {
            // Old alias AND canonical both exist — remove old duplicate
            delete session.sets[exId];
            migrated = true;
          }
        });
      });
      if (migrated) {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
      }
      // Migrate: add startDate to mesocycle if missing
      if (state.settings && state.settings.mesocycle && !state.settings.mesocycle.startDate) {
        var mesoSessions = (state.sessions || []).filter(function(s) {
          return s.mesocycle === state.settings.mesocycle.number && s.week === 1;
        });
        if (mesoSessions.length > 0) {
          mesoSessions.sort(function(a, b) { return a.date.localeCompare(b.date); });
          var d = new Date(mesoSessions[0].date);
          var day = d.getDay();
          var diff = day === 0 ? -6 : 1 - day;
          d.setDate(d.getDate() + diff);
          state.settings.mesocycle.startDate = d.toISOString().split('T')[0];
        }
      }
      return state;
    }
  } catch (e) {
    console.error('Failed to load state:', e);
  }
  return getDefaultState();
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(APP_STATE));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

// =============================================
// SAMPLE DATA GENERATION
// =============================================

function generateSampleData() {
  const state = getDefaultState();
  const baseDate = new Date(APP_STATE.settings.mesocycle.startDate || '2026-05-11');
  const bw = state.settings.bodyWeight;

  // Generate 3 complete weeks + partial week 4
  for (let week = 1; week <= 4; week++) {
    const weekStart = new Date(baseDate);
    weekStart.setDate(weekStart.getDate() + (week - 1) * 7);

    WEEK_SCHEDULE.forEach((wid, idx) => {
      // Week 4: only first 2 workouts done
      if (week === 4 && idx >= 2) return;

      const plan = WORKOUT_PLANS[wid];
      const dayOffsets = { va: 0, ra: 2, vb: 4, rb: 6 };
      const sessionDate = new Date(weekStart);
      sessionDate.setDate(sessionDate.getDate() + dayOffsets[wid]);

      const session = {
        id: `s-w${week}-${wid}`,
        workoutId: wid,
        date: sessionDate.toISOString().split('T')[0],
        week: week,
        mesocycle: 2,
        duration: 2700 + Math.floor(Math.random() * 900),
        feeling: ['hard', 'good', 'easy'][Math.floor(Math.random() * 3)],
        sets: {},
        warmupDone: true,
        circuitRounds: {},
        notes: ''
      };

      // Progressive overload: slightly increase weights/reps each week
      const progression = 1 + (week - 1) * 0.03;

      // Strength sets
      plan.strength.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          const r = Math.max(maxRep - s, parseInt(ex.reps.split('-')[0] || '6'));
          sets.push({ weight: w, reps: r, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      // Circuit exercises
      plan.circuits.forEach(circuit => {
        const rounds = circuit.rounds - (Math.random() > 0.7 ? 1 : 0);
        session.circuitRounds[circuit.id] = rounds;
        circuit.exercises.forEach(ex => {
          const sets = [];
          for (let r = 0; r < rounds; r++) {
            const w = ex.bodyweight ? bw : Math.round(ex.weight * progression);
            const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps.split('+')[0] || ex.reps);
            sets.push({ weight: w, reps: maxRep, type: 'working' });
          }
          session.sets[ex.id] = sets;
        });
      });

      // Accessories
      plan.accessories.forEach(ex => {
        const sets = [];
        for (let s = 0; s < ex.sets; s++) {
          const w = ex.bodyweight ? bw : Math.round((ex.weight || 10) * progression);
          const maxRep = parseInt(ex.reps.split('-')[1] || ex.reps);
          sets.push({ weight: w, reps: maxRep, type: 'working' });
        }
        session.sets[ex.id] = sets;
      });

      // RPE per section (increases with weeks = progressive fatigue)
      session.rpe = { strength: Math.min(10, 5 + week) };
      plan.circuits.forEach(c => { session.rpe[c.id] = Math.min(10, 6 + week); });
      session.rpe.acc = Math.min(10, 5 + week);

      // Readiness data (sample: decreases slightly over weeks = accumulating fatigue)
      var baseSleep = Math.max(2, 5 - Math.floor(week / 3));
      var baseSoreness = Math.max(2, 5 - Math.floor(week / 2));
      var baseMotivation = Math.max(2, 5 - Math.floor((week - 1) / 3));
      session.readiness = {
        sleep: baseSleep,
        soreness: baseSoreness,
        motivation: baseMotivation,
        score: Math.round((baseSleep + baseSoreness + baseMotivation) / 3 * 10) / 10
      };

      state.sessions.push(session);
    });
  }

  // Detect PRs from sample data
  state.prs = detectAllPRs(state.sessions);

  return state;
}

// =============================================
// PR DETECTION
// =============================================

function detectAllPRs(sessions) {
  const prs = [];
  const bestByExercise = {};

  // Sort sessions by date
  const sorted = [...sessions].sort((a, b) => a.date.localeCompare(b.date));

  sorted.forEach(session => {
    Object.entries(session.sets || {}).forEach(([exId, sets]) => {
      // Skip old alias IDs if canonical ID also exists (prevent duplicate PRs)
      var resolved = resolveExerciseId(exId);
      if (resolved && session.sets[resolved]) return;
      sets.forEach(set => {
        const volume = set.weight * set.reps;
        if (!bestByExercise[exId] || volume > bestByExercise[exId]) {
          if (bestByExercise[exId]) {
            prs.push({
              exerciseId: exId,
              date: session.date,
              weight: set.weight,
              reps: set.reps,
              volume: volume,
              week: session.week,
              mesocycle: session.mesocycle
            });
          }
          bestByExercise[exId] = volume;
        }
      });
    });
  });

  return prs;
}

function checkPR(exerciseId, weight, reps, setIndex) {
  const volume = weight * reps;
  if (volume <= 0) return false;
  let best = 0;
  let found = false;
  APP_STATE.sessions.forEach(s => {
    const sets = s.sets[exerciseId] || [];
    if (typeof setIndex === 'number' && setIndex >= 0) {
      // Compare against same set index from previous sessions
      if (sets[setIndex]) {
        found = true;
        const v = sets[setIndex].weight * sets[setIndex].reps;
        if (v > best) best = v;
      }
    } else {
      // Fallback: compare against all sets
      sets.forEach(set => {
        found = true;
        const v = set.weight * set.reps;
        if (v > best) best = v;
      });
    }
  });
  // PR if we beat previous best, OR if this is the very first time at this set index
  // (but only if there are previous sessions with this exercise at all)
  if (!found) return false;
  return volume > best;
}

// Reverse alias lookup: given an old exercise ID, find the current ID
// EXERCISE_ID_ALIASES maps newId → oldId, so we search for oldId as value
function resolveExerciseId(exId) {
  for (const [newId, oldId] of Object.entries(EXERCISE_ID_ALIASES)) {
    if (oldId === exId) return newId;
  }
  return null;
}

function getExerciseName(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex.name;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex.name;
    for (const ex of plan.accessories) if (ex.id === exId) return ex.name;
  }
  // Fallback: check if this is an old alias ID → resolve to current ID
  var resolved = resolveExerciseId(exId);
  if (resolved) return getExerciseName(resolved);
  return exId;
}

function getExerciseInfo(exId) {
  for (const plan of Object.values(WORKOUT_PLANS)) {
    for (const ex of plan.strength) if (ex.id === exId) return ex;
    for (const c of plan.circuits) for (const ex of c.exercises) if (ex.id === exId) return ex;
    for (const ex of plan.accessories) if (ex.id === exId) return ex;
  }
  // Fallback: check if this is an old alias ID → resolve to current ID
  var resolved = resolveExerciseId(exId);
  if (resolved) return getExerciseInfo(resolved);
  return null;
}

function isDumbbellExercise(exId) {
  const ex = getExerciseInfo(exId);
  return ex ? !!ex.dumbbell : false;
}

function isWeightedBWExercise(exId) {
  const ex = getExerciseInfo(exId);
  return ex ? !!ex.weightedBW : false;
}

// Get effective weight for volume calculation (doubles for DB exercises, adds BW for weightedBW)
// Unilateral exercises: volume × 2 (user enters per-leg reps, both legs worked)
function getRepMultiplier(exId) {
  var ex = getExerciseInfo(exId);
  return (ex && ex.unilateral) ? 2 : 1;
}

function getVolumeWeight(exId, trackedWeight) {
  const ex = getExerciseInfo(exId);
  if (isDumbbellExercise(exId)) {
    var dbWeight = trackedWeight * 2;
    // Add partial bodyweight for compound DB exercises (squats, lunges)
    if (ex && ex.bwAdd) dbWeight += APP_STATE.settings.bodyWeight * ex.bwAdd;
    return dbWeight;
  }
  if (isWeightedBWExercise(exId)) return trackedWeight + APP_STATE.settings.bodyWeight;
  // BW exercises: apply bwFraction if defined (e.g. Ring Push Ups=0.70, Ring Rev Fly=0.25, Core=0)
  if (ex && ex.bodyweight && ex.bwFraction !== undefined) {
    return trackedWeight * ex.bwFraction;
  }
  return trackedWeight;
}

// Circuit round viewing state
let viewingRound = {}; // { circuitId: roundNumber (1-based) } when viewing past rounds
let editingSet = null; // { exId, index } when editing a completed set
let editingCircuitRound = false; // true when editing a circuit round inline
let _addingCircuitSet = {}; // { exId: true } when inline add-set row is open in completed circuit

// Get "To Beat" data from last session
function getToBeat(exerciseId) {
  const sets = getLastSessionSets(exerciseId);
  if (!sets || sets.length === 0) return null;
  return sets;
}

function formatToBeat(exerciseId) {
  const sets = getToBeat(exerciseId);
  if (!sets) return '';
  const parts = sets.map((s, i) => 'S' + (i+1) + ': ' + s.weight + 'kg×' + s.reps);
  return 'To Beat: ' + parts.join(' | ');
}

// Progressive overload: target rounds for current week
function getTargetRounds(baseRounds, week) {
  // 3->3->4->4->4 progression (weeks 1-5)
  if (baseRounds <= 3) {
    if (week <= 2) return 3;
    return 4;
  }
  // 4->4->5->5->5 progression (weeks 1-5)
  if (baseRounds === 4) {
    if (week <= 2) return 4;
    return 5;
  }
  return baseRounds;
}

// =============================================
// WARMUP AUTO-CHECK (timer-driven)
// =============================================

function parseDuration(str) {
  if (!str) return 0;
  const s = str.replace(/\s/g, '').toLowerCase();
  if (s.endsWith('s')) return parseInt(s) || 0;
  if (s.endsWith('m')) return (parseInt(s) || 0) * 60;
  return parseInt(s) || 0;
}

function getWarmupThresholds(plan) {
  // Returns array of { id, cumulativeSeconds } for each exercise with a duration
  let cumulative = 0;
  const thresholds = [];
  plan.warmup.forEach(ex => {
    const dur = parseDuration(ex.duration);
    if (dur > 0) {
      cumulative += dur;
      thresholds.push({ id: ex.id, at: cumulative });
    }
    // Exercises without duration (e.g. "20 Push-ups") require manual check
  });
  return thresholds;
}

let lastAutoCheckTime = 0; // prevent double-beeps

function checkWarmupAutoComplete() {
  // Only run when we're on warmup tab with a running countup timer
  if (activeSubTab !== 'warmup' || restTimer.mode !== 'countup') return;
  if (!activeWorkoutId) return;
  const plan = WORKOUT_PLANS[activeWorkoutId];
  if (!plan) return;

  const elapsed = getCountupSeconds();
  const thresholds = getWarmupThresholds(plan);
  let changed = false;

  thresholds.forEach(t => {
    if (elapsed >= t.at && !warmupChecked[t.id]) {
      warmupChecked[t.id] = true;
      changed = true;
    }
  });

  if (changed) {
    // Short tick sound for auto-check
    playTick();
    if (navigator.vibrate) navigator.vibrate(100);
    if (activeSession) activeSession.warmupDone = plan.warmup.every(ex => warmupChecked[ex.id]);
    renderWorkoutDetail();
    setTimeout(autoScrollWarmup, 50);
  }
}

function playTick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 660;
    gain.gain.value = 0.25;
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.08);
  } catch(e) {}
}

// =============================================
// TIMER SYSTEM (Date.now() based, survives app switch)
// =============================================

let restTimer = {
  mode: 'stopped',    // 'stopped' | 'countdown' | 'countup'
  endTime: null,      // Date.now() + ms for countdown
  startTime: null,    // Date.now() for countup
  pausedRemaining: null, // ms remaining when paused (countdown)
  pausedElapsed: null,   // ms elapsed when paused (countup)
  completed: false
};

let sessionTimer = {
  startTime: null,
  running: false,
  pausedElapsed: 0
};

let displayInterval = null;

function startDisplayUpdate() {
  if (displayInterval) return;
  displayInterval = setInterval(function() {
    updateAllTimerDisplays();
    checkCountdownCompletion();
    checkWarmupAutoComplete();
    checkEmomTimer();
  }, 250);
}

function stopDisplayUpdate() {
  if (restTimer.mode === 'stopped' && !sessionTimer.running && !emomTimer.running) {
    if (displayInterval) { clearInterval(displayInterval); displayInterval = null; }
  }
}

function getCountdownSeconds() {
  if (restTimer.mode !== 'countdown') return 0;
  if (restTimer.pausedRemaining !== null) return Math.max(0, Math.ceil(restTimer.pausedRemaining / 1000));
  var remaining = restTimer.endTime - Date.now();
  return Math.max(0, Math.ceil(remaining / 1000));
}

function getCountupSeconds() {
  if (restTimer.mode !== 'countup') return 0;
  if (restTimer.pausedElapsed !== null) return Math.floor(restTimer.pausedElapsed / 1000);
  return Math.floor((Date.now() - restTimer.startTime) / 1000);
}

function getTimerSeconds() {
  if (restTimer.mode === 'countdown') return getCountdownSeconds();
  if (restTimer.mode === 'countup') return getCountupSeconds();
  return 0;
}

function getSessionSeconds() {
  if (!sessionTimer.startTime) return 0;
  if (!sessionTimer.running) return Math.floor(sessionTimer.pausedElapsed / 1000);
  return Math.floor((sessionTimer.pausedElapsed + Date.now() - sessionTimer.startTime) / 1000);
}

function startCountdown(seconds) {
  restTimer.mode = 'countdown';
  restTimer.endTime = Date.now() + seconds * 1000;
  restTimer.pausedRemaining = null;
  restTimer.completed = false;
  restTimer._lastCountdownBeep = null;
  startDisplayUpdate();
  updateAllTimerDisplays();
}

function startCountup() {
  restTimer.mode = 'countup';
  restTimer.startTime = Date.now();
  restTimer.pausedElapsed = null;
  restTimer.completed = false;
  startDisplayUpdate();
  updateAllTimerDisplays();
}

function pauseRestTimer() {
  if (restTimer.mode === 'countdown' && restTimer.pausedRemaining === null) {
    restTimer.pausedRemaining = Math.max(0, restTimer.endTime - Date.now());
  } else if (restTimer.mode === 'countup' && restTimer.pausedElapsed === null) {
    restTimer.pausedElapsed = Date.now() - restTimer.startTime;
  }
}

function resumeRestTimer() {
  if (restTimer.mode === 'countdown' && restTimer.pausedRemaining !== null) {
    restTimer.endTime = Date.now() + restTimer.pausedRemaining;
    restTimer.pausedRemaining = null;
  } else if (restTimer.mode === 'countup' && restTimer.pausedElapsed !== null) {
    restTimer.startTime = Date.now() - restTimer.pausedElapsed;
    restTimer.pausedElapsed = null;
  }
  startDisplayUpdate();
}

function stopRestTimer() {
  restTimer.mode = 'stopped';
  restTimer.endTime = null;
  restTimer.startTime = null;
  restTimer.pausedRemaining = null;
  restTimer.pausedElapsed = null;
  restTimer.completed = false;
  stopDisplayUpdate();
}

function resetRestTimer() {
  stopRestTimer();
  updateAllTimerDisplays();
}

function isRestTimerPaused() {
  return (restTimer.mode === 'countdown' && restTimer.pausedRemaining !== null) ||
         (restTimer.mode === 'countup' && restTimer.pausedElapsed !== null);
}

function isRestTimerRunning() {
  return restTimer.mode !== 'stopped' && !isRestTimerPaused();
}

// Session timer
function startSessionTimer() {
  if (sessionTimer.running) return;
  sessionTimer.startTime = Date.now();
  sessionTimer.running = true;
  startDisplayUpdate();
}

function stopSessionTimer() {
  if (!sessionTimer.running) return;
  sessionTimer.pausedElapsed += Date.now() - sessionTimer.startTime;
  sessionTimer.running = false;
  stopDisplayUpdate();
}

function resetSessionTimer() {
  sessionTimer.startTime = null;
  sessionTimer.running = false;
  sessionTimer.pausedElapsed = 0;
}

// EMOM Timer (separate from rest timer - runs independently)
let emomTimer = {
  running: false,
  startTime: null,
  prepSeconds: 10,
  totalRounds: 0,
  exerciseId: null,
  lastAnnouncedRound: 0,
  finished: false
};

function startEmomTimer(exId, rounds, prepSec) {
  emomTimer.running = true;
  emomTimer.startTime = Date.now();
  emomTimer.prepSeconds = prepSec || 10;
  emomTimer.totalRounds = rounds;
  emomTimer.exerciseId = exId;
  emomTimer.lastAnnouncedRound = 0;
  emomTimer.finished = false;
  // Also start session timer if not running
  if (!sessionTimer.running && !sessionTimer.startTime) startSessionTimer();
  startDisplayUpdate();
  renderWorkoutDetail();
}

function stopEmomTimer() {
  emomTimer.running = false;
  emomTimer.finished = true;
}

function resetEmomTimer() {
  emomTimer.running = false;
  emomTimer.startTime = null;
  emomTimer.lastAnnouncedRound = 0;
  emomTimer.finished = false;
  emomTimer.exerciseId = null;
}

function getEmomElapsed() {
  if (!emomTimer.startTime) return 0;
  return (Date.now() - emomTimer.startTime) / 1000;
}

function getEmomTotalSeconds() {
  return emomTimer.prepSeconds + emomTimer.totalRounds * 60;
}

function getEmomRemaining() {
  return Math.max(0, getEmomTotalSeconds() - getEmomElapsed());
}

function getEmomCurrentRound() {
  var elapsed = getEmomElapsed();
  if (elapsed < emomTimer.prepSeconds) return 0; // prep phase
  var roundElapsed = elapsed - emomTimer.prepSeconds;
  return Math.min(Math.floor(roundElapsed / 60) + 1, emomTimer.totalRounds);
}

function checkEmomTimer() {
  if (!emomTimer.running) return;
  var remaining = getEmomRemaining();
  var currentRound = getEmomCurrentRound();

  // Beep at round transitions
  if (currentRound > emomTimer.lastAnnouncedRound && currentRound > 0) {
    emomTimer.lastAnnouncedRound = currentRound;
    playEmomBeep(currentRound === emomTimer.totalRounds);
    if (navigator.vibrate) navigator.vibrate(200);
  }

  // Beep at prep→round1 transition
  if (currentRound === 1 && emomTimer.lastAnnouncedRound === 0) {
    emomTimer.lastAnnouncedRound = 1;
    playEmomBeep(false);
    if (navigator.vibrate) navigator.vibrate(200);
  }

  // Timer finished
  if (remaining <= 0) {
    stopEmomTimer();
    playBeep(); // final alert
    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    renderWorkoutDetail();
  }
}

function playEmomBeep(isFinal) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var freq = isFinal ? 880 : 660;
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.value = 0.4;
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
    if (!isFinal) {
      var osc2 = audioCtx.createOscillator();
      var gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = freq + 100;
      gain2.gain.value = 0.3;
      osc2.start(audioCtx.currentTime + 0.2);
      osc2.stop(audioCtx.currentTime + 0.35);
    }
  } catch(e) {}
}

function confirmEmomRound(exId, roundNum) {
  var wEl = document.getElementById('emom-w-' + exId + '-' + roundNum);
  var rEl = document.getElementById('emom-r-' + exId + '-' + roundNum);
  if (!rEl) return;
  var weight = wEl ? (parseFloat(wEl.value.replace(',', '.')) || 0) : APP_STATE.settings.bodyWeight;
  var reps = parseInt(rEl.value) || 0;
  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  // Set or update the round's data
  while (activeSession.sets[exId].length < roundNum) {
    activeSession.sets[exId].push({ weight: 0, reps: 0, type: 'working' });
  }
  activeSession.sets[exId][roundNum - 1] = { weight: weight, reps: reps, type: 'working' };
  checkPR(exId, weight, reps, roundNum - 1);
  saveState();
  renderWorkoutDetail();
}

function autofillEmomSets(exId, totalSets, isBW) {
  // Fill all unconfirmed rounds with the values from the first confirmed round (or inputs)
  var sets = activeSession.sets[exId] || [];
  var refWeight = 0;
  var refReps = 0;
  // Find reference from first confirmed set
  if (sets.length > 0 && sets[0].reps > 0) {
    refWeight = sets[0].weight;
    refReps = sets[0].reps;
  } else {
    // Try reading from first round's input fields
    var wEl = document.getElementById('emom-w-' + exId + '-1');
    var rEl = document.getElementById('emom-r-' + exId + '-1');
    if (wEl) refWeight = parseFloat(wEl.value.replace(',', '.')) || 0;
    if (rEl) refReps = parseInt(rEl.value) || 0;
    if (isBW) refWeight = APP_STATE.settings.bodyWeight;
  }
  if (refReps === 0) { showToast('Erst mindestens 1 Satz eintragen'); return; }
  if (!activeSession.sets[exId]) activeSession.sets[exId] = [];
  for (var i = 0; i < totalSets; i++) {
    if (!activeSession.sets[exId][i] || activeSession.sets[exId][i].reps === 0) {
      activeSession.sets[exId][i] = { weight: refWeight, reps: refReps, type: 'working' };
    }
  }
  saveState();
  showToast(totalSets + ' Sätze ausgefüllt');
  renderWorkoutDetail();
}

// Audio beep
let audioCtx = null;
function playBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var playTone = function(freq, startMs, dur) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      gain.gain.value = 0.6;
      var t = audioCtx.currentTime + startMs / 1000;
      osc.start(t);
      osc.stop(t + (dur || 0.18));
    };
    playTone(880, 0);
    playTone(880, 280);
    playTone(1100, 560, 0.3);
  } catch(e) { console.log('Audio not available'); }
}

// =============================================
// KADENZ / TEMPO GUIDE
// =============================================

var cadenceState = {
  active: false,
  tempo: [2, 1, 1, 1], // [eccentric, hold-bottom, concentric, hold-top] in seconds
  phase: 0,             // 0=ecc, 1=hold-bot, 2=con, 3=hold-top
  phaseStart: 0,
  repCount: 0,
  intervalId: null,
  oscillator: null
};

var CADENCE_PHASES = [
  { name: 'DOWN', color: '#3266ad', freq: 220, icon: '↓' },
  { name: 'HOLD', color: '#D85A30', freq: 0,   icon: '◆' },
  { name: 'UP',   color: '#1D9E75', freq: 380, icon: '↑' },
  { name: 'TOP',  color: '#534AB7', freq: 0,   icon: '●' }
];

function startCadence() {
  if (cadenceState.active) { stopCadence(); return; }
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
  cadenceState.active = true;
  cadenceState.phase = 0;
  cadenceState.phaseStart = Date.now();
  cadenceState.repCount = 0;
  cadencePlayPhase(0);
  cadenceState.intervalId = setInterval(cadenceTick, 50);
  renderCadenceOverlay();
}

function stopCadence() {
  cadenceState.active = false;
  if (cadenceState.intervalId) { clearInterval(cadenceState.intervalId); cadenceState.intervalId = null; }
  cadenceStopTone();
  var overlay = document.getElementById('cadence-overlay');
  if (overlay) overlay.remove();
}

function cadenceTick() {
  if (!cadenceState.active) return;
  var elapsed = (Date.now() - cadenceState.phaseStart) / 1000;
  var phaseDuration = cadenceState.tempo[cadenceState.phase];

  // Update visual
  var progEl = document.getElementById('cadence-progress');
  var timeEl = document.getElementById('cadence-time');
  var phaseEl = document.getElementById('cadence-phase');
  var repEl = document.getElementById('cadence-reps');
  if (progEl) {
    var pct = Math.min(100, (elapsed / phaseDuration) * 100);
    progEl.style.width = pct + '%';
    progEl.style.background = CADENCE_PHASES[cadenceState.phase].color;
  }
  if (timeEl) timeEl.textContent = Math.max(0, (phaseDuration - elapsed)).toFixed(1) + 's';
  if (phaseEl) {
    phaseEl.textContent = CADENCE_PHASES[cadenceState.phase].icon + ' ' + CADENCE_PHASES[cadenceState.phase].name;
    phaseEl.style.color = CADENCE_PHASES[cadenceState.phase].color;
  }
  if (repEl) repEl.textContent = cadenceState.repCount;

  // Phase transition
  if (elapsed >= phaseDuration) {
    var nextPhase = (cadenceState.phase + 1) % 4;
    if (nextPhase === 0) cadenceState.repCount++;
    cadenceState.phase = nextPhase;
    cadenceState.phaseStart = Date.now();
    cadencePlayPhase(nextPhase);
  }
}

function cadencePlayPhase(phase) {
  cadenceStopTone();
  if (!audioCtx) return;
  var p = CADENCE_PHASES[phase];
  var dur = cadenceState.tempo[phase];
  try {
    // Transition beep
    var beepOsc = audioCtx.createOscillator();
    var beepGain = audioCtx.createGain();
    beepOsc.connect(beepGain);
    beepGain.connect(audioCtx.destination);
    beepOsc.frequency.value = phase === 0 ? 330 : phase === 1 ? 440 : phase === 2 ? 550 : 660;
    beepGain.gain.value = 0.35;
    beepOsc.start(audioCtx.currentTime);
    beepOsc.stop(audioCtx.currentTime + 0.08);

    // Sustained tone for eccentric/concentric
    if (p.freq > 0) {
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.value = p.freq;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime + 0.1);
      gain.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + dur);
      osc.start(audioCtx.currentTime + 0.1);
      osc.stop(audioCtx.currentTime + dur);
      cadenceState.oscillator = osc;
    }
  } catch(e) {}
}

function cadenceStopTone() {
  if (cadenceState.oscillator) {
    try { cadenceState.oscillator.stop(); } catch(e) {}
    cadenceState.oscillator = null;
  }
}

function renderCadenceOverlay() {
  var existing = document.getElementById('cadence-overlay');
  if (existing) existing.remove();
  var overlay = document.createElement('div');
  overlay.id = 'cadence-overlay';

      '<div style="font-size:11px;color:var(--text-ter);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Kadenz 2-1-1-1</div>' +
      '<div id="cadence-phase" style="font-size:28px;font-weight:700;margin:4px 0;transition:color 0.15s">' +
        CADENCE_PHASES[0].icon + ' ' + CADENCE_PHASES[0].name +
      '</div>' +
      '<div id="cadence-time" style="font-size:16px;font-weight:600;color:var(--text-sec);margin-bottom:8px">2.0s</div>' +
      '<div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px">' +

      '</div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<div style="font-size:12px;color:var(--text-ter)">Reps: <span id="cadence-reps" style="font-weight:600;color:var(--text)">0</span></div>' +
        '<button onclick="stopCadence()" style="background:var(--orange);color:#fff;border:none;border-radius:8px;' +
        'padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer">Stop</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
}

function checkCountdownCompletion() {
  if (restTimer.mode === 'countdown' && restTimer.pausedRemaining === null) {
    var remaining = Math.ceil((restTimer.endTime - Date.now()) / 1000);
    // 3-2-1 countdown beeps
    if (!restTimer.completed && remaining <= 3 && remaining > 0) {
      if (!restTimer._lastCountdownBeep || restTimer._lastCountdownBeep !== remaining) {
        restTimer._lastCountdownBeep = remaining;
        playCountdownTick();
      }
    }
    // Final beep at 0
    if (!restTimer.completed && Date.now() >= restTimer.endTime) {
      restTimer.completed = true;
      restTimer._lastCountdownBeep = null;
      playBeep();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    }
  }
}

function playCountdownTick() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 660;
    gain.gain.value = 0.3;
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.08);
  } catch(e) {}
}

// Visibility change handler - check timer on return
document.addEventListener('visibilitychange', function() {
  if (!document.hidden) {
    checkCountdownCompletion();
    updateAllTimerDisplays();
  }
});

function formatTime(totalSeconds) {
  var m = Math.floor(Math.abs(totalSeconds) / 60);
  var s = Math.abs(totalSeconds) % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function updateAllTimerDisplays() {
  // Update all timer-display elements (skip EMOM displays - they use class emom-timer-display)
  var els = document.querySelectorAll('.rest-timer-display:not(.emom-timer-display)');
  var sec = getTimerSeconds();
  els.forEach(function(el) { el.textContent = formatTime(sec); });

  // EMOM timer display
  if (emomTimer.running) {
    var emomEls = document.querySelectorAll('.emom-timer-display');
    var emomSec = Math.ceil(getEmomRemaining());
    emomEls.forEach(function(el) { el.textContent = formatTime(emomSec); });
  }

  // Session timer
  var sessionEls = document.querySelectorAll('.session-timer-value');
  var sessionSec = getSessionSeconds();
  sessionEls.forEach(function(el) { el.textContent = formatTime(sessionSec); });
}

// =============================================
// VOLUME CALCULATIONS
// =============================================

function calcSessionVolume(session) {
  let total = 0;
  Object.entries(session.sets || {}).forEach(([exId, sets]) => {
    // Skip old alias IDs if canonical ID also exists (prevent double-counting)
    var resolved = resolveExerciseId(exId);
    if (resolved && session.sets[resolved]) return;
    const ex = getExerciseInfo(exId);
    if (ex && ex.noVolume) return; // Skip exercises excluded from volume stats (e.g. Farmers Carries)
    sets.forEach(set => {
      const w = Number(set.weight) || 0;
      const r = Number(set.reps) || 0;
      total += getVolumeWeight(exId, w) * r * getRepMultiplier(exId);
    });
  });
  return total;
}

function calcMuscleVolume(session, muscle) {
  let total = 0;
  Object.entries(session.sets || {}).forEach(([exId, sets]) => {
    // Skip old alias IDs if canonical ID also exists (prevent double-counting)
    var resolved = resolveExerciseId(exId);
    if (resolved && session.sets[resolved]) return;
    if (EXERCISE_MUSCLE[exId] !== muscle) return;
    const ex = getExerciseInfo(exId);
    if (ex && ex.noVolume) return; // Skip exercises excluded from volume stats
    sets.forEach(set => {
      const w = Number(set.weight) || 0;
      const r = Number(set.reps) || 0;
      total += getVolumeWeight(exId, w) * r * getRepMultiplier(exId);
    });
  });
  return total;
}

// Calculate sub-muscle volume for a week (e.g. 'obere_brust', 'lats')
// 'beide_X' exercises count for BOTH sub-groups
function calcWeekSubMuscleVolume(week, muscle, subMuscle, mesocycle) {
  const config = SUB_MUSCLE_CONFIG[muscle];
  if (!config) return 0;
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => {
      let vol = 0;
      Object.entries(s.sets || {}).forEach(([exId, sets]) => {
        // Skip old alias IDs if canonical ID also exists (prevent double-counting)
        var resolved = resolveExerciseId(exId);
        if (resolved && s.sets[resolved]) return;
        if (EXERCISE_MUSCLE[exId] !== muscle) return;
        const exInfo = getExerciseInfo(exId);
        if (exInfo && exInfo.noVolume) return; // Skip exercises excluded from volume stats
        const sub = EXERCISE_SUB_MUSCLE[exId];
        if (sub !== subMuscle && sub !== config.both) return;
        sets.forEach(set => {
          const w = Number(set.weight) || 0;
          const r = Number(set.reps) || 0;
          vol += getVolumeWeight(exId, w) * r * getRepMultiplier(exId);
        });
      });
      return sum + vol;
    }, 0);
}

function calcWeekVolume(week, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcSessionVolume(s), 0);
}

function calcWeekMuscleVolume(week, muscle, mesocycle) {
  return APP_STATE.sessions
    .filter(s => s.week === week && s.mesocycle === (mesocycle || APP_STATE.settings.mesocycle.number))
    .reduce((sum, s) => sum + calcMuscleVolume(s, muscle), 0);
}

function getLastSession(workoutId) {
  const sessions = APP_STATE.sessions
    .filter(s => s.workoutId === workoutId)
    .sort((a, b) => b.date.localeCompare(a.date));
  return sessions[0] || null;
}

// Alias mapping: new circuit IDs → old IDs (for backward compat after circuit splits)
const EXERCISE_ID_ALIASES = {
  // VA: exercises that moved from c1 to c2 after circuit split
  'va-c2-e3': 'va-c1-e3',  // DB OH Walking Lunges: was va-c1-e3, now va-c2-e3
  'va-c2-e4': 'va-c1-e4',  // DB Incline Press: was va-c1-e4, now va-c2-e4
  // VB: exercises that moved from c1 to c2 after circuit split
  'vb-c2-e1': 'vb-c1-e1',  // Incline DB Press: was vb-c1-e1, now vb-c2-e1
  'vb-c2-e4': 'vb-c1-e4',  // Walking Lunges: was vb-c1-e4, now vb-c2-e4
  'vb-c2-e5': 'vb-c1-e5',  // DB Incline Flys: was vb-c1-e5, now vb-c2-e5
  // Superset split
  'vb-a2b': 'vb-a2'         // DB Lateral Raise: split from combined Lou+Lateral
};

// Get sets for an exercise from a session, checking aliases for backward compat
function getSessionSetsForEx(session, exId) {
  if (session.sets[exId] && session.sets[exId].length > 0) return session.sets[exId];
  var alias = EXERCISE_ID_ALIASES[exId];
  if (alias && session.sets[alias] && session.sets[alias].length > 0) return session.sets[alias];
  return null;
}

function getLastSessionSets(exerciseId) {
  const sorted = [...APP_STATE.sessions].sort((a, b) => b.date.localeCompare(a.date));
  for (const s of sorted) {
    if (s.sets[exerciseId]) return s.sets[exerciseId];
  }
  // Fallback: check alias for backward compat
  const alias = EXERCISE_ID_ALIASES[exerciseId];
  if (alias) {
    for (const s of sorted) {
      if (s.sets[alias]) return s.sets[alias];
    }
  }
  // Fallback 2: check ALL workouts for same exercise name (cross-variant support)
  var exInfo = getExerciseInfo(exerciseId);
  if (exInfo) {
    var matchIds = [];
    Object.keys(WORKOUT_PLANS).forEach(function(wid) {
      var wp = WORKOUT_PLANS[wid];
      var allEx = (wp.strength || []).concat(wp.accessories || []);
      allEx.forEach(function(e) {
        if (e.id !== exerciseId && e.name === exInfo.name && matchIds.indexOf(e.id) === -1) {
          matchIds.push(e.id);
        }
      });
    });
    for (var mi = 0; mi < matchIds.length; mi++) {
      for (var si = 0; si < sorted.length; si++) {
        if (sorted[si].sets[matchIds[mi]]) return sorted[si].sets[matchIds[mi]];
      }
    }
  }
  return null;
}

function formatLastSession(exerciseId) {
  const sets = getLastSessionSets(exerciseId);
  if (!sets || sets.length === 0) return null;
  const reps = sets.map(s => s.reps).join('/');
  const w = sets[0].weight;
  return `${reps} @ ${w}kg`;
}

function calcTotalReps(sets) {
  return (sets || []).reduce((sum, s) => sum + (Number(s.reps) || 0), 0);
}

function calcTotalVolume(sets) {
  return (sets || []).reduce((sum, s) => sum + (Number(s.weight) || 0) * (Number(s.reps) || 0), 0);
}

function getWeekDateRange(week) {
  var startDateStr = APP_STATE.settings.mesocycle.startDate;
  var baseDate = startDateStr ? new Date(startDateStr) : new Date('2026-05-11');
  const start = new Date(baseDate);
  start.setDate(start.getDate() + (week - 1) * 7);
  const end = new Date(start);
  end.setDate(end.getDate() + 6);
  const fmt = d => `${d.getDate()}.${d.getMonth() + 1}`;
  return `${fmt(start)} - ${fmt(end)}`;
}

function getCurrentWeekWorkoutStatus(workoutId) {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  // Check if this workout (or any variant) was done this week
  var allVariants = getWorkoutVariants(workoutId);
  const session = APP_STATE.sessions.find(function(s) {
    return allVariants.indexOf(s.workoutId) !== -1 && s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number;
  });
  if (session) return 'done';
  // Check if this is the next workout
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  if (WEEK_SCHEDULE.indexOf(workoutId) === doneCount) return 'current';
  if (WEEK_SCHEDULE.indexOf(workoutId) < doneCount) return 'done';
  return 'pending';
}

function getNextWorkoutId() {
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const doneCount = APP_STATE.sessions.filter(
    s => s.week === cw && s.mesocycle === APP_STATE.settings.mesocycle.number
  ).length;
  return WEEK_SCHEDULE[Math.min(doneCount, WEEK_SCHEDULE.length - 1)];
}

      : deload.reason === 'high_rpe' ? 'RPE Durchschnitt ' + deload.avgRPE + '/10'

      '<div style="font-size:11px;opacity:0.85">' + reason + '</div></div></div>';
  })();

  // D) Widget 1: Muskel-Check
  var muskelCheckHtml = '';
  if (APP_STATE.sessions.length > 0) {
    var checkMuscles = ['brust', 'ruecken', 'quads', 'hams'];
    var checkLabels = { brust: 'Brust', ruecken: 'Rücken', quads: 'Quads', hams: 'Hams' };
    var checkColors = { brust: '#E8720C', ruecken: '#4488FF', quads: '#2D7D46', hams: '#9B59B6' };
    // Map workouts to muscles for RPE: va/vb -> brust+quads, ra/rb -> ruecken+hams
    var muscleWorkoutMap = { brust: ['va','vb'], ruecken: ['ra','rb','rb-outdoor'], quads: ['va','vb'], hams: ['ra','rb','rb-outdoor'] };

    var tiles = '';
    checkMuscles.forEach(function(m) {
      var col = checkColors[m];
      var vol = calcWeekMuscleVolume(cw, m);
      var volTons = (vol / 1000).toFixed(1);

      // Count working sets for this muscle in current week (non-drop sets)
      var setsDone = 0;
      APP_STATE.sessions
        .filter(function(s) { return s.week === cw && s.mesocycle === meso.number; })
        .forEach(function(s) {
          Object.entries(s.sets || {}).forEach(function(entry) {
            var exId = entry[0]; var sets = entry[1];
            // Skip old alias IDs if canonical ID also exists (prevent double-counting)
            var resolved = resolveExerciseId(exId);
            if (resolved && s.sets[resolved]) return;
            if (EXERCISE_MUSCLE[exId] !== m) return;
            sets.forEach(function(set) {
              if (!set.isDrop) setsDone++;
            });
          });
        });

      // Target sets: count from plan structure for exercises mapped to this muscle
      var targetSets = 0;
      WEEK_SCHEDULE.forEach(function(wid) {
        var plan = WORKOUT_PLANS[wid];
        plan.strength.forEach(function(ex) {
          if (EXERCISE_MUSCLE[ex.id] === m) targetSets += (ex.sets || 3);
        });
        plan.circuits.forEach(function(c) {
          var targetR = getTargetRounds(c.rounds, cw);
          c.exercises.forEach(function(ex) {
            if (EXERCISE_MUSCLE[ex.id] === m) targetSets += targetR;
          });
        });
        plan.accessories.forEach(function(ex) {
          if (EXERCISE_MUSCLE[ex.id] === m) targetSets += (ex.sets || 3);
        });
      });

      var setsPct = targetSets > 0 ? Math.min(100, Math.round(setsDone / targetSets * 100)) : 0;

      // Average RPE from sessions matching this muscle's workouts
      var rpeSum = 0; var rpeCount = 0;
      var wids = muscleWorkoutMap[m] || [];
      APP_STATE.sessions
        .filter(function(s) { return s.week === cw && s.mesocycle === meso.number && wids.indexOf(s.workoutId) >= 0; })
        .forEach(function(s) {
          if (!s.rpe) return;
          Object.values(s.rpe).forEach(function(v) {
            if (v > 0) { rpeSum += v; rpeCount++; }
          });
        });
      var avgRpe = rpeCount > 0 ? (rpeSum / rpeCount).toFixed(1) : '';

      tiles += '<div onclick="switchStatsTab(\'' + m + '\');navigateTo(\'stats\')" style="cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;border-top:3px solid ' + col + '">' +
        '<div style="font-size:13px;font-weight:700;color:' + col + ';margin-bottom:6px">' + checkLabels[m] + '</div>' +
        '<div style="font-size:12px;color:var(--text-sec);margin-bottom:4px">' + setsDone + '/' + targetSets + ' Sets</div>' +
        '<div style="height:4px;background:var(--bg);border-radius:2px;margin-bottom:6px;overflow:hidden"><div style="height:100%;width:' + setsPct + '%;background:' + col + ';border-radius:2px"></div></div>' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span style="font-size:12px;font-weight:600;color:var(--text)">' + volTons + 't</span>' +

    });
