// =============================================
// AUTO-GOAL ENGINE
// Set progression is primary hypertrophy driver (RP/Israetel)
// Round increases drive volume; weight/rep gains are secondary
// =============================================

function checkAutoGoals() {
  const meso = APP_STATE.settings.mesocycle;

  // Only auto-set goals once, after W1 is complete
  if (APP_STATE.settings.goalsAutoSet) return;

  // Check if all 4 W1 workouts exist
  const w1Sessions = APP_STATE.sessions.filter(
    s => s.week === 1 && s.mesocycle === meso.number
  );
  const w1WorkoutIds = new Set(w1Sessions.map(s => getBaseWorkoutId(s.workoutId)));
  const allW1Done = WEEK_SCHEDULE.every(wid => w1WorkoutIds.has(wid));

  if (!allW1Done) return;

  // Calculate W1 baseline volumes
  const baseTotal = w1Sessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);
  const muscles = ['ruecken', 'brust', 'quads', 'hams'];
  const baseMuscle = {};
  muscles.forEach(m => {
    baseMuscle[m] = w1Sessions.reduce((sum, s) => sum + calcMuscleVolume(s, m), 0);
  });

  // Set W5 targets: baseline + 15% (challenging but sustainable)
  // Weekly progression: ~3% per week linear ramp
  const TARGET_INCREASE = 0.15; // 15% over 5 weeks
  APP_STATE.settings.goals.weeklyVolume = Math.round(baseTotal * (1 + TARGET_INCREASE));
  muscles.forEach(m => {
    APP_STATE.settings.goals[m] = Math.round(baseMuscle[m] * (1 + TARGET_INCREASE));
  });

  APP_STATE.settings.goalsAutoSet = true;
  APP_STATE.settings.goalsBaseline = {
    weeklyVolume: baseTotal,
    ruecken: baseMuscle.ruecken,
    brust: baseMuscle.brust,
    quads: baseMuscle.quads,
    hams: baseMuscle.hams
  };

  console.log('Auto-Goals gesetzt! Baseline:', baseTotal, '-> Ziel W5:', APP_STATE.settings.goals.weeklyVolume);
}

// Get the progressive target for a specific week (linear ramp from baseline to W5 goal)
function getWeekTarget(week, muscle) {
  const baseline = APP_STATE.settings.goalsBaseline;
  const goals = APP_STATE.settings.goals;
  if (!baseline || !goals) return 0;

  const key = muscle || 'weeklyVolume';
  const base = baseline[key] || 0;
  const target = goals[key] || 0;

  if (base === 0 || target === 0) return 0;

  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard;

  if (week >= totalWeeks + 1) {
    // Deload week: -40% from peak
    return Math.round(target * 0.6);
  }

  // Linear interpolation: W1 = base, W5 = target
  const progress = (week - 1) / (totalWeeks - 1);
  return Math.round(base + (target - base) * progress);
}

function renderDoneTab(plan) {

  const duration = session.duration || (sessionTimer.running ? getSessionSeconds() : 0);
  const durationMin = Math.round(duration / 60);

  // Muscle volume boxes (per-exercise based, not percentage split)
  const muscleLabels = { ruecken: 'Ruecken', brust: 'Brust', quads: 'Quads', hams: 'Hams', bizeps: 'Bizeps', core: 'Core', trizeps: 'Trizeps', schultern: 'Schultern' };
  const sessionMuscles = {};
  Object.entries(session.sets || {}).forEach(([exId, sets]) => {

    if (resolved && session.sets[resolved]) return;
    const muscle = EXERCISE_MUSCLE[exId];

      const w = Number(set.weight) || 0;
      const r = Number(set.reps) || 0;

      sessionMuscles[muscle].reps += r;

  // Compare with last session — expandable per muscle → exercise → sets

  var lastSession = APP_STATE.sessions.find(
    s => allVariants.indexOf(s.workoutId) !== -1 && s.id !== session.id && s.date < session.date
  );

// =============================================
// 1RM ESTIMATION (Brzycki formula)
// =============================================

function estimate1RM(set, exerciseDef) {
  // Skip sets with 0 or missing reps
  if (!set.reps || set.reps <= 0) return 0;
  // Skip sets with 0 weight (unless weightedBW where added weight can be valid)
  if ((!set.weight || set.weight <= 0) && !(exerciseDef && exerciseDef.weightedBW)) return 0;
  // Skip core BW exercises (bwFraction = 0) — 1RM not meaningful
  if (exerciseDef && exerciseDef.bodyweight && exerciseDef.bwFraction === 0) return 0;
  // Brzycki breaks at 37+ reps — cap at 36
  if (set.reps >= 37) return 0;
  // Calculate total load
  var w = set.weight || 0;
  if (exerciseDef && exerciseDef.dumbbell) w = w * 2;
  if (exerciseDef && exerciseDef.weightedBW) w = w + APP_STATE.settings.bodyWeight;
  // Apply bwFraction for partial-BW exercises (Ring Push Ups=0.70, Ring Rev Fly=0.25, GHD=0.50)
  if (exerciseDef && exerciseDef.bodyweight && exerciseDef.bwFraction !== undefined && exerciseDef.bwFraction > 0 && exerciseDef.bwFraction < 1) {
    w = w * exerciseDef.bwFraction;
  }
  if (w <= 0) return 0;
  // Brzycki formula: 1RM = weight * 36 / (37 - reps)
  return w * 36 / (37 - set.reps);
}

// Format 1RM for display — DB: per-DB value, weightedBW: added weight only
function format1RMDisplay(est1RM, exDef) {
  if (!est1RM || est1RM <= 0) return '0kg';
  if (exDef && exDef.dumbbell) {
    return Math.round(est1RM / 2 * 10) / 10 + 'kg/DB';
  }
  if (exDef && exDef.weightedBW) {
    var added = est1RM - APP_STATE.settings.bodyWeight;
    return '+' + Math.round(added * 10) / 10 + 'kg';
  }
  return Math.round(est1RM * 10) / 10 + 'kg';
}

// Lookup exercise definition by ID across all plans
function findExerciseDef(exId) {
  for (var key in WORKOUT_PLANS) {
    var plan = WORKOUT_PLANS[key];
    for (var i = 0; i < plan.strength.length; i++) {
      if (plan.strength[i].id === exId) return plan.strength[i];
    }
    for (var ci = 0; ci < plan.circuits.length; ci++) {
      for (var ei = 0; ei < plan.circuits[ci].exercises.length; ei++) {
        if (plan.circuits[ci].exercises[ei].id === exId) return plan.circuits[ci].exercises[ei];
      }
    }
    for (var ai = 0; ai < plan.accessories.length; ai++) {
      if (plan.accessories[ai].id === exId) return plan.accessories[ai];
    }
  }
  return null;
}

// =============================================
// LIFT PROGRESSION HELPERS
// =============================================

// Get current lift status: latest weight x reps + % change based on top-set volume vs mesocycle start
function getLiftStatus(exId) {
  var ex = getExerciseInfo(exId);
  if (!ex) return null;
  var mesoNumber = APP_STATE.settings.mesocycle.number;
  var mesoSessions = APP_STATE.sessions
    .filter(function(s) { return s.mesocycle === mesoNumber; })
    .sort(function(a, b) { return a.date.localeCompare(b.date); });

  var firstTopVol = 0, firstSet = null;
  var latestTopVol = 0, latestSet = null;
  var latestAllSets = []; // all sets from latest session for expandable view
  mesoSessions.forEach(function(s) {
    var sets = getSessionSetsForEx(s, exId) || [];
    if (sets.length === 0) return;
    // Find best set by top-set volume (weight x reps, accounting for dumbbell x2)
    var bestSet = null, bestVol = 0;
    sets.forEach(function(set) {
      var w = Number(set.weight) || 0;
      var r = Number(set.reps) || 0;
      if (r <= 0 || w <= 0) return;
      var vw = getVolumeWeight(exId, w);
      var vol = vw * r * getRepMultiplier(exId);
      if (vol > bestVol || (vol === bestVol && w > (bestSet ? Number(bestSet.weight) : 0))) { bestVol = vol; bestSet = set; }
    });
    if (!bestSet) return;
    if (!firstSet) { firstSet = { weight: bestSet.weight, reps: bestSet.reps }; firstTopVol = bestVol; }
    latestSet = { weight: bestSet.weight, reps: bestSet.reps };
    latestTopVol = bestVol;
    latestAllSets = sets;
  });

  if (!latestSet) return null;

  // % change based on top-set volume
  var changePct = 0;
  var hasChange = false;
  if (firstSet && firstTopVol > 0 && (firstSet.weight !== latestSet.weight || firstSet.reps !== latestSet.reps)) {
    changePct = Math.round((latestTopVol - firstTopVol) / firstTopVol * 100);
    hasChange = true;
  }

  // Format weight label in training unit
  var weightLabel;
  if (ex.dumbbell) {
    weightLabel = latestSet.weight + 'kg/DB';
  } else if (ex.weightedBW) {
    weightLabel = '+' + latestSet.weight + 'kg';
  } else if (ex.bodyweight && ex.bwFraction !== 0) {
    weightLabel = 'BW';
  } else if (ex.bodyweight && ex.bwFraction === 0) {
    weightLabel = '';
  } else {
    weightLabel = latestSet.weight + 'kg';
  }

  // Build per-set detail for expandable view
  var setDetails = [];
  var totalVol = 0;
  latestAllSets.forEach(function(set, idx) {
    var w = Number(set.weight) || 0;
    var r = Number(set.reps) || 0;
    if (r <= 0 || w <= 0) return;
    var vw = getVolumeWeight(exId, w);
    var vol = vw * r * getRepMultiplier(exId);
    totalVol += vol;
    setDetails.push({ weight: w, reps: r, vol: vol, isDrop: !!set.isDrop, index: idx + 1 });
  });

  // Compute per-set % change vs first session sets
  var firstAllSets = [];
  var firstTotalVol = 0;
  for (var si = 0; si < mesoSessions.length; si++) {
    var fSets = getSessionSetsForEx(mesoSessions[si], exId) || [];
    if (fSets.length > 0) {
      fSets.forEach(function(set) {
        var w = Number(set.weight) || 0;
        var r = Number(set.reps) || 0;
        if (r > 0 && w > 0) {
          var vw = getVolumeWeight(exId, w);
          var vol = vw * r * getRepMultiplier(exId);
          firstTotalVol += vol;
          firstAllSets.push({ vol: vol });
        }
      });
      break;
    }
  }

  return {
    weightLabel: weightLabel,
    weight: latestSet.weight,
    reps: latestSet.reps,
    changePct: changePct,
    hasChange: hasChange,
    setDetails: setDetails,
    totalVol: totalVol,
    firstTotalVol: firstTotalVol,
    firstTopVol: firstTopVol,
    latestTopVol: latestTopVol
  };
}

// Render expandable per-set detail for a lift
function renderLiftSetDetail(status, exId) {
  if (!status || !status.setDetails || status.setDetails.length === 0) return '';
  var ex = getExerciseInfo(exId);
  var isDbl = ex && ex.dumbbell;
  var isWBW = ex && ex.weightedBW;
  var html = '<div id="sets-' + exId + '" style="display:none;padding:4px 0">';
  status.setDetails.forEach(function(s) {
    var wLabel = isDbl ? s.weight + 'kg/DB' : (isWBW ? '+' + s.weight + 'kg' : s.weight + 'kg');
    var setLabel = s.isDrop ? 'Drop' : 'Set ' + s.index;
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px">' +
      '<span style="color:var(--text-sec)">' + setLabel + ': ' + wLabel + ' x' + s.reps + '</span>' +
      '<span style="color:var(--text-ter)">' + (s.vol / 1000).toFixed(2) + 't</span>' +
    '</div>';
  });
  // Gesamt row
  var totalChangePct = (status.firstTotalVol > 0) ? Math.round((status.totalVol - status.firstTotalVol) / status.firstTotalVol * 100) : 0;
  var totalChangeColor = totalChangePct >= 0 ? 'var(--green)' : 'var(--red)';
  var totalChangeStr = status.firstTotalVol > 0 ? (' <span style="color:' + totalChangeColor + '">' + (totalChangePct >= 0 ? '+' : '') + totalChangePct + '%</span>') : '';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;margin-top:2px;border-top:1px solid var(--border);font-size:12px;font-weight:600">' +
    '<span>Gesamt</span>' +
    '<span>' + (status.totalVol / 1000).toFixed(2) + 't' + totalChangeStr + '</span>' +
  '</div>';
  html += '</div>';
  return html;
}

// Check if exercise is a strength exercise (not circuit or accessory)
function isStrengthExercise(exId) {
  for (var key in WORKOUT_PLANS) {
    var plan = WORKOUT_PLANS[key];
    for (var i = 0; i < plan.strength.length; i++) {
      if (plan.strength[i].id === exId) return true;
    }
  }
  return false;
}

function getExerciseProgression(exId, exDef) {
  var progression = [];
  APP_STATE.sessions.forEach(function(s) {
    var sets = getSessionSetsForEx(s, exId) || [];
    if (sets.length === 0) return;
    var bestSet = null;
    var bestEst = 0;
    sets.forEach(function(set) {
      var est = estimate1RM(set, exDef);
      if (est > bestEst) {
        bestEst = est;
        bestSet = set;
      }
    });
    if (bestSet && bestEst > 0) {
      progression.push({
        date: s.date || '',
        workout: s.workoutId || '',
        weight: bestSet.weight,
        reps: bestSet.reps,
        est1RM: Math.round(bestEst * 10) / 10
      });
    }
  });
  return progression;
}

function renderProgressionBars(progression, exDef) {
  if (progression.length === 0) return '<div style="font-size:12px;color:var(--text-ter);padding:4px 0">Keine Daten</div>';
  var maxEst = 0;
  progression.forEach(function(p) { if (p.est1RM > maxEst) maxEst = p.est1RM; });
  var html = '<div style="padding:4px 0 4px">';
  // Show first → last with arrow summary
  var first = progression[0];
  var last = progression[progression.length - 1];
  if (progression.length > 1) {
    var isDbl = exDef && exDef.dumbbell;
    var isWBW = exDef && exDef.weightedBW;
    var fw = isDbl ? first.weight + 'kg/DB' : (isWBW ? '+' + first.weight + 'kg' : first.weight + 'kg');
    var lw = isDbl ? last.weight + 'kg/DB' : (isWBW ? '+' + last.weight + 'kg' : last.weight + 'kg');
    html += '<div style="font-size:12px;color:var(--orange);font-weight:600;margin-bottom:6px">' +
      fw + ' x' + first.reps + '  →  ' + lw + ' x' + last.reps + '</div>';
  }
  progression.forEach(function(p, i) {
    var pct = maxEst > 0 ? Math.round(p.est1RM / maxEst * 100) : 0;
    var dateStr = p.date ? p.date.substring(5).replace('-', '.') : '?';
    var isDbl = exDef && exDef.dumbbell;
    var isWBW = exDef && exDef.weightedBW;

// RPE Coaching: analyze recent RPE trend for a section and return a coaching tip
function getRPECoachingTip(sectionKey, workoutId) {
  // Get recent sessions for this workout with RPE data for this section
  var recentSessions = APP_STATE.sessions
    .filter(function(s) { return s.workoutId === workoutId && s.rpe && s.rpe[sectionKey] > 0; })
    .sort(function(a, b) { return b.date.localeCompare(a.date); })
    .slice(0, 3);
  if (recentSessions.length < 2) return null;

  var rpeValues = recentSessions.map(function(s) { return s.rpe[sectionKey]; });
  var avgRPE = Math.round(rpeValues.reduce(function(a, b) { return a + b; }, 0) / rpeValues.length * 10) / 10;
  var currentWeek = APP_STATE.settings.mesocycle.currentWeek;
  var totalHard = APP_STATE.settings.mesocycle.weeksHard;

  // Determine coaching tip based on RPE trend + week position
  if (avgRPE <= 5.5) {
    return { text: 'Letzte ' + rpeValues.length + 'x Ø RPE ' + avgRPE + ' — heute Gewicht oder Reps steigern!', color: 'var(--green)', icon: '🔥' };
  } else if (avgRPE <= 7) {
    if (currentWeek >= totalHard - 1) {
      return { text: 'Ø RPE ' + avgRPE + ' — letzte Wochen: Push ans Limit!', color: 'var(--orange)', icon: '💪' };
    }
    return { text: 'Ø RPE ' + avgRPE + ' — guter Sweet Spot, weiter so', color: 'var(--green)', icon: '✅' };
  } else if (avgRPE <= 8.5) {
    if (currentWeek <= 2) {
      return { text: 'Ø RPE ' + avgRPE + ' in W' + currentWeek + ' — frueh schon hoch, Pacing beachten', color: 'var(--orange)', icon: '⚡' };
    }
    return { text: 'Ø RPE ' + avgRPE + ' — gut gefordert, Technik sauber halten', color: 'var(--orange)', icon: '💪' };
  } else {
    return { text: 'Ø RPE ' + avgRPE + ' — sehr hoch! Heute kontrolliert trainieren', color: 'var(--red)', icon: '⚠️' };
  }
}

// =============================================
// ESTIMATED WORKOUT DURATION
// =============================================

function getEstimatedDuration(workoutId) {
  var sessions = APP_STATE.sessions
    .filter(function(s) { return s.workoutId === workoutId && s.duration > 0; })
    .sort(function(a, b) { return b.date.localeCompare(a.date); })
    .slice(0, 3);
  if (sessions.length === 0) return 0;

  var plan = WORKOUT_PLANS[workoutId];
  if (!plan) {
    // Fallback: simple average
    var avg = sessions.reduce(function(sum, s) { return sum + s.duration; }, 0) / sessions.length;
    return Math.round(avg / 60);
  }

  // Calculate target circuit rounds for current week
  var cw = APP_STATE.settings.mesocycle.currentWeek;
  var targetTotalRounds = 0;
  plan.circuits.forEach(function(c) {
    var target = getTargetRounds(c.rounds, cw);
    targetTotalRounds += c.doubleRounds ? target * 2 : target;
  });

  // Calculate avg duration and avg total rounds from historical sessions
  var totalDur = 0;
  var totalHistRounds = 0;
  var validCount = 0;
  sessions.forEach(function(s) {
    var sRounds = 0;
    plan.circuits.forEach(function(c) {
      sRounds += (s.circuitRounds && s.circuitRounds[c.id]) || 0;
    });
    if (sRounds > 0) {
      totalDur += s.duration;
      totalHistRounds += sRounds;
      validCount++;
    }
  });

  if (validCount === 0 || totalHistRounds === 0) {
    // No round data, fall back to simple average
    var avgSimple = sessions.reduce(function(sum, s) { return sum + s.duration; }, 0) / sessions.length;
    return Math.round(avgSimple / 60);
  }

  // Average: duration per round
  var avgDurPerRound = totalDur / totalHistRounds;
  var avgHistRounds = totalHistRounds / validCount;
  var avgDur = totalDur / validCount;

  // If target rounds differ from historical, scale proportionally
  // estimated = avgDur * (targetRounds / avgHistRounds)
  var estimated = avgDur * (targetTotalRounds / avgHistRounds);
  return Math.round(estimated / 60);
}

// =============================================
// TRAINING STREAK
// =============================================

function getTrainingStreak() {
  var meso = APP_STATE.settings.mesocycle;
  var streakWeeks = 0;
  // Count backwards from current week
  for (var w = meso.currentWeek; w >= 1; w--) {
    var weekSessions = APP_STATE.sessions.filter(function(s) {
      return s.week === w && s.mesocycle === meso.number;
    });
    var workoutIds = new Set(weekSessions.map(function(s) { return getBaseWorkoutId(s.workoutId); }));
    var allDone = WEEK_SCHEDULE.every(function(wid) { return workoutIds.has(wid); });
    if (allDone) {
      streakWeeks++;
    } else if (w < meso.currentWeek) {
      break; // Past incomplete week breaks streak
    }
    // Current week doesn't break streak if incomplete (still in progress)
  }
  // Also count from previous mesocycles
  if (streakWeeks === meso.currentWeek || (streakWeeks === meso.currentWeek - 1 && meso.currentWeek > 1)) {
    for (var m = meso.number - 1; m >= 1; m--) {
      var mesoSessions = APP_STATE.sessions.filter(function(s) { return s.mesocycle === m; });
      var maxWeek = 0;
      mesoSessions.forEach(function(s) { if (s.week > maxWeek) maxWeek = s.week; });
      for (var w2 = maxWeek; w2 >= 1; w2--) {
        var ws = mesoSessions.filter(function(s) { return s.week === w2; });
        var wids = new Set(ws.map(function(s) { return getBaseWorkoutId(s.workoutId); }));
        if (WEEK_SCHEDULE.every(function(wid) { return wids.has(wid); })) {
          streakWeeks++;
        } else {
          return streakWeeks;
        }
      }
    }
  }
  return streakWeeks;
}

function getTotalSessions() {
  return APP_STATE.sessions.length;
}

// =============================================
// DELOAD DETECTION
// =============================================

function shouldSuggestDeload() {
  var cw = APP_STATE.settings.mesocycle.currentWeek;
  if (cw < 3) return null; // Need at least 3 weeks of data

  // Check 1: Volume declining for 2 consecutive weeks
  var vol3 = calcWeekVolume(cw - 2);
  var vol2 = calcWeekVolume(cw - 1);
  var vol1 = calcWeekVolume(cw);
  var volumeDecline = vol1 > 0 && vol2 > 0 && vol3 > 0 && vol2 < vol3 && vol1 < vol2;

  // Check 2: Average RPE above 8.5 for last 2 weeks
  var recentSessions = APP_STATE.sessions.filter(function(s) {
    return s.mesocycle === APP_STATE.settings.mesocycle.number && s.week >= cw - 1;
  });
  var rpeValues = [];
  recentSessions.forEach(function(s) {
    if (s.rpe) {
      Object.values(s.rpe).forEach(function(v) { if (v > 0) rpeValues.push(v); });
    }
  });
  var avgRPE = rpeValues.length > 0 ? rpeValues.reduce(function(a, b) { return a + b; }, 0) / rpeValues.length : 0;
  var highRPE = avgRPE >= 8.5;

  if (volumeDecline && highRPE) return { reason: 'volume_and_rpe', avgRPE: Math.round(avgRPE * 10) / 10 };
  if (volumeDecline) return { reason: 'volume_decline' };
  if (highRPE && rpeValues.length >= 4) return { reason: 'high_rpe', avgRPE: Math.round(avgRPE * 10) / 10 };
  return null;
}

// =============================================
// MESOCYCLE COMPARISON
// =============================================

function getMesoLiftComparison(exId) {
  var currentMeso = APP_STATE.settings.mesocycle.number;
  if (currentMeso <= 1) return null;
  var prevMeso = currentMeso - 1;
  var ex = getExerciseInfo(exId);

  // Get best set from end of previous meso (by estimated 1RM)
  var prevSessions = APP_STATE.sessions
    .filter(function(s) { return s.mesocycle === prevMeso; })
    .sort(function(a, b) { return b.date.localeCompare(a.date); });

  var prevBest = null, prevBest1RM = 0;
  // Look at last 2 sessions of prev meso for this exercise
  prevSessions.slice(0, 4).forEach(function(s) {
    (getSessionSetsForEx(s, exId) || []).forEach(function(set) {
      var est = estimate1RM(set, ex);
      if (est > prevBest1RM) { prevBest1RM = est; prevBest = { weight: Number(set.weight) || 0, reps: Number(set.reps) || 0 }; }
    });
  });

  if (!prevBest) return null;

  // Get current best
  var currentStatus = getLiftStatus(exId);
  if (!currentStatus) return null;

  var current1RM = estimate1RM({ weight: currentStatus.weight, reps: currentStatus.reps }, ex);
  if (prevBest1RM > 0 && current1RM > 0) {
    var changePct = Math.round((current1RM - prevBest1RM) / prevBest1RM * 100);
    return { prevWeight: prevBest.weight, prevReps: prevBest.reps, changePct: changePct };
  }
  return null;
}

function getMesoVolumeComparison(muscle) {
  var currentMeso = APP_STATE.settings.mesocycle.number;
  if (currentMeso <= 1) return null;
  var prevMeso = currentMeso - 1;
  var cw = APP_STATE.settings.mesocycle.currentWeek;

  // Same week comparison: current meso week N vs prev meso week N
  var currentVol = muscle ? calcWeekMuscleVolume(cw, muscle) : calcWeekVolume(cw);
  var prevVol = muscle ? calcWeekMuscleVolume(cw, muscle, prevMeso) : calcWeekVolume(cw, prevMeso);

  if (prevVol > 0 && currentVol > 0) {
    return { changePct: Math.round((currentVol - prevVol) / prevVol * 100), prevVol: prevVol, currentVol: currentVol };
  }
  return null;
}

function renderVolumeTimeline(muscle) {
  var mesos = getAllMesocycles();
  if (mesos.length === 0) return '<div style="font-size:12px;color:var(--text-ter);padding:8px">Keine Daten</div>';

  // Collect all data points: [{label, vol, mesoNum}]
  var points = [];
  var maxVol = 0;
  mesos.forEach(function(m) {
    var weeks = Object.keys(m.weeks).map(Number).sort(function(a,b){return a-b;});
    weeks.forEach(function(w) {
      var vol = muscle ? calcWeekMuscleVolume(w, muscle, m.number) : calcWeekVolume(w, m.number);
      if (vol > maxVol) maxVol = vol;
      points.push({ label: 'M' + m.number + 'W' + w, vol: vol, mesoNum: m.number, week: w });
    });
  });

  if (points.length === 0) return '<div style="font-size:12px;color:var(--text-ter);padding:8px">Keine Daten</div>';

  var barColor = muscle ? ({
    ruecken: 'var(--blue)', brust: 'var(--orange)', quads: 'var(--green)',
    hams: 'var(--purple)', bizeps: 'var(--red)', trizeps: '#3498DB'
  }[muscle] || 'var(--orange)') : 'var(--orange)';

  var html = '<div class="chart-container"><div class="chart-bar-group" style="position:relative">';

  var prevMeso = null;
  points.forEach(function(p, i) {
    var pct = maxVol > 0 ? (p.vol / maxVol * 100) : 0;
    var isMesoBoundary = prevMeso !== null && p.mesoNum !== prevMeso;
    var boundaryStyle = isMesoBoundary ? 'border-left:2px dashed var(--text-ter);' : '';
    var isLast = i === points.length - 1;
    html += '<div class="chart-bar-wrapper" style="' + boundaryStyle + '">' +
      '<div class="chart-value" style="font-size:9px">' + (p.vol / 1000).toFixed(1) + 't</div>' +
      '<div class="chart-bar" style="height:' + pct + '%;background:' + barColor + ';opacity:' + (isLast ? '1' : '0.6') + '"></div>' +
      '<div class="chart-label" style="font-size:8px">' + (p.week === 1 ? 'M' + p.mesoNum : 'W' + p.week) + '</div>' +
    '</div>';
    prevMeso = p.mesoNum;
  });

  html += '</div></div>';
  return html;
}

// Sub-muscle group breakdown for brust + ruecken
function renderSubMuscleBreakdown(muscle) {
  const config = SUB_MUSCLE_CONFIG[muscle];
  if (!config) return '';
  const cw = APP_STATE.settings.mesocycle.currentWeek;
  const muscleColors = { brust: 'var(--orange)', ruecken: 'var(--blue)' };
  const baseColor = muscleColors[muscle] || 'var(--orange)';

  // Calculate CURRENT WEEK sub-volumes only (not cumulative)
  let subData = [];
  let maxSub = 0;
  config.subs.forEach(function(sub) {
    const vol = calcWeekSubMuscleVolume(cw, muscle, sub);
    subData.push({ key: sub, label: config.labels[sub], vol: vol });
    if (vol > maxSub) maxSub = vol;
  });

  if (maxSub === 0) return '';

  let html = '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">';
  html += '<div style="font-size:11px;font-weight:600;color:var(--text-ter);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px">Aufschluesselung</div>';

  subData.forEach(function(d) {
    const pct = maxSub > 0 ? Math.round(d.vol / maxSub * 100) : 0;
    const volStr = (d.vol / 1000).toFixed(1) + 't';
    html += '<div style="margin-bottom:6px">' +
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">' +
        '<span style="color:var(--text-sec)">' + d.label + '</span>' +
        '<span style="font-weight:600">' + volStr + '</span>' +
      '</div>' +
      '<div style="height:8px;background:var(--bg);border-radius:4px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + baseColor + ';border-radius:4px;opacity:' + (pct === 100 ? '1' : '0.6') + '"></div>' +
      '</div>' +
    '</div>';
  });

  // Show ratio
  if (subData.length === 2 && subData[0].vol > 0 && subData[1].vol > 0) {
    const ratio1 = Math.round(subData[0].vol / (subData[0].vol + subData[1].vol) * 100);
    const ratio2 = 100 - ratio1;
    html += '<div style="font-size:11px;color:var(--text-ter);text-align:center;margin-top:4px">' +
      subData[0].label + ' ' + ratio1 + '% / ' + subData[1].label + ' ' + ratio2 + '%</div>';
  }

  html += '</div>';
  return html;
}

var calendarMonth = new Date().getMonth();
var calendarYear = new Date().getFullYear();
var calendarSelectedDate = null;

// Meso colors: subtle tinted backgrounds for calendar shading
var MESO_COLORS = [
  { bg: 'rgba(45,125,70,0.08)',  border: 'rgba(45,125,70,0.25)',  text: '#2D7D46', label: 'M1' },  // green
  { bg: 'rgba(68,136,255,0.08)', border: 'rgba(68,136,255,0.25)', text: '#4488FF', label: 'M2' },  // blue
  { bg: 'rgba(155,89,182,0.08)', border: 'rgba(155,89,182,0.25)', text: '#9B59B6', label: 'M3' },  // purple
  { bg: 'rgba(232,114,12,0.08)', border: 'rgba(232,114,12,0.25)', text: '#E8720C', label: 'M4' },  // orange
  { bg: 'rgba(231,76,60,0.08)',  border: 'rgba(231,76,60,0.25)',  text: '#E74C3C', label: 'M5' }   // red
];

function getCalendarMesoRanges() {
  var meso = APP_STATE.settings.mesocycle;

  // Collect session dates per meso number
  var mesoSessions = {};
  APP_STATE.sessions.forEach(function(s) {
    if (!s.mesocycle || !s.date) return;
    if (!mesoSessions[s.mesocycle]) mesoSessions[s.mesocycle] = [];
    mesoSessions[s.mesocycle].push(s.date);
  });

  // Ensure current meso is included even without sessions
  if (!mesoSessions[meso.number] && meso.startDate) {
    mesoSessions[meso.number] = [meso.startDate];
  }

  var ranges = {};
  var mesoNums = Object.keys(mesoSessions).map(Number).sort(function(a,b){return a-b;});

  mesoNums.forEach(function(mn) {
    var dates = mesoSessions[mn].sort();
    var startStr = dates[0];
    // For current meso, use official startDate if earlier
    if (mn === meso.number && meso.startDate && meso.startDate < startStr) {
      startStr = meso.startDate;
    }
    // Snap start to Monday of that week
    var startD = new Date(startStr);
    var dow = startD.getDay();
    dow = dow === 0 ? 6 : dow - 1;
    startD.setDate(startD.getDate() - dow);
    var startIso = startD.toISOString().split('T')[0];

    // End date
    var endIso;
    if (mn === meso.number) {
      // Current meso: extend to full planned duration
      var totalWeeks = meso.weeksHard + meso.weeksDeload;
      var endD = new Date(startD);
      endD.setDate(endD.getDate() + totalWeeks * 7 - 1);
      endIso = endD.toISOString().split('T')[0];
    } else {
      // Past meso: extend last session to Sunday of its week
      var lastDate = dates[dates.length - 1];
      var endD2 = new Date(lastDate);
      var edow = endD2.getDay();
      edow = edow === 0 ? 6 : edow - 1;
      endD2.setDate(endD2.getDate() + (6 - edow));
      endIso = endD2.toISOString().split('T')[0];
    }

    ranges[mn] = {
      start: startIso.replace(/-/g,''),
      end: endIso.replace(/-/g,''),
      color: MESO_COLORS[(mn - 1) % MESO_COLORS.length]
    };
  });
  return ranges;
}

function getMesoForDate(dateStr, mesoRanges) {
  var ds = dateStr.replace(/-/g, '');
  var result = null;
  Object.keys(mesoRanges).forEach(function(mn) {
    var r = mesoRanges[mn];
    if (ds >= r.start && ds <= r.end) result = { num: Number(mn), color: r.color };
  });
  return result;
}

function renderCalendarPage() {
  var container = document.getElementById('calendar-content');
  var monthNames = ['Januar', 'Februar', 'Maerz', 'April', 'Mai', 'Juni', 'Juli', 'August', 'September', 'Oktober', 'November', 'Dezember'];
  var dayNames = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];

  // Get sessions for this month
  var sessionsThisMonth = {};
  var monthSessionCount = 0;
  APP_STATE.sessions.forEach(function(s) {
    var d = new Date(s.date);
    if (d.getMonth() === calendarMonth && d.getFullYear() === calendarYear) {
      var day = d.getDate();
      if (!sessionsThisMonth[day]) sessionsThisMonth[day] = [];
      sessionsThisMonth[day].push(s);
      monthSessionCount++;
    }
  });

  // Build meso date ranges for shading
  var mesoRanges = getCalendarMesoRanges();

  var firstDay = new Date(calendarYear, calendarMonth, 1);
  var lastDay = new Date(calendarYear, calendarMonth + 1, 0);
  var startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  var totalDays = lastDay.getDate();
  var today = new Date();
  var todayStr = today.toISOString().split('T')[0];

  var html = '<div style="padding:12px 16px 8px">';

  // Compact header with month nav
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html += '<button style="background:none;border:none;color:var(--text-sec);font-size:20px;padding:4px 8px;cursor:pointer" onclick="calendarNav(-1)">&lsaquo;</button>';
  html += '<div style="font-size:16px;font-weight:600;cursor:pointer" onclick="calendarGoToday()">' + monthNames[calendarMonth] + ' ' + calendarYear + '</div>';
  html += '<button style="background:none;border:none;color:var(--text-sec);font-size:20px;padding:4px 8px;cursor:pointer" onclick="calendarNav(1)">&rsaquo;</button>';
  html += '</div>';

  // Day name headers
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">';
  dayNames.forEach(function(dn) {
    html += '<div style="text-align:center;font-size:11px;color:var(--text-ter);padding:2px 0">' + dn + '</div>';
  });
  html += '</div>';

  // Find first day of each meso visible this month (for labels)
  var mesoFirstDays = {};
  Object.keys(mesoRanges).forEach(function(mn) {
    var r = mesoRanges[mn];
    var startStr = r.start.substring(0,4) + '-' + r.start.substring(4,6) + '-' + r.start.substring(6,8);
    var sd = new Date(startStr);
    // If meso starts before this month, first day in this month is day 1
    var monthStart = new Date(calendarYear, calendarMonth, 1);
    var monthEnd = new Date(calendarYear, calendarMonth + 1, 0);
    if (sd >= monthStart && sd <= monthEnd) {
      mesoFirstDays[sd.getDate()] = { num: Number(mn), color: r.color };
    }
  });

  // Day cells
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">';
  for (var e = 0; e < startDow; e++) {
    html += '<div style="aspect-ratio:1"></div>';
  }

  for (var d = 1; d <= totalDays; d++) {
    var dateStr = calendarYear + '-' + String(calendarMonth + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    var isToday = dateStr === todayStr;
    var isSelected = dateStr === calendarSelectedDate;
    var sessions = sessionsThisMonth[d] || [];
    var hasSession = sessions.length > 0;
    var mesoInfo = getMesoForDate(dateStr, mesoRanges);

    var cellStyle = 'aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;';
    if (isSelected) {
      cellStyle += 'background:var(--orange);';
    } else if (mesoInfo) {
      cellStyle += 'background:' + mesoInfo.color.bg + ';';
      if (hasSession) cellStyle += 'border:2px solid var(--orange);';
    } else if (hasSession) {
      cellStyle += 'border:2px solid var(--orange);';
    }
    if (isToday && !isSelected && !hasSession) cellStyle += 'border:2px solid var(--orange);';

    var textColor = isSelected ? '#fff' : (isToday ? 'var(--orange)' : 'var(--text)');
    var fontWeight = (isToday || isSelected) ? '700' : '400';

    html += '<div style="' + cellStyle + '" onclick="calendarDayTap(\'' + dateStr + '\')">';

    // Meso start label
    if (mesoFirstDays[d] && !isSelected) {
      var mfd = mesoFirstDays[d];
      html += '<div style="position:absolute;top:1px;right:2px;font-size:7px;font-weight:700;color:' + mfd.color.text + ';opacity:0.7">' + mfd.color.label + '</div>';
    }

    html += '<div style="font-size:13px;font-weight:' + fontWeight + ';color:' + textColor + '">' + d + '</div>';

    if (hasSession) {
      var dotColor = isSelected ? '#fff' : 'var(--orange)';
      html += '<div style="display:flex;gap:2px;margin-top:1px">';
      sessions.forEach(function(s) {
        var plan = WORKOUT_PLANS[s.workoutId];
        var c = (plan && plan.isFree && !isSelected) ? '#8B5CF6' : dotColor;
        html += '<div style="width:4px;height:4px;border-radius:50%;background:' + c + '"></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }
  html += '</div>';

  // Month summary
  var trainDays = Object.keys(sessionsThisMonth).length;
  html += '<div style="display:flex;justify-content:center;gap:16px;margin-top:10px;font-size:11px;color:var(--text-ter)">';
  html += '<span>' + monthSessionCount + ' Sessions</span>';
  html += '<span>' + trainDays + ' Trainingstage</span>';
  html += '</div>';

  // Meso legend (only if multiple mesos visible this month)
  var visibleMesos = [];
  Object.keys(mesoRanges).forEach(function(mn) {
    var r = mesoRanges[mn];
    var mStart = calendarYear * 10000 + (calendarMonth + 1) * 100 + 1;
    var mEnd = calendarYear * 10000 + (calendarMonth + 1) * 100 + totalDays;
    var rStart = parseInt(r.start);
    var rEnd = parseInt(r.end);
    if (rEnd >= mStart && rStart <= mEnd) {
      visibleMesos.push({ num: Number(mn), color: r.color });
    }
  });
  if (visibleMesos.length > 0) {
    html += '<div style="display:flex;justify-content:center;gap:12px;margin-top:6px">';
    visibleMesos.forEach(function(vm) {
      html += '<div style="display:flex;align-items:center;gap:3px;font-size:10px;color:' + vm.color.text + '">';
      html += '<div style="width:8px;height:8px;border-radius:2px;background:' + vm.color.bg + ';border:1px solid ' + vm.color.border + '"></div>';
      html += 'Meso ' + vm.num;
      html += '</div>';
    });
    html += '</div>';
  }

  // Detail area
  html += '<div id="calendar-day-detail" style="margin-top:12px"></div>';
  html += '</div>';

  container.innerHTML = html;

  // Show detail for selected day
  if (calendarSelectedDate) {
    renderCalendarDayDetail(calendarSelectedDate);
  }
}

function calendarNav(delta) {
  calendarMonth += delta;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  calendarSelectedDate = null;
  renderCalendarPage();
}

function calendarGoToday() {
  var today = new Date();
  calendarMonth = today.getMonth();
  calendarYear = today.getFullYear();
  calendarSelectedDate = today.toISOString().split('T')[0];
  renderCalendarPage();
}

function getWorkoutSuggestionsForDate(dateStr) {
  var d = new Date(dateStr);
  var dow = d.getDay(); // 0=Sun, 1=Mon, ...
  var suggestions = [];

  // Mon/Fri = Vorderseite (va, vb), Di/Sa = Rueckseite (ra, rb)
  if (dow === 1 || dow === 5) {
    var vWorkouts = ['va', 'vb'];
    var vVariants = [];
    vWorkouts.forEach(function(wid) {
      var variants = typeof getWorkoutVariants === 'function' ? getWorkoutVariants(wid) : [];
      vVariants.push({ id: wid, name: WORKOUT_PLANS[wid] ? WORKOUT_PLANS[wid].name : wid });
      variants.forEach(function(vid) {
        if (WORKOUT_PLANS[vid]) vVariants.push({ id: vid, name: WORKOUT_PLANS[vid].name });
      });
    });
    suggestions = vVariants;
  } else if (dow === 2 || dow === 6) {
    var rWorkouts = ['ra', 'rb'];
    var rVariants = [];
    rWorkouts.forEach(function(wid) {
      var variants = typeof getWorkoutVariants === 'function' ? getWorkoutVariants(wid) : [];
      rVariants.push({ id: wid, name: WORKOUT_PLANS[wid] ? WORKOUT_PLANS[wid].name : wid });
      variants.forEach(function(vid) {
        if (WORKOUT_PLANS[vid]) rVariants.push({ id: vid, name: WORKOUT_PLANS[vid].name });
      });
    });
    suggestions = rVariants;
  } else {
    // Other days — show all
    WEEK_SCHEDULE.forEach(function(wid) {
      if (WORKOUT_PLANS[wid]) suggestions.push({ id: wid, name: WORKOUT_PLANS[wid].name });
    });
  }
  return suggestions;
}

function calendarDayTap(dateStr) {
  calendarSelectedDate = dateStr;
  renderCalendarPage();
}

function renderCalendarDayDetail(dateStr) {
  var sessions = APP_STATE.sessions.filter(function(s) { return s.date === dateStr; });
  var detail = document.getElementById('calendar-day-detail');
  if (!detail) return;

  var parts = dateStr.split('-');
  var dayLabel = parseInt(parts[2]) + '.' + parseInt(parts[1]) + '.' + parts[0];
  var d = new Date(dateStr);
  var dayNames = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
  var dayName = dayNames[d.getDay()];

  var html = '<div style="font-size:13px;font-weight:600;margin-bottom:8px">' + dayName + ', ' + dayLabel + '</div>';

  // Show existing sessions
  sessions.forEach(function(s) {
    var plan = WORKOUT_PLANS[s.workoutId];
    var name = plan ? plan.name : s.workoutId;
    var dur = s.duration ? Math.round(s.duration / 60) + ' Min' : '';
    var setCount = 0;
    Object.keys(s.sets || {}).forEach(function(k) { setCount += (s.sets[k] || []).length; });
    var isFree = plan && plan.isFree;
    var badge = isFree ? '<span style="background:#8B5CF6;color:#fff;padding:1px 5px;border-radius:3px;font-size:9px;margin-left:4px">Free</span>' : '';
    var mesoWeek = 'M' + (s.mesocycle || '?') + ' W' + (s.week || '?');

    html += '<div class="card" style="padding:12px;margin-bottom:8px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">';
    html += '<div style="font-weight:600;font-size:13px">' + name + badge + '</div>';
    html += '<div style="font-size:10px;color:var(--text-ter)">' + mesoWeek + '</div>';
    html += '</div>';
    html += '<div style="display:flex;gap:10px;font-size:11px;color:var(--text-sec);margin-bottom:8px">';
    if (dur) html += '<span>' + dur + '</span>';
    html += '<span>' + setCount + ' Sets</span>';
    html += '</div>';
    html += '<div style="display:flex;gap:6px">';
    html += '<button class="btn btn-outline" style="flex:1;font-size:11px;padding:5px" onclick="showChangeDateDialog(\'' + s.id + '\')">Verschieben</button>';
    html += '<button class="btn btn-outline" style="flex:1;font-size:11px;padding:5px" onclick="openSessionFromCalendar(\'' + s.id + '\')">Details</button>';
    html += '</div>';
    html += '</div>';
  });

  // "Add training" section
  var suggestions = getWorkoutSuggestionsForDate(dateStr);
  html += '<div class="card" style="padding:12px">';
  html += '<div style="font-size:12px;color:var(--text-sec);margin-bottom:8px">Training eintragen</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
  suggestions.forEach(function(s) {
    html += '<button class="btn btn-outline" style="font-size:11px;padding:5px 10px" onclick="calendarStartWorkout(\'' + s.id + '\',\'' + dateStr + '\')">' + s.name + '</button>';
  });
  html += '<button class="btn btn-outline" style="font-size:11px;padding:5px 10px;color:#8B5CF6;border-color:#8B5CF6" onclick="calendarStartFree(\'' + dateStr + '\')">Freies Workout</button>';
  html += '</div>';
  html += '</div>';

  detail.innerHTML = html;
}

function calendarStartWorkout(workoutId, dateStr) {
  // Navigate to training and open the workout
  activeWorkoutId = workoutId;
  trainingView = 'workout-detail';
  activeSubTab = 'prep';

  // Calculate week from date
  var meso = APP_STATE.settings.mesocycle;
  var week = meso.currentWeek;
  if (meso.startDate) {
    var startMs = new Date(meso.startDate).getTime();
    var dateMs = new Date(dateStr).getTime();
    var diffDays = Math.floor((dateMs - startMs) / 86400000);
    if (diffDays >= 0) week = Math.floor(diffDays / 7) + 1;
  }
  selectedWeek = week;

  navigateTo('training');
}

function calendarStartFree(dateStr) {
  // Open free designer with pre-set date
  freeDesignerState = {
    date: dateStr,
    name: '',
    blocks: []
  };
  freeDesignerCounter = 0;
  trainingView = 'free-designer';
  navigateTo('training');
}

function openSessionFromCalendar(sessionId) {
  var session = APP_STATE.sessions.find(function(s) { return s.id === sessionId; });
  if (!session) return;
  var plan = WORKOUT_PLANS[session.workoutId];
  if (!plan) return;

  if (plan.isFree) {
    openFreeSession(sessionId);
  } else {
    activeWorkoutId = session.workoutId;
    activeSession = Object.assign({}, session, { _completed: true, _readinessDone: true });
    activeSubTab = 'done';
    trainingView = 'workout-detail';
    navigateTo('training');
  }
}

function showChangeDateDialog(sessionId) {
  var session = APP_STATE.sessions.find(function(s) { return s.id === sessionId; });
  if (!session) return;
  var plan = WORKOUT_PLANS[session.workoutId];
  var name = plan ? plan.name : session.workoutId;
  var parts = session.date.split('-');
  var currentLabel = parseInt(parts[2]) + '.' + parseInt(parts[1]) + '.' + parts[0];

  showModal(
    '<div style="padding:20px">' +
    '<div style="font-size:15px;font-weight:600;margin-bottom:4px">Training verschieben</div>' +
    '<div style="font-size:12px;color:var(--text-sec);margin-bottom:14px">' + name + ' — aktuell ' + currentLabel + '</div>' +
    '<input type="date" class="input-field" id="change-date-input" value="' + session.date + '" style="width:100%;font-size:15px;padding:10px;margin-bottom:14px;-webkit-appearance:none">' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-outline" style="flex:1;padding:10px" onclick="closeModal()">Abbrechen</button>' +
    '<button class="btn btn-orange" style="flex:1;padding:10px" onclick="confirmChangeDate(\'' + sessionId + '\')">Verschieben</button>' +
    '</div>' +
    '</div>'
  );
}

function confirmChangeDate(sessionId) {
  var newDate = document.getElementById('change-date-input').value;
  if (!newDate) return;

  var session = APP_STATE.sessions.find(function(s) { return s.id === sessionId; });
  if (!session) return;

  var oldDate = session.date;
  session.date = newDate;

  // Recalculate week based on meso startDate
  var meso = APP_STATE.settings.mesocycle;
  if (meso.startDate) {
    var startMs = new Date(meso.startDate).getTime();
    var dateMs = new Date(newDate).getTime();
    var diffDays = Math.floor((dateMs - startMs) / 86400000);
    if (diffDays >= 0) {
      session.week = Math.floor(diffDays / 7) + 1;
    }
  }

  saveState();
  closeModal();

  var parts = newDate.split('-');
  showToast('Verschoben: ' + parseInt(parts[2]) + '.' + parseInt(parts[1]) + '.');

  if (currentPage === 'calendar') {
    var d = new Date(newDate);
    calendarMonth = d.getMonth();
    calendarYear = d.getFullYear();
    calendarSelectedDate = newDate;
    renderCalendarPage();
  }
}

function updateBodyWeight() {
  const val = parseFloat(document.getElementById('body-weight-input').value);
  if (!isNaN(val) && val > 0) {
    APP_STATE.settings.bodyWeight = val;
    APP_STATE.settings.weightHistory.push({
      date: new Date().toISOString().split('T')[0],
      weight: val
    });
    saveState();
    renderSettingsPage();
  }
}

function changeWeek(delta) {
  const meso = APP_STATE.settings.mesocycle;
  const totalWeeks = meso.weeksHard + meso.weeksDeload;
  var newWeek = meso.currentWeek + delta;
  if (newWeek < 1) newWeek = 1;
  // Allow extending beyond original plan — auto-extend weeksHard
  if (newWeek > totalWeeks) {
    meso.weeksHard = newWeek - meso.weeksDeload;
  }
  meso.currentWeek = newWeek;
  selectedWeek = meso.currentWeek;
  saveState();
  renderSettingsPage();
}

function saveGoals() {
  APP_STATE.settings.goals.weeklyVolume = parseInt(document.getElementById('goal-total').value) || 13500;
  APP_STATE.settings.goals.ruecken = parseInt(document.getElementById('goal-ruecken').value) || 5500;
  APP_STATE.settings.goals.brust = parseInt(document.getElementById('goal-brust').value) || 3400;
  APP_STATE.settings.goals.quads = parseInt(document.getElementById('goal-quads').value) || 3000;
  APP_STATE.settings.goals.hams = parseInt(document.getElementById('goal-hams').value) || 2800;
  saveState();
  renderSettingsPage();
}

function updateExWeight(exId, value) {
  const w = parseFloat(value);
  if (!APP_STATE.customWeights) APP_STATE.customWeights = {};
  if (!isNaN(w) && w >= 0) {
    APP_STATE.customWeights[exId] = w;
    // Also update the WORKOUT_PLANS in memory for this session
    for (const plan of Object.values(WORKOUT_PLANS)) {
      for (const ex of plan.strength) { if (ex.id === exId) ex.weight = w; }
      for (const circuit of plan.circuits) {
        for (const ex of circuit.exercises) { if (ex.id === exId) ex.weight = w; }
      }
      for (const ex of plan.accessories) { if (ex.id === exId) ex.weight = w; }
    }
    saveState();
  }
}

// Apply custom weights on load
function applyCustomWeights() {
  const cw = APP_STATE.customWeights || {};
  for (const [exId, w] of Object.entries(cw)) {
    for (const plan of Object.values(WORKOUT_PLANS)) {
      for (const ex of plan.strength) { if (ex.id === exId) ex.weight = w; }
      for (const circuit of plan.circuits) {
        for (const ex of circuit.exercises) { if (ex.id === exId) ex.weight = w; }
      }
      for (const ex of plan.accessories) { if (ex.id === exId) ex.weight = w; }
    }
  }
}
// Clear stale customWeights on version update
const APP_VERSION = '7.7';
if (APP_STATE._appVersion !== APP_VERSION) {
  APP_STATE.customWeights = {};
  APP_STATE._appVersion = APP_VERSION;
  saveState();
}
applyCustomWeights();

function exportData() {
  const dataStr = JSON.stringify(APP_STATE, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `training-data-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      // Basic validation: must have sessions array
      if (!data.sessions || !Array.isArray(data.sessions)) {
        showToast('Ungueltige Datei: Keine Sessions gefunden');
        return;
      }
      var count = data.sessions.length;
      if (!confirm('Import: ' + count + ' Sessions gefunden. Aktuelle Daten werden ersetzt. Fortfahren?')) {
        input.value = '';
        return;
      }
      // Replace APP_STATE
      APP_STATE = data;
      APP_STATE._appVersion = APP_VERSION;
      saveState();
      input.value = '';
      showToast(count + ' Sessions importiert!');
      // Re-render current page
      setTimeout(function() { location.reload(); }, 500);
    } catch(err) {
      showToast('Fehler beim Import: ' + err.message);
    }
  };
  reader.readAsText(file);
}

var SYNC_KEY_STORAGE = 'training-sync-key';
var SYNC_TS_STORAGE = 'training-sync-ts';

function getSyncKey() {
  return localStorage.getItem(SYNC_KEY_STORAGE) || '';
}

function saveSyncKey() {
  var key = document.getElementById('sync-key-input').value.trim();
  if (key && key.length < 4) {
    showToast('Sync-Key muss mind. 4 Zeichen haben');
    return;
  }
  localStorage.setItem(SYNC_KEY_STORAGE, key);
  showToast(key ? 'Sync-Key gespeichert' : 'Sync-Key entfernt');
}

function getSyncStatusText() {
  var ts = localStorage.getItem(SYNC_TS_STORAGE);
  if (!ts) return 'Noch nie synchronisiert';
  var d = new Date(parseInt(ts));
  var mins = Math.floor((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return 'Letzter Sync: gerade eben';
  if (mins < 60) return 'Letzter Sync: vor ' + mins + ' Min';
  var hours = Math.floor(mins / 60);
  if (hours < 24) return 'Letzter Sync: vor ' + hours + 'h';
  return 'Letzter Sync: ' + d.toLocaleDateString('de-DE') + ' ' + d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function updateSyncStatus(text) {
  var el = document.getElementById('sync-status');
  if (el) el.textContent = text;
}

function cloudPush() {
  var key = getSyncKey();
  if (!key) { showToast('Bitte zuerst Sync-Key eingeben'); return; }

  updateSyncStatus('Hochladen...');
  var data = JSON.stringify(APP_STATE);

  fetch('/api/sync?key=' + encodeURIComponent(key), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: data
  })
  .then(function(res) {
    if (!res.ok) throw new Error('Server: ' + res.status);
    return res.json();
  })
  .then(function(result) {
    localStorage.setItem(SYNC_TS_STORAGE, String(Date.now()));
    updateSyncStatus(getSyncStatusText());
    showToast('Daten hochgeladen (' + APP_STATE.sessions.length + ' Sessions)');
  })
  .catch(function(err) {
    updateSyncStatus('Fehler beim Hochladen');
    showToast('Sync-Fehler: ' + err.message);
  });
}

function cloudPull() {
  var key = getSyncKey();
  if (!key) { showToast('Bitte zuerst Sync-Key eingeben'); return; }

  updateSyncStatus('Herunterladen...');

  fetch('/api/sync?key=' + encodeURIComponent(key))
  .then(function(res) {
    if (res.status === 404) throw new Error('Keine Cloud-Daten fuer diesen Key');
    if (!res.ok) throw new Error('Server: ' + res.status);
    return res.json();
  })
  .then(function(data) {
    if (!data.sessions || !Array.isArray(data.sessions)) {
      throw new Error('Ungueltige Daten');
    }
    var count = data.sessions.length;
    if (!confirm('Cloud: ' + count + ' Sessions gefunden. Lokale Daten ersetzen?')) {
      updateSyncStatus(getSyncStatusText());
      return;
    }
    APP_STATE = data;
    APP_STATE._appVersion = APP_VERSION;
    saveState();
    localStorage.setItem(SYNC_TS_STORAGE, String(Date.now()));
    showToast(count + ' Sessions aus Cloud geladen');
    setTimeout(function() { location.reload(); }, 500);
  })
  .catch(function(err) {
    updateSyncStatus('Fehler beim Herunterladen');
    showToast('Sync-Fehler: ' + err.message);
  });
}

function autoCloudPush() {
  var key = getSyncKey();
  if (!key) return;
  // Silent push — no toast, just update timestamp
  fetch('/api/sync?key=' + encodeURIComponent(key), {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(APP_STATE)
  })
  .then(function(res) {
    if (res.ok) localStorage.setItem(SYNC_TS_STORAGE, String(Date.now()));
  })
  .catch(function() { /* silent fail */ });
}

function exportCSV() {
  // Build CSV with all sessions and sets for Google Sheets
  const rows = [['Datum', 'Woche', 'Meso', 'Workout', 'Uebung', 'Set', 'Gewicht (kg)', 'Reps', 'Volumen', 'Gefuehl']];

  APP_STATE.sessions
    .sort((a, b) => a.date.localeCompare(b.date))
    .forEach(session => {
      const plan = WORKOUT_PLANS[session.workoutId];
      if (!plan) return;

      Object.entries(session.sets || {}).forEach(([exId, sets]) => {
        // Skip old alias IDs if canonical ID also exists (prevent duplicate rows)
        var resolved = resolveExerciseId(exId);
        if (resolved && session.sets[resolved]) return;
        const exName = getExerciseName(exId);
        sets.forEach((set, i) => {
          const isDB = isDumbbellExercise(exId);
          const volMultiplier = isDB ? 2 : 1;
          rows.push([
            session.date,
            session.week,
            session.mesocycle,
            plan.name,
            exName + (isDB ? ' (DB)' : ''),
            i + 1,
            set.weight,
            set.reps,
            set.weight * volMultiplier * set.reps,
            session.feeling || ''
          ]);
        });
      });
    });

  // Add summary rows
  rows.push([]);
  rows.push(['--- WOCHEN-ZUSAMMENFASSUNG ---']);
  rows.push(['Woche', 'Meso', 'Total Vol.', 'Ruecken', 'Brust', 'Quads', 'Hams']);

  const meso = APP_STATE.settings.mesocycle;
  for (let w = 1; w <= meso.currentWeek; w++) {
    rows.push([
      'W' + w,
      meso.number,
      calcWeekVolume(w, meso.number),
      calcWeekMuscleVolume(w, 'ruecken', meso.number),
      calcWeekMuscleVolume(w, 'brust', meso.number),
      calcWeekMuscleVolume(w, 'quads', meso.number),
      calcWeekMuscleVolume(w, 'hams', meso.number)
    ]);
  }

  const csvContent = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `training-export-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

    '<input type="number" inputmode="numeric" class="input-field" id="new-meso-weeks" value="5" min="1" max="12" style="width:100%;font-size:14px;padding:8px">' +
    '</div>' +

    '<div style="font-size:12px;color:var(--text-sec);margin-bottom:4px">Deload Wochen</div>' +
    '<input type="number" inputmode="numeric" class="input-field" id="new-meso-deload" value="1" min="0" max="3" style="width:100%;font-size:14px;padding:8px">' +

  var startDate = document.getElementById('new-meso-date').value;
  var weeksHard = parseInt(document.getElementById('new-meso-weeks').value) || 5;
  var weeksDeload = parseInt(document.getElementById('new-meso-deload').value) || 1;

function startFreeWorkout() {
  var ds = freeDesignerState;
  if (!ds) return;

  // Validate
  var totalEx = 0;
  ds.blocks.forEach(function(b) { totalEx += b.exercises.length; });
  if (totalEx === 0) { showToast('Keine Uebungen hinzugefuegt'); return; }

  // Generate unique workout ID
  var freeId = 'free-' + Date.now();
  var workoutName = ds.name || 'Freies Workout';

  // Build WORKOUT_PLAN from designer state
  var strengthExercises = [];
  var circuits = [];
  var circuitCounter = 0;

  ds.blocks.forEach(function(block, bi) {
    if (block.type === 'single') {
      block.exercises.forEach(function(ex) {
        var exId = freeId + '-s' + strengthExercises.length;
        var exObj = {
          id: exId,
          name: ex.name,
          sets: ex.sets || 3,
          reps: ex.reps || 10,
          weight: ex.weight || 0,
          restSeconds: 120,
          bodyweight: ex.bodyweight || false,
          dumbbell: ex.dumbbell || false,
          unilateral: ex.unilateral || false
        };
        if (block.emom) {
          exObj.emom = true;
          exObj.emomMinutes = block.emomMinutes || 10;
        }
        strengthExercises.push(exObj);
      });
    } else if (block.type === 'circuit') {
      var circuitId = freeId + '-c' + (circuitCounter++);
      var circuitExercises = block.exercises.map(function(ex, ei) {
        return {
          id: circuitId + '-e' + ei,
          name: ex.name,
          reps: ex.reps || 10,
          weight: ex.weight || 0,
          bodyweight: ex.bodyweight || false,
          dumbbell: ex.dumbbell || false,
          unilateral: ex.unilateral || false
        };
      });
      circuits.push({
        id: circuitId,
        rounds: [block.rounds || 4, block.rounds || 4],
        restSeconds: 0,
        exercises: circuitExercises
      });
    }
  });

  // Create the workout plan
  var plan = {
    name: workoutName,
    subtitle: 'Free',
    day: ds.date.split('-').slice(1).reverse().join('.'),
    isFree: true,
    strength: strengthExercises,
    circuits: circuits,
    accessories: [],
    warmup: []
  };

  // Register muscle mappings from designer exercises
  ds.blocks.forEach(function(block) {
    block.exercises.forEach(function(ex) {
      if (ex.muscle) {
        // Find the actual exercise ID in the plan
        var allPlanExercises = strengthExercises.concat([]);
        circuits.forEach(function(c) { allPlanExercises = allPlanExercises.concat(c.exercises); });
        var match = allPlanExercises.find(function(pe) { return pe.name === ex.name; });
        if (match && match.id) {
          EXERCISE_MUSCLE[match.id] = ex.muscle;
        }
      }
    });
  });

  // Register the plan
  WORKOUT_PLANS[freeId] = plan;

  // Store muscle mappings on the plan for persistence
  var muscleMappings = {};
  ds.blocks.forEach(function(block) {
    block.exercises.forEach(function(ex) {
      if (ex.muscle) muscleMappings[ex.name] = ex.muscle;
    });
  });
  plan._muscleMappings = muscleMappings;

  // Persist the plan for future reference
  if (!APP_STATE.freeWorkoutPlans) APP_STATE.freeWorkoutPlans = {};
  APP_STATE.freeWorkoutPlans[freeId] = plan;

  // Determine mesocycle week from date
  var meso = APP_STATE.settings.mesocycle;
  var week = meso.currentWeek;
  if (meso.startDate) {
    var startMs = new Date(meso.startDate).getTime();
    var dateMs = new Date(ds.date).getTime();
    var diffDays = Math.floor((dateMs - startMs) / 86400000);
    if (diffDays >= 0) {
      week = Math.floor(diffDays / 7) + 1;
    }
  }

  // Create session
  activeWorkoutId = freeId;
  trainingView = 'workout-detail';
  activeSubTab = strengthExercises.length > 0 ? 'strength' : 'zirkel';
  warmupChecked = {};

  activeSession = {
    id: uuid(),
    workoutId: freeId,
    date: ds.date,
    week: week,
    mesocycle: meso.number,
    duration: 0,
    feeling: null,
    readiness: null,
    sets: {},
    warmupDone: true,
    circuitRounds: {},
    notes: '',
    _startTime: Date.now(),
    _currentStrengthSet: {},
    _currentCircuitRound: {},
    _completed: false,
    _circuitDone: {},
    _readinessDone: true
  };

  freeDesignerState = null;
  resetSessionTimer();
  startSessionTimer();
  navigateTo('training');
}

function openFreeSession(sessionId) {
  var session = APP_STATE.sessions.find(function(s) { return s.id === sessionId; });
  if (!session) return;
  var plan = WORKOUT_PLANS[session.workoutId];
  if (!plan) return;

  activeWorkoutId = session.workoutId;
  trainingView = 'workout-detail';
  activeSubTab = 'done';
  warmupChecked = {};
  activeSession = JSON.parse(JSON.stringify(session));
  activeSession._completed = true;
  navigateTo('training');
}

// Restore free workout plans + muscle mappings from APP_STATE on load
(function() {
  var plans = APP_STATE.freeWorkoutPlans || {};
  Object.keys(plans).forEach(function(id) {
    WORKOUT_PLANS[id] = plans[id];
    // Restore muscle mappings for volume tracking
    var mappings = plans[id]._muscleMappings;
    if (mappings) {
      var allEx = (plans[id].strength || []).concat([]);
      (plans[id].circuits || []).forEach(function(c) { allEx = allEx.concat(c.exercises || []); });
      allEx.forEach(function(ex) {
        if (mappings[ex.name]) {
          EXERCISE_MUSCLE[ex.id] = mappings[ex.name];
        }
      });
    }
  });

  // Also restore from exercise catalog
  var catalog = APP_STATE.exerciseCatalog || {};
  Object.keys(catalog).forEach(function(key) {
    var entry = catalog[key];
    // Catalog entries apply to any free exercise with matching name
    Object.keys(plans).forEach(function(planId) {
      var plan = plans[planId];
      var allEx = (plan.strength || []).concat([]);
      (plan.circuits || []).forEach(function(c) { allEx = allEx.concat(c.exercises || []); });
      allEx.forEach(function(ex) {
        if (ex.name.toLowerCase().trim() === key && entry.muscle && !EXERCISE_MUSCLE[ex.id]) {
          EXERCISE_MUSCLE[ex.id] = entry.muscle;
        }
      });
    });
  });
})();

// SWIPE TO DELETE
// =============================================

let swipeStartX = 0;
let swipeCurrentX = 0;
let swipeEl = null;
let swipeHappened = false;

document.addEventListener('touchstart', function(e) {
  var wrapper = e.target.closest('.swipe-wrapper');
  if (!wrapper) return;
  swipeEl = wrapper.querySelector('.swipe-content');
  swipeStartX = e.touches[0].clientX;
  swipeCurrentX = swipeStartX;
  swipeHappened = false;
  if (swipeEl) swipeEl.style.transition = 'none';
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!swipeEl) return;
  swipeCurrentX = e.touches[0].clientX;
  var diff = swipeCurrentX - swipeStartX;
  if (Math.abs(diff) > 5) swipeHappened = true;
  if (diff < 0) {
    var wrapper = swipeEl.closest('.swipe-wrapper');
    if (wrapper && !wrapper.classList.contains('swiping')) wrapper.classList.add('swiping');
    swipeEl.style.transform = 'translateX(' + Math.max(diff, -80) + 'px)';
  }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!swipeEl) return;
  swipeEl.style.transition = 'transform 0.2s ease';
  var diff = swipeCurrentX - swipeStartX;

  if (diff < -60) {
    // Swiped enough - show delete
    swipeEl.style.transform = 'translateX(-80px)';
    var wrapper = swipeEl.closest('.swipe-wrapper');
    var bg = wrapper.querySelector('.swipe-delete-bg');
    if (bg) {
      bg.onclick = function() {
        var exId = wrapper.dataset.exId;
        var setIdx = parseInt(wrapper.dataset.setIndex);
        deleteSet(exId, setIdx);
      };
    }
  } else {
    swipeEl.style.transform = 'translateX(0)';
    var w = swipeEl.closest('.swipe-wrapper');
    if (w) w.classList.remove('swiping');
  }
  swipeEl = null;
});

function deleteSet(exId, setIndex) {
  if (!activeSession || !activeSession.sets[exId]) return;

  // Check if this exercise belongs to a superset group — delete from all members
  var exInfo = getExerciseInfo(exId);
  if (exInfo && exInfo.group && activeWorkoutId) {
    var plan = WORKOUT_PLANS[activeWorkoutId];
    if (plan) {
      plan.accessories.forEach(function(acc) {
        if (acc.group === exInfo.group && activeSession.sets[acc.id] && activeSession.sets[acc.id].length > setIndex) {
          activeSession.sets[acc.id].splice(setIndex, 1);
        }
      });
    }
  } else {
    activeSession.sets[exId].splice(setIndex, 1);
  }

  // Recalculate circuitRounds if this exercise is in a circuit
  if (activeWorkoutId) {
    var plan = WORKOUT_PLANS[activeWorkoutId];
    if (plan && plan.circuits) {
      plan.circuits.forEach(function(circuit) {
        var isInCircuit = circuit.exercises.some(function(e) { return e.id === exId; });
        if (isInCircuit) {
          var minSets = Infinity;
          circuit.exercises.forEach(function(e) {
            var len = (activeSession.sets[e.id] || []).length;
            if (len < minSets) minSets = len;
          });
          activeSession.circuitRounds[circuit.id] = minSets === Infinity ? 0 : minSets;
        }
      });
    }
  }

  saveState();
  renderWorkoutDetail();
}

function startEditSet(exId, index) {
  // Don't trigger edit if a swipe just happened
  if (swipeHappened) { swipeHappened = false; return; }
  editingSet = { exId: exId, index: index };
  renderWorkoutDetail();
}

function cancelEditSet() {
  editingSet = null;
  renderWorkoutDetail();
}

function saveEditSet(exId, index) {
  if (!activeSession || !activeSession.sets[exId] || !activeSession.sets[exId][index]) return;

  var wEl = document.getElementById('edit-w-' + exId + '-' + index);
  var rEl = document.getElementById('edit-r-' + exId + '-' + index);
  if (wEl) activeSession.sets[exId][index].weight = parseFloat(wEl.value.replace(',', '.')) || 0;
  if (rEl) activeSession.sets[exId][index].reps = parseInt(rEl.value) || 0;

  // Check if a drop set was added via edit
  var dwEl = document.getElementById('edit-dw-' + exId + '-' + index);
  var drEl = document.getElementById('edit-dr-' + exId + '-' + index);
  if (dwEl && drEl) {
    var dw = parseFloat(dwEl.value.replace(',', '.')) || 0;
    var dr = parseInt(drEl.value) || 0;
    if (dw > 0 && dr > 0) {
      // Insert drop set right after this set
      activeSession.sets[exId].splice(index + 1, 0, { weight: dw, reps: dr, type: 'drop' });
    }
  }

  // Also update the saved session in APP_STATE if workout was already finished
  if (activeSession._completed) {
    var savedIdx = APP_STATE.sessions.findIndex(function(s) { return s.id === activeSession.id; });
    if (savedIdx >= 0) {
      APP_STATE.sessions[savedIdx].sets = JSON.parse(JSON.stringify(activeSession.sets));
    }
  }

  editingSet = null;
  saveState();
  renderWorkoutDetail();
}

// =============================================
// ZIRKEL ROUND SWIPE NAVIGATION
// =============================================

let zirkelSwipeStartX = 0;
let zirkelSwipeStartY = 0;
let zirkelSwipeArea = null;
let zirkelSwipeLocked = false; // true = horizontal swipe confirmed

document.addEventListener('touchstart', function(e) {
  // Don't hijack swipe-to-delete
  if (e.target.closest('.swipe-wrapper')) return;
  var area = e.target.closest('.zirkel-round-area');
  if (!area) return;
  zirkelSwipeArea = area;
  zirkelSwipeStartX = e.touches[0].clientX;
  zirkelSwipeStartY = e.touches[0].clientY;
  zirkelSwipeLocked = false;
}, { passive: true });

document.addEventListener('touchmove', function(e) {
  if (!zirkelSwipeArea) return;
  var dx = e.touches[0].clientX - zirkelSwipeStartX;
  var dy = e.touches[0].clientY - zirkelSwipeStartY;
  // Lock direction after 10px movement
  if (!zirkelSwipeLocked && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
    if (Math.abs(dx) > Math.abs(dy)) {
      zirkelSwipeLocked = true; // horizontal swipe
    } else {
      zirkelSwipeArea = null; // vertical scroll, bail out
    }
  }
}, { passive: true });

document.addEventListener('touchend', function(e) {
  if (!zirkelSwipeArea || !zirkelSwipeLocked) {
    zirkelSwipeArea = null;
    return;
  }
  var dx = e.changedTouches[0].clientX - zirkelSwipeStartX;
  var circuitId = zirkelSwipeArea.dataset.circuitId;
  var completed = parseInt(zirkelSwipeArea.dataset.completed) || 0;

  if (Math.abs(dx) > 50) {
    var current = viewingRound[circuitId] || (completed + 1);
    if (dx < -50 && current < completed) {
      // Swipe left → next round
      viewCircuitRound(circuitId, current + 1);
    } else if (dx < -50 && current === completed) {
      // Swipe left from last completed → back to input
      clearViewingRound(circuitId);
    } else if (dx > 50 && current > 1) {
      // Swipe right → previous round
      viewCircuitRound(circuitId, current - 1);
    } else if (dx > 50 && !viewingRound[circuitId] && completed > 0) {
      // Swipe right from input → view last completed round
      viewCircuitRound(circuitId, completed);
    }
  }
  zirkelSwipeArea = null;
});

// =============================================
// NAVIGATION EVENT LISTENERS
// =============================================

document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    if (page === 'training') {
      trainingView = 'week-overview';
    }
    navigateTo(page);
  });
});

// =============================================
// INITIAL RENDER
// =============================================

renderHomePage();
saveState();

</script>
